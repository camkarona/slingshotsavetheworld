                       '고철수집': scrapCollectStack,
                       '중력무시': gravityIgnoreStack,
                       '다발장전': burstLoadStack,
                       '높이개조': slingModStack,
                       '시간정지': timeStopStack,
                       '파견':     dispatchStack,
                       '똥볼':     dungBallStack,
                       '분신':     twinStack,
                       '핵탄두':   nukeStack,
                       '차원균열': dimensionRiftStack };
    const owned = Object.keys(STACK_OF).filter(k => STACK_OF[k] > 0);

    const PASSIVE_RARITY = {
        '탄성증가': 'NORMAL', '파워업': 'NORMAL', '돌을 줍다':  'NORMAL', '재활용': 'NORMAL',
        '고철수집': 'NORMAL', '중력무시': 'NORMAL', '다발장전': 'NORMAL', '높이개조': 'NORMAL',
        '시간정지': 'NORMAL', '파견': 'NORMAL', '똥볼': 'NORMAL',
        '큰돌':   'RARE',   '조준선': 'RARE',   '농구공':    'RARE',
        '자석탄': 'RARE',   '그라운드 제로': 'RARE', '폭발':   'RARE', '분신': 'RARE',
        '관통':   'EPIC',   '산탄':   'EPIC',   '번개탄': 'EPIC',
        '체세포분열': 'EPIC',
        '핵탄두': 'LEGENDARY', '차원균열': 'LEGENDARY',
    };
    const PANEL_BADGE = { NORMAL: '[N]', RARE: '[R]', EPIC: '[E]', LEGENDARY: '[L]' };
    const PANEL_COL   = { NORMAL: '#aaaaaa', RARE: '#44bbff', EPIC: '#cc66ff', LEGENDARY: '#ffaa00' };

    const LINE_H = 17;
    const BASE_Y = 103;   // "── 강화 ──" 헤더 직후 y
    let   row    = 0;

    // 텍스트 생성 헬퍼 — _hx, _hy, _fs 저장 (compensateHUDZoom 에서 사용)
    const addTxt = (sx, sy, label, style, fs) => {
        const o = scene.add.text(sx, sy, label, style).setScrollFactor(0).setDepth(10);
        o._hx = sx;  o._hy = sy;  o._fs = fs;
        uiPassiveLines.push(o);
        return o;
    };

    // ── 현재 스탯 (공격력 / 탄성) ────────────────────────
    if (owned.length > 0) {
        const atkMult = STONE_DAMAGE * Math.pow(2,
            (isOn('파워업') ? ironBallStack : 0) + (isOn('큰돌') ? bigStoneStack : 0));
        const elastX  = (launchMult / BASE_LAUNCH).toFixed(2);

        addTxt(18, BASE_Y + row * LINE_H,
            `⚔  공격력  ${atkMult}`,
            { fontFamily: 'Arial', fontSize: '12px', color: '#ffcc44' }, 12);
        row++;

        addTxt(18, BASE_Y + row * LINE_H,
            `↗  탄성   ×${elastX}`,
            { fontFamily: 'Arial', fontSize: '12px', color: '#66ddff' }, 12);
        row++;
    }

    // ── 패시브 라인 (뱃지 + 이름 분리) ────────────────────
    owned.forEach(name => {
        const on       = isOn(name);
        const rarity   = PASSIVE_RARITY[name] ?? 'NORMAL';
        const badgeStr = PANEL_BADGE[rarity]   ?? '[N]';
        const tierCol  = PANEL_COL[rarity]     ?? '#aaaaaa';
        const stackStr = (name === '관통' || name === '체세포분열' || name === '그라운드 제로'
                          || name === '중력무시' || name === '핵탄두' || name === '차원균열'
                          || name === '시간정지' || name === '분신' || name === '파견'
                          || name === '똥볼')
                         ? '' : ` ×${STACK_OF[name]}`;
        const lineY    = BASE_Y + row * LINE_H;

        // 뱃지 — 티어 색상
        const badgeObj = addTxt(18, lineY, badgeStr, {
            fontFamily: 'Arial', fontSize: '11px',
            color: on ? tierCol : '#444444',
        }, 11);

        // 이름 — 흰색(ON) / 어두운(OFF), 클릭 가능
        const nameLabel = `${on ? '☑' : '☐'} ${name}${stackStr}`;
        const nameObj   = addTxt(40, lineY, nameLabel, {
            fontFamily: 'Arial', fontSize: '13px',
            color: on ? '#e8e8e8' : '#555555',
        }, 13);
        nameObj.setInteractive({ useHandCursor: true });
        nameObj.on('pointerup',   () => {
            passiveActive[name] = !isOn(name);
            if (name === '높이개조') applySlingHeight();   // 토글 즉시 새총 높이 반영
            if (name === '핵탄두')   applyStoneTint(currentStone);  // 토글 즉시 돌 색 갱신
            if (name === '분신')     redrawTwinStand();    // 토글 즉시 쌍둥이 새총 표시/숨김
            if (name === '똥볼') {
                redrawSlingStand(); redrawTwinStand(); redrawKicker();  // 새총↔축구선수 전환
                // 장전된 공도 새 위치로 이동 (slingshot → 발 옆 지면, 또는 그 반대)
                if (currentStone && !isDragging) {
                    const pos = getBallPos();
                    currentStone.setPosition(pos.x, pos.y);
                }
            }
            rebuildPassiveLines(scene);
        });
        nameObj.on('pointerover', () => { badgeObj.setAlpha(0.65); nameObj.setAlpha(0.65); });
        nameObj.on('pointerout',  () => { badgeObj.setAlpha(1.0);  nameObj.setAlpha(1.0);  });

        row++;
    });

    // ── 패널 높이 동적 조정 ───────────────────────────────
    // BASE_Y=103 에서 시작, row개 행, +12px 하단 여백 / 최소 PANEL_MIN_H
    _panelH = Math.max(PANEL_MIN_H, BASE_Y + row * LINE_H + 12 - 8);

    // 헤더(STAGE N / 강화 구분선) 갱신 + 패널 배경 재렌더
    refreshPlayerPanel(owned.length > 0);

    // 페이드 상태 동기화 (발사 중에 패시브 라인이 새로 생긴 경우 대비)
    if (_hudFaded) uiPassiveLines.forEach(o => o.setAlpha(0.30));
}

function getStoneScale() {
    // 텍스처 해상도 2배 → 0.5 → 0.25 (디스플레이 크기 동일)
    return 0.25 * Math.pow(2, (isOn('큰돌') ? bigStoneStack : 0));
}

// 새들을 x=1000-3200 구역에 균등하게 산포 (스테이지별 수량은 STAGE_DATA 참조)
function spawnBirdsSpread(scene, withFade = false) {
    const stage = STAGE_DATA[Math.min(roundNumber, STAGE_DATA.length) - 1];
    const { birdCount, mothCount, eagleCount, overlordCount } = stage;

    const minX = 1000, maxX = 3200;
    const step = (maxX - minX) / birdCount;
    for (let i = 0; i < birdCount; i++) {
        const jitter = Phaser.Math.Between(-Math.floor(step * 0.3), Math.floor(step * 0.3));
        const x = Phaser.Math.Clamp(Math.floor(minX + (i + 0.5) * step + jitter), minX, maxX);
        spawnBird(scene, withFade, x);
    }
    // 지상 나방 — 새총 옆부터 전 구역
    for (let i = 0; i < mothCount; i++) {
        const x = Phaser.Math.Between(330, 3200);
        spawnBird(scene, withFade, x, MOTH_TYPE);
    }
    // 독수리 — 전 스테이지 5마리, 화면 상단 가시권
    for (let i = 0; i < eagleCount; i++) {
        const x = Phaser.Math.Between(400, 3200);
        spawnBird(scene, withFade, x, EAGLE_TYPE);
    }
    // 부유 생물체 — 원거리 구역(x=2000~4000)에 4마리 고정
    for (let i = 0; i < 4; i++) {
        const x = Phaser.Math.Between(2000, 4000);
        spawnBird(scene, withFade, x, FLOATER_TYPE);
    }
    // 고공 오염체 — 새총 근처 상공 2마리 고정
    for (let i = 0; i < 2; i++) {
        const x = Phaser.Math.Between(380, 880);
        spawnBird(scene, withFade, x, TENDRIL_TYPE);
    }
    // 부유 오염 기지 (오버로드) — 맵 전역 극고공에 고정
    for (let i = 0; i < overlordCount; i++) {
        const x = Phaser.Math.Between(500, 3000);
        spawnBird(scene, withFade, x, OVERLORD_TYPE);
    }
}

// ─── 돌멩이 장전 ──────────────────────────────────────
function loadStone(scene) {
    if (currentAmmo <= 0) return;
    const pos = getBallPos();
    currentStone = scene.add.image(pos.x, pos.y, 'stone').setDepth(1).setScale(getStoneScale());
    applyStoneTint(currentStone);
}

// 핵탄두 장착 시 돌멩이를 빨갛게 → 핵탄두 시각 신호
function applyStoneTint(stone) {
    if (!stone) return;
    if (nukeStack > 0 && isOn('핵탄두')) {
        stone.setTint(0xff2222);
    } else {
        stone.clearTint();
    }
}

// ─── 고무줄 렌더링 ────────────────────────────────────
function drawRubberBand() {
    rubberBandGraphics.clear();
    if (!currentStone) return;
    // 똥볼 패시브 활성 시 고무줄 미표시 (새총 자체가 사라졌으므로)
    if (isDungBallOn()) return;
    rubberBandGraphics.lineStyle(6, 0xD2691E, 1);
    // 슬링샷이 기울었으면 prong 위치도 따라 회전 (rubber band가 자연스럽게 따라옴)
    const pL = tiltedPoint(PRONG_L.x, PRONG_L.y, SLING_CENTER.x);
    const pR = tiltedPoint(PRONG_R.x, PRONG_R.y, SLING_CENTER.x);
    rubberBandGraphics.lineBetween(pL.x, pL.y, currentStone.x, currentStone.y);
    rubberBandGraphics.lineBetween(pR.x, pR.y, currentStone.x, currentStone.y);
}

// ─── HUD 줌 보정 ──────────────────────────────────────
// setScrollFactor(0) 은 스크롤만 무시, 줌은 그대로 영향받음.
// zoom 이 바뀔 때만 world 위치를 역산해 보정 (매 프레임 불필요 연산 방지).
let _lastHUDZoom = 1.0;
let _panelH      = PANEL_MIN_H;   // 패널 배경 현재 높이 (screen px) — rebuildPassiveLines에서 동적 갱신
let _hudFaded    = false;          // 현재 좌측 HUD 페이드 상태
function compensateHUDZoom() {
    const z = sceneRef.cameras.main.zoom;
    if (Math.abs(z - _lastHUDZoom) < 0.001) return;
    _lastHUDZoom = z;
    const cx = config.width  / 2;
    const cy = config.height / 2;
    const f  = (sx, sy) => ({ x: cx + (sx - cx) / z, y: cy + (sy - cy) / z });
    let p;
    p = f(640, 18);   uiRoundText.setPosition(p.x, p.y);
    p = f(640, 48);   uiAmmoText.setPosition(p.x, p.y);
    // uiPassiveText 는 숨김 상태 — 줌 보정 불필요
    p = f(PANEL_CX, REMAINING_Y);  if (uiRemainingText) uiRemainingText.setPosition(p.x, p.y);
    p = f(1200, 20);  if (uiResearchBtnTxt) uiResearchBtnTxt.setPosition(p.x, p.y).setFontSize(`${15 / z}px`);
    // 박사님 연구 버튼 배경도 zoom 보정 (텍스트만 보정되면 배경이 어긋남)
    if (uiResearchBtn && uiResearchBtn._render) uiResearchBtn._render();
    p = f(1260, 58);  uiMaterialText.setPosition(p.x, p.y);
    p = f(1260, 84);  if (uiPollutionText) uiPollutionText.setPosition(p.x, p.y);
    // Player Status 패널 + 미니맵 토글 버튼
    drawPanelBg(z);
    p = f(PANEL_CX, 22); if (uiPanelTitle)   uiPanelTitle.setPosition(p.x, p.y);
    p = f(18,  52); if (uiPanelContent) uiPanelContent.setPosition(p.x, p.y).setFontSize(`${14 / z}px`);
    drawMinimapBtn(z);
    p = f(PANEL_CX, TOGGLE_Y); if (uiMinimapBtnTxt) uiMinimapBtnTxt.setPosition(p.x, p.y).setFontSize(`${18 / z}px`);
    // 설정 버튼 (우하단)
    drawSideBtn(uiSettingBtnBg, z);
    p = f(SETTING_BTN_X, SETTING_BTN_Y); if (uiSettingBtnTxt) uiSettingBtnTxt.setPosition(p.x, p.y).setFontSize(`${14 / z}px`);
    // 조준화면으로 버튼은 화면 정중앙 → 위치는 불변, 크기만 역보정
    if (uiAimBtn) { uiAimBtn.setScale(1 / z); uiAimBtnTxt.setScale(1 / z); }
    // 패시브 라인 줌 보정 (각 오브젝트에 저장된 _hx, _hy, _fs 사용)
    uiPassiveLines.forEach(obj => {
        const p2 = f(obj._hx ?? 18, obj._hy ?? 103);
        obj.setPosition(p2.x, p2.y).setFontSize(`${(obj._fs ?? 13) / z}px`);
    });
}

// ─── 좌측 HUD 페이드 (발사·조준 중 시야 확보) ─────────
// isDragging 또는 cameraFollowing 동안 30%로 페이드, 그 외 100% 복귀
function updateHUDFade() {
    const shouldFade = isDragging || cameraFollowing;
    if (shouldFade === _hudFaded) return;
    _hudFaded = shouldFade;

    const targetAlpha = shouldFade ? 0.30 : 1.0;
    const elems = [
        uiPanelBg, uiPanelTitle, uiPanelContent,
        uiMinimapBtnBg, uiMinimapBtnTxt,
        minimapGraphics, uiRemainingText,
        ...uiPassiveLines,
    ].filter(o => o != null);

    if (elems.length === 0) return;
    sceneRef.tweens.killTweensOf(elems);
    sceneRef.tweens.add({
        targets: elems,
        alpha: targetAlpha,
        duration: 280,
        ease: 'Quad.Out',
    });
}

// ─── 미니맵 렌더링 (줌 보정 적용) ────────────────────
function drawMinimap() {
    if (!minimapVisible) return;
    minimapGraphics.clear();
    const cam = sceneRef.cameras.main;
    const z   = cam.zoom;
    const cx  = config.width / 2, cy = config.height / 2;

    // 원하는 화면 좌표를 scrollFactor(0) world 좌표로 변환
    const wx0 = cx + (MM_X       - cx) / z;
    const wy0 = cy + (MM_Y       - cy) / z;
    const ww  = MM_W / z;
    const wh  = MM_H / z;

    // 배경 + 테두리
    minimapGraphics.fillStyle(0x000000, 1).fillRect(wx0, wy0, ww, wh);
    minimapGraphics.lineStyle(1 / z, 0xe8a030, 0.50).strokeRect(wx0, wy0, ww, wh);

    // 월드 좌표 → 미니맵 world 픽셀 변환
    const toMX = wx => wx0 + ((wx - MM_WX0) / (MM_WX1 - MM_WX0)) * ww;
    const toMY = wy => wy0 + ((wy - MM_WY0) / (MM_WY1 - MM_WY0)) * wh;

    // 새총 마커
    const sx = toMX(SLING_CENTER.x), sy = toMY(SLING_CENTER.y);
    const ms = 4 / z;
    minimapGraphics.fillStyle(0xD2691E, 1).fillRect(sx - ms/2, sy - ms*0.75, ms, ms * 1.5);

    // 새 (독수리=주황, 부유생물체=보라, 나방=황갈색, 나머지=초록)
    birds.getChildren().forEach(b => {
        if (!b.active) return;
        const mx = toMX(b.x), my = toMY(b.y);
        if (mx >= wx0 && mx <= wx0 + ww && my >= wy0 && my <= wy0 + wh) {
            const key     = b.texture && b.texture.key;
            const isEagle    = key === 'eagle';
            const isFloater  = key === 'floater';
            const isMoth     = key === 'mothBird';
            const isTendril  = key === 'tendril';
            const isOverlord = key === 'overlord';
            const col = isOverlord ? 0xff8800
                      : isTendril  ? 0xff2222
                      : isEagle    ? 0xff4400
                      : isFloater  ? 0xcc44ff
                      : isMoth     ? 0xd4bc8a : 0x39ff14;
            const ds  = isOverlord ? 8/z : isTendril ? 6/z : isEagle ? 6/z : isFloater ? 5/z : 3/z;
            minimapGraphics.fillStyle(col, 0.9).fillRect(mx - ds/2, my - ds/2, ds, ds);
        }
    });

    // 비행 중인 돌멩이
    minimapGraphics.fillStyle(0xffffff, 0.9);
    activeStones.getChildren().forEach(s => {
        if (!s.active) return;
        minimapGraphics.fillCircle(toMX(s.x), toMY(s.y), 2 / z);
    });

    // 카메라 뷰 사각형 — 미니맵 경계 내로 클램핑
    const cvX0 = toMX(cam.scrollX);
    const cvY0 = toMY(cam.scrollY);
    const cvX1 = cvX0 + (config.width  / cam.zoom / WORLD_LIMIT_X) * ww;
    const cvY1 = cvY0 + (config.height / cam.zoom / (MM_WY1 - MM_WY0)) * wh;
    const cx0c = Math.max(wx0, cvX0), cy0c = Math.max(wy0, cvY0);
    const cx1c = Math.min(wx0 + ww, cvX1), cy1c = Math.min(wy0 + wh, cvY1);
    if (cx1c > cx0c && cy1c > cy0c) {
        minimapGraphics.lineStyle(1 / z, 0xffffff, 0.75)
            .strokeRect(cx0c, cy0c, cx1c - cx0c, cy1c - cy0c);
    }
}

// ─── HP 바 렌더링 (maxHp > 1인 새만 표시) ───────────
function drawHpBars() {
    hpBarGraphics.clear();
    birds.getChildren().forEach(bird => {
        if (!bird.active || (bird.maxHp ?? 1) <= 1) return;
        const ratio = Math.max(0, bird.hp / bird.maxHp);
        const _bkey = bird.texture && bird.texture.key;
        const bw = _bkey === 'overlord' ? 76 : _bkey === 'tendril' ? 62 : 44;
        const bh = 5;
        const bx = bird.x - bw / 2;
        const by = bird.y - (_bkey === 'overlord' ? 62 : _bkey === 'tendril' ? 46 : 36);
        hpBarGraphics.fillStyle(0x222222, 0.85).fillRect(bx, by, bw, bh);
        const col = ratio > 0.5 ? 0x44ff44 : ratio > 0.25 ? 0xffff00 : 0xff4444;
        hpBarGraphics.fillStyle(col, 1).fillRect(bx, by, bw * ratio, bh);
    });
}

// ─── 드래그 ───────────────────────────────────────────
function startDrag(pointer) {
    // 조준화면으로 버튼 클릭 감지 (스크린 좌표 기준)
    if (uiAimBtn && uiAimBtn.visible) {
        if (Math.abs(pointer.x - 640) < 135 && Math.abs(pointer.y - 360) < 29) {
            returnToAimView();
            return;
        }
    }
    // 새총 근처이고 탄약 있을 때: 돌 드래그
    // pointer.worldX/Y는 줌 상태에서 부정확할 수 있으므로 toWorldPos와 동일 공식 사용
    const cam = sceneRef.cameras.main;
    const wx = cam.scrollX + pointer.x / cam.zoom;
    const wy = cam.scrollY + pointer.y / cam.zoom;
    if (currentStone && currentAmmo > 0 && !isRoundEnding &&
        Phaser.Math.Distance.Between(wx, wy, currentStone.x, currentStone.y) < 50) {
        isDragging = true;
        _kickChargeStart = Date.now();   // 똥볼 차징 시작 (다른 모드에서는 무시됨)
        return;
    }
    // 그 외: 맵 드래그 (카메라 팬)
    if (!cameraFollowing) {
        isMapDragging  = true;
        mapDragOriginX = pointer.x;
        mapDragOriginY = pointer.y;
        mapDragScrollX = sceneRef.cameras.main.scrollX;
        mapDragScrollY = sceneRef.cameras.main.scrollY;
    }
}

function doDragAt(px, py) {
    if (!isDragging || !currentStone) return;

    const origin = getBallPos();
    // 새총 중심 오른쪽으로 당기면 왼쪽 방향으로 발사됨
    // → 기본은 차단(바다 쪽이므로). 단 '파견' 또는 '똥볼' 활성 시 허용
    const allowLeftShot = (dispatchStack > 0 && isOn('파견')) || isDungBallOn();
    if (px > origin.x && !allowLeftShot) {
        currentStone.setPosition(origin.x, origin.y);
        trajectoryGraphics.clear();
        return;
    }

    const angle = Phaser.Math.Angle.Between(px, py, origin.x, origin.y);
    let dist    = Phaser.Math.Distance.Between(px, py, origin.x, origin.y);
    if (dist > BASE_DRAG) dist = BASE_DRAG;

    currentStone.x = origin.x - Math.cos(angle) * dist;
    currentStone.y = origin.y - Math.sin(angle) * dist;

    // 궤적 예측선 (조준선 패시브 보유 + ON 시에만 표시)
    trajectoryGraphics.clear();
    // 똥볼은 차징 기반이라 일반 궤적 예측이 부정확 — 조준선 표시 생략
    if (aimLineStack > 0 && isOn('조준선') && !isDungBallOn()) {
        // 탄성증가 토글 반영한 실효 발사력
        const effMult = (armMuscleStack > 0 && isOn('탄성증가'))
            ? BASE_LAUNCH * Math.pow(1.2, armMuscleStack) : BASE_LAUNCH;
        const vx  = Math.cos(angle) * dist * effMult;
        const vy  = Math.sin(angle) * dist * effMult;
        // 중력무시 패시브 활성 시 g=0 → 직선 궤적 예측
        const noGravity = gravityIgnoreStack > 0 && isOn('중력무시');
        const g   = noGravity ? 0 : config.physics.arcade.gravity.y;
        const cam = sceneRef.cameras.main;
        const visR = cam.scrollX + config.width  / cam.zoom;
        const visB = cam.scrollY + config.height / cam.zoom;

        // 1패스: 화면 내 전체 궤적 점 수집 (중력무시면 직선)
        const allDots = [];
        for (let i = 0; i < 80; i++) {
            const t  = i * 0.05;
            const tx = origin.x + vx * t;
            const ty = origin.y + vy * t + 0.5 * g * t * t;
            if (tx > visR || tx < cam.scrollX || ty > visB || ty < cam.scrollY - 200) break;
            allDots.push({ tx, ty });
        }

        // 2패스: 스택1=전체의 50%, 스택2=100% 표시 + 끝으로 갈수록 페이드
        const showCount = aimLineStack >= 2 ? allDots.length : Math.ceil(allDots.length * 0.5);
        for (let i = 0; i < showCount; i++) {
            const alpha = aimLineStack >= 2
                ? 0.58
                : Math.max(0.04, 0.65 * (1 - i / showCount));
            trajectoryGraphics.fillStyle(0x00ffff, alpha);
            trajectoryGraphics.fillCircle(allDots[i].tx, allDots[i].ty, 3);
        }
    }
}

// ─── 지면 충격 파티클 (착지·바운스 공용) ────────────────
function spawnGroundImpact(scene, x) {
    playSfx('land');
    // 흙먼지 파편 — 좌우로 튀는 작은 사각형
    for (let i = 0; i < 6; i++) {
        const chip = scene.add.rectangle(
            x + Phaser.Math.Between(-10, 10),
            GROUND_Y,
            Phaser.Math.Between(3, 7),
            Phaser.Math.Between(3, 7),
            Phaser.Utils.Array.GetRandom([0xc8a060, 0xa07840, 0xe0c080, 0x806030])
        ).setDepth(6).setOrigin(0.5, 1);
        scene.physics.add.existing(chip);
        chip.body.setVelocity(
            Phaser.Math.Between(-160, 160),
            Phaser.Math.Between(-220, -60)
        );
        chip.body.setGravityY(400);
        scene.tweens.add({
            targets: chip, alpha: 0, duration: Phaser.Math.Between(400, 700),
            onComplete: () => chip.destroy()
        });
    }
    // 충격파 링 (빠르게 퍼지다 사라짐)
    const ring = scene.add.graphics().setDepth(6);
    ring.lineStyle(2, 0xffd080, 0.9).strokeEllipse(x, GROUND_Y, 12, 6);
    scene.tweens.add({
        targets: ring,
        scaleX: 5, scaleY: 3, alpha: 0,
        duration: 280,
        ease: 'Quad.Out',
        onComplete: () => ring.destroy()
    });

    // 손맛 F: 피어오르는 먼지 구름 (부드러운 원, 위로 퍼지며 페이드)
    for (let i = 0; i < 5; i++) {
        const px = x + Phaser.Math.Between(-22, 22);
        const puff = scene.add.graphics().setDepth(5).setPosition(px, GROUND_Y - 2);
        const col = Phaser.Utils.Array.GetRandom([0xb8a070, 0xa89060, 0xc8b080]);
        puff.fillStyle(col, 0.42).fillCircle(0, 0, Phaser.Math.Between(7, 13));
        scene.tweens.add({
            targets: puff,
            y: GROUND_Y - Phaser.Math.Between(22, 44),
            scaleX: 2.2, scaleY: 2.2, alpha: 0,
            duration: Phaser.Math.Between(420, 680),
            delay: i * 25,
            ease: 'Quad.Out',
            onComplete: () => puff.destroy()
        });
    }
}

// ─── 착지 폭발 (폭발 패시브 — 지면 충돌 시) ──────────
function spawnGroundExplosion(scene, gx, gy, stone) {
    playSfx('explosion');
    const EXPL_R = 130;
    const dmg    = stone ? (stone.damage ?? STONE_DAMAGE) : STONE_DAMAGE;

    // 범위 내 새 데미지
    birds.getChildren().slice().forEach(b => {
        if (!b.active) return;
        if (Phaser.Math.Distance.Between(gx, gy, b.x, b.y) <= EXPL_R) {
            b.hp = (b.hp ?? 1) - dmg;
            if (b.hp <= 0) {
                const ebx = b.x, eby = b.y;
                const emat = b.materialValue ?? 10;
                const ebk  = b.texture ? b.texture.key : null;
                b.destroy();
                roundBirdsHit++; roundMaterial += emat + getScrapBonus(); totalBirdsHit++;
                remainingBirds = Math.max(0, remainingBirds - 1);
                refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                showKillFx(sceneRef, ebx, eby, emat, ebk);
            } else {
                scene.tweens.add({ targets: b, alpha: 0.2, duration: 60, yoyo: true, repeat: 2,
                    onComplete: () => { if (b && b.active) b.setAlpha(1); } });
            }
        }
    });

    // 비주얼 (hitBird 폭발과 동일 연출)
    const flash = scene.add.graphics().setDepth(9).setPosition(gx, gy);
    flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 18);
    scene.tweens.add({ targets: flash, scaleX: 2.8, scaleY: 2.8, alpha: 0,
        duration: 160, ease: 'Quad.Out', onComplete: () => flash.destroy() });

    [[0xffff99, 5, 0], [0xff9933, 4, 55], [0xff4400, 3, 110]].forEach(([col, lw, delay]) => {
        const ring = scene.add.graphics().setDepth(8).setPosition(gx, gy);
        ring.lineStyle(lw, col, 1).strokeCircle(0, 0, 10);
        const ts = EXPL_R / 10;
        scene.tweens.add({ targets: ring, scaleX: ts, scaleY: ts, alpha: 0,
            duration: 380, delay, ease: 'Cubic.Out', onComplete: () => ring.destroy() });
    });

    for (let i = 0; i < 8; i++) {
        const ang  = (i / 8) * Math.PI * 2;
        const dist = EXPL_R * (0.7 + Math.random() * 0.3);
        const spark = scene.add.graphics().setDepth(7).setPosition(gx, gy);
        spark.fillStyle(i % 2 === 0 ? 0xff7700 : 0xffdd22, 1).fillCircle(0, 0, 5 - Math.floor(i / 3));
        scene.tweens.add({ targets: spark,
            x: gx + Math.cos(ang) * dist,
            y: gy + Math.sin(ang) * dist,
            scaleX: 0.2, scaleY: 0.2, alpha: 0,
            duration: 420 + i * 15, ease: 'Quad.Out',
            onComplete: () => spark.destroy() });
    }

    scene.cameras.main.shake(200, 0.018);

    // 착지 폭발 처치 후 라운드 클리어 체크
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
    }
}

// ─── 번개탄 비주얼: 프레임 밖 하늘에서 내려치는 번개 ──
function spawnLightningFx(scene, cx, cy, radius) {
    const cam    = scene.cameras.main;
    // 화면 상단보다 위 — 완전히 프레임 밖에서 시작
    const skyTop = cam.scrollY - 80;

    const BOLT_COUNT = 4;

    for (let i = 0; i < BOLT_COUNT; i++) {
        // 착지 지점: 반경 내 랜덤 (첫 번째는 돌 중심)
        const ang   = Math.random() * Math.PI * 2;
        const dist  = (i === 0) ? 0 : Math.random() * radius * 0.8;
        const landX = cx + Math.cos(ang) * dist;
        const landY = cy + Math.sin(ang) * dist * 0.35;

        // 시작점: 프레임 밖 상단, 착지 X에서 살짝만 벗어남
        const startX = landX + (Math.random() - 0.5) * 18;
        const startY = skyTop;

        // 지그재그 경로 — 세그먼트 많이, 흔들림 크게
        const SEGS = 10;
        const pts  = [{ x: startX, y: startY }];
        for (let j = 1; j < SEGS; j++) {
            const t = j / SEGS;
            pts.push({
                x: startX + (landX - startX) * t + (Math.random() - 0.5) * 48,
                y: startY + (landY - startY) * t,
            });
        }
        pts.push({ x: landX, y: landY });

        scene.time.delayedCall(i * 60, () => {
            const g = scene.add.graphics().setDepth(9);

            // 외곽: 하늘색 굵은 선
            g.lineStyle(4, 0x44ccff, 0.9);
            g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
            g.strokePath();

            // 내심: 흰색 얇은 선
            g.lineStyle(1.5, 0xffffff, 1);
            g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
            g.strokePath();

            // 착지 섬광
            const impact = scene.add.graphics().setDepth(10).setPosition(landX, landY);
            impact.fillStyle(0xffffff, 1).fillCircle(0, 0, 12);
            impact.lineStyle(2, 0x88eeff, 1).strokeCircle(0, 0, 22);
            scene.tweens.add({ targets: impact, scaleX: 2.8, scaleY: 2.8, alpha: 0,
                duration: 220, ease: 'Quad.Out', onComplete: () => impact.destroy() });

            // 번개 빠르게 페이드
            scene.tweens.add({ targets: g, alpha: 0, duration: 150,
                ease: 'Quad.In', onComplete: () => g.destroy() });

            if (i === 0) scene.cameras.main.shake(60, 0.007);
        });
    }
}

// ─── 핵탄두 (LEGENDARY): 명중 시 화면 전체 폭발 + 모든 적 즉사 ──
function spawnNukeEffect(scene, x, y) {
    if (!scene) return;
    const cam  = scene.cameras.main;
    const camW = config.width, camH = config.height;

    // ══════ Phase 1: 백색 섬광 + 2차 노란 섬광 ══════
    const screenFlash = scene.add.graphics().setDepth(30).setScrollFactor(0);
    screenFlash.fillStyle(0xffffff, 1).fillRect(0, 0, camW, camH);
    scene.tweens.add({ targets: screenFlash, alpha: 0,
        duration: 700, ease: 'Quad.In',
        onComplete: () => screenFlash.destroy() });

    // 2차 노란 섬광 — 잔상
    scene.time.delayedCall(120, () => {
        const yflash = scene.add.graphics().setDepth(29).setScrollFactor(0);
        yflash.fillStyle(0xffdd44, 0.8).fillRect(0, 0, camW, camH);
        scene.tweens.add({ targets: yflash, alpha: 0,
            duration: 600, ease: 'Quad.In',
            onComplete: () => yflash.destroy() });
    });

    // 중심 백열구 — 폭발의 핵 (1.5배 확대)
    const core = scene.add.graphics().setDepth(20).setPosition(x, y);
    core.fillStyle(0xffffee, 1).fillCircle(0, 0, 80);
    scene.tweens.add({ targets: core,
        scaleX: 14, scaleY: 14, alpha: 0,
        duration: 1100, ease: 'Quad.Out',
        onComplete: () => core.destroy() });

    // 내부 화염구 (오렌지) — 핵 중심 안쪽
    const fireball = scene.add.graphics().setDepth(19).setPosition(x, y);
    fireball.fillStyle(0xff8822, 1).fillCircle(0, 0, 60);
    scene.tweens.add({ targets: fireball,
        scaleX: 8, scaleY: 8, alpha: 0,
        duration: 950, delay: 80, ease: 'Quad.Out',
        onComplete: () => fireball.destroy() });

    // ══════ Phase 2: 다층 충격파 링 (8겹 — 백→황→주→적→암적) ══════
    const RING_DEFS = [
        { col: 0xffffff, lw:10, delay:   0, dur:  900, finalScale: 18 },
        { col: 0xffffee, lw: 8, delay:  60, dur:  950, finalScale: 24 },
        { col: 0xffee44, lw: 7, delay: 130, dur: 1000, finalScale: 30 },
        { col: 0xffaa22, lw: 6, delay: 200, dur: 1100, finalScale: 36 },
        { col: 0xff7700, lw: 5, delay: 290, dur: 1200, finalScale: 42 },
        { col: 0xff4400, lw: 4, delay: 380, dur: 1300, finalScale: 48 },
        { col: 0xdd2200, lw: 3, delay: 470, dur: 1400, finalScale: 54 },
        { col: 0xaa1100, lw: 2, delay: 560, dur: 1500, finalScale: 60 },
    ];
    RING_DEFS.forEach(({ col, lw, delay, dur, finalScale }) => {
        const ring = scene.add.graphics().setDepth(15).setPosition(x, y);
        ring.lineStyle(lw, col, 1).strokeCircle(0, 0, 26);
        scene.tweens.add({ targets: ring,
            scaleX: finalScale, scaleY: finalScale, alpha: 0,
            duration: dur, delay, ease: 'Cubic.Out',
            onComplete: () => ring.destroy() });
    });

    // ══════ Phase 3: 24방향 광선 (빛살) — 2겹 (백 + 황) ══════
    for (let i = 0; i < 24; i++) {
        const ang = (i / 24) * Math.PI * 2 + Math.random() * 0.05;
        // 백색 코어
        const rayCore = scene.add.graphics().setDepth(17).setPosition(x, y);
        rayCore.fillStyle(0xffffee, 0.95).fillTriangle(0, -5, 0, 5, 280, 0);
        rayCore.setRotation(ang);
        scene.tweens.add({ targets: rayCore,
            scaleX: 6, alpha: 0,
            duration: 800, delay: 40, ease: 'Quad.Out',
            onComplete: () => rayCore.destroy() });
        // 노란 외곽
        const rayGlow = scene.add.graphics().setDepth(16).setPosition(x, y);
        rayGlow.fillStyle(0xffee44, 0.7).fillTriangle(0, -12, 0, 12, 260, 0);
        rayGlow.setRotation(ang);
        scene.tweens.add({ targets: rayGlow,
            scaleX: 5.5, alpha: 0,
            duration: 750, delay: 60, ease: 'Quad.Out',
            onComplete: () => rayGlow.destroy() });
    }

    // ══════ Phase 4: 8방향 번개 (지그재그 광선) — 화면 가장자리까지 ══════
    for (let i = 0; i < 8; i++) {
        const ang  = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
        const len  = 500 + Math.random() * 200;
        const endX = x + Math.cos(ang) * len;
        const endY = y + Math.sin(ang) * len;
        const pts  = [{ x, y }];
        const SEGS = 10;
        for (let j = 1; j < SEGS; j++) {
            const t = j / SEGS;
            pts.push({
                x: x + (endX - x) * t + (Math.random() - 0.5) * 80,
                y: y + (endY - y) * t + (Math.random() - 0.5) * 80,
            });
        }
        pts.push({ x: endX, y: endY });

        scene.time.delayedCall(30 + i * 20, () => {
            const bolt = scene.add.graphics().setDepth(18);
            bolt.lineStyle(6, 0xffeebb, 0.9);
            bolt.beginPath(); bolt.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => bolt.lineTo(p.x, p.y));
            bolt.strokePath();
            bolt.lineStyle(2.5, 0xffffff, 1);
            bolt.beginPath(); bolt.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => bolt.lineTo(p.x, p.y));
            bolt.strokePath();
            scene.tweens.add({ targets: bolt, alpha: 0,
                duration: 280, ease: 'Quad.In',
                onComplete: () => bolt.destroy() });
        });
    }

    // ══════ Phase 5: 버섯구름 (강화) ══════
    // 줄기 (지면에서 위로 솟구침)
    const stem = scene.add.graphics().setDepth(14).setPosition(x, GROUND_Y);
    stem.fillStyle(0xdddddd, 0.85).fillRect(-60, -420, 120, 420);
    stem.fillStyle(0xaaaaaa, 0.65).fillRect(-42, -410, 84, 410);
    stem.fillStyle(0x888888, 0.45).fillRect(-26, -400, 52, 400);
    stem.setScale(1, 0.05);
    scene.tweens.add({ targets: stem,
        scaleY: 1, alpha: 0.75,
        duration: 700, ease: 'Quad.Out' });
    scene.tweens.add({ targets: stem,
        alpha: 0, duration: 1700, delay: 1400, ease: 'Quad.In',
        onComplete: () => stem.destroy() });

    // 갓 (mushroom cap) — 더 크고 입체적
    const cap = scene.add.graphics().setDepth(15).setPosition(x, GROUND_Y - 400);
    cap.fillStyle(0xeeeeee, 0.85).fillCircle(0, 0, 95);
    cap.fillStyle(0xcccccc, 0.7).fillCircle(-40, -15, 65);
    cap.fillStyle(0xcccccc, 0.7).fillCircle(40, -15, 65);
    cap.fillStyle(0xbbbbbb, 0.65).fillCircle(-22, 12, 52);
    cap.fillStyle(0xbbbbbb, 0.65).fillCircle(22, 12, 52);
    cap.fillStyle(0x999999, 0.5).fillCircle(0, 5, 55);
    cap.setScale(0.08);
    cap.setAlpha(0.95);
    scene.tweens.add({ targets: cap,
        scaleX: 4.5, scaleY: 3.2,
        y: GROUND_Y - 500,
        duration: 1100, delay: 350, ease: 'Cubic.Out' });
    scene.tweens.add({ targets: cap, alpha: 0,
        duration: 1500, delay: 1700, ease: 'Quad.In',
        onComplete: () => cap.destroy() });

    // ══════ Phase 6: 화면 전반 잔열 입자 (80개로 대폭 증가) ══════
    for (let i = 0; i < 80; i++) {
        const ang = Math.random() * Math.PI * 2;
        const speed = 250 + Math.random() * 600;
        const startD = 20 + Math.random() * 50;
        const sx = x + Math.cos(ang) * startD;
        const sy = y + Math.sin(ang) * startD;

        // 색상 풀: 백·황·주·적
        const palette = [0xffffff, 0xffee88, 0xff8844, 0xff4422];
        const col = palette[Math.floor(Math.random() * palette.length)];
        const radius = 3 + Math.random() * 5;

        const ember = scene.add.graphics().setDepth(13).setPosition(sx, sy);
        ember.fillStyle(col, 1).fillCircle(0, 0, radius);

        scene.tweens.add({ targets: ember,
            x: sx + Math.cos(ang) * speed,
            y: sy + Math.sin(ang) * speed,
            scaleX: 0.15, scaleY: 0.15, alpha: 0,
            duration: 900 + Math.random() * 800,
            delay: Math.random() * 60,
            ease: 'Quad.Out',
            onComplete: () => ember.destroy() });
    }

    // ══════ Phase 7: 2차 소형 폭발 (위성 폭발 6개) ══════
    for (let i = 0; i < 6; i++) {
        const dx = (Math.random() - 0.5) * 600;
        const dy = (Math.random() - 0.5) * 400 - 50;
        const delay = 120 + i * 90;

        scene.time.delayedCall(delay, () => {
            const mx = x + dx, my = y + dy;
            // 작은 섬광
            const mini = scene.add.graphics().setDepth(14).setPosition(mx, my);
            mini.fillStyle(0xffeecc, 1).fillCircle(0, 0, 30);
            scene.tweens.add({ targets: mini,
                scaleX: 3.5, scaleY: 3.5, alpha: 0,
                duration: 450, ease: 'Quad.Out',
                onComplete: () => mini.destroy() });
            // 미니 링
            const miniRing = scene.add.graphics().setDepth(13).setPosition(mx, my);
            miniRing.lineStyle(3, 0xff9933, 1).strokeCircle(0, 0, 20);
            scene.tweens.add({ targets: miniRing,
                scaleX: 5, scaleY: 5, alpha: 0,
                duration: 500, ease: 'Cubic.Out',
                onComplete: () => miniRing.destroy() });
        });
    }

    // ══════ Phase 8: 카메라 강타 + 다중 flash ══════
    cam.shake(1500, 0.05);   // 1200→1500ms, 0.035→0.05 강도 증가
    cam.flash(220, 255, 240, 200);
    scene.time.delayedCall(180, () => cam.flash(140, 255, 180, 80));
    scene.time.delayedCall(380, () => cam.flash(100, 255, 100, 50));

    // ══════ Phase 9: '☢ 핵 폭 발 ☢' 자막 ══════
    const subtitle = scene.add.text(640, 280, '☢  핵 폭 발  ☢', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '84px',
        color: '#ffee00',
        stroke: '#aa0000',
        strokeThickness: 2,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(31);

    subtitle.setAlpha(0).setScale(0.25);
    scene.tweens.add({ targets: subtitle,
        alpha: 1, scaleX: 1.20, scaleY: 1.20,
        duration: 360, delay: 60, ease: 'Back.Out' });
    scene.tweens.add({ targets: subtitle,
        scaleX: 1.0, scaleY: 1.0,
        duration: 200, delay: 420 });
    // 미세 진동 — 강렬한 느낌
    scene.tweens.add({ targets: subtitle,
        angle: { from: -1.5, to: 1.5 },
        duration: 60, delay: 600, yoyo: true, repeat: 6 });
    scene.tweens.add({ targets: subtitle,
        alpha: 0, y: 230,
        duration: 800, delay: 1500, ease: 'Quad.In',
        onComplete: () => subtitle.destroy() });
}

// ─── 핵탄두: 화면(카메라 뷰) 내 모든 적 즉사 ────────────
// "화면에 나타난 적"만 죽임 — 카메라 worldView 안의 적만 대상
// 거리 기반 순차 폭발 (가까운 적부터 죽음 → 충격파 확장 느낌)
function annihilateAllEnemies(scene, originX, originY) {
    // 화면(카메라 뷰) 영역 계산
    const cam   = scene.cameras.main;
    const view  = cam.worldView;   // Rectangle: x, y, width, height — 현재 카메라가 보고 있는 월드 영역
    // worldView가 즉시 갱신되지 않은 경우(스크롤 직후) 대비해 매뉴얼 계산도 fallback
    const minX  = view ? view.x : cam.scrollX;
    const minY  = view ? view.y : cam.scrollY;
    const maxX  = minX + (view ? view.width  : config.width  / cam.zoom);
    const maxY  = minY + (view ? view.height : config.height / cam.zoom);
    const PAD   = 30;  // 화면 가장자리 여유 (살짝 밖에 있어도 OK)

    const targets = birds.getChildren().filter(b => {
        if (!b.active) return false;
        // 화면 영역 내(약간 여유 포함)에 있는 적만
        return b.x >= minX - PAD && b.x <= maxX + PAD
            && b.y >= minY - PAD && b.y <= maxY + PAD;
    }).slice();
    if (targets.length === 0) return;

    targets.forEach(b => {
        if (!b.active) return;
        const dist  = Phaser.Math.Distance.Between(originX, originY, b.x, b.y);
        const delay = Math.min(950, dist * 0.18);  // 거리 기반 0~950ms

        scene.time.delayedCall(delay, () => {
            if (!b.active) return;
            const bx = b.x, by = b.y;
            const mat = b.materialValue ?? 10;
            const bk  = b.texture?.key;

            // 적 폭발 (작은 흰색 섬광 + 노란 잔불)
            const puff = scene.add.graphics().setDepth(12).setPosition(bx, by);
            puff.fillStyle(0xffeecc, 1).fillCircle(0, 0, 18);
            scene.tweens.add({ targets: puff,
                scaleX: 3, scaleY: 3, alpha: 0,
                duration: 380, ease: 'Quad.Out',
                onComplete: () => puff.destroy() });

            // 4방향 작은 파편
            for (let k = 0; k < 4; k++) {
                const sAng = (k / 4) * Math.PI * 2 + Math.random() * 0.5;
                const sDist = 25 + Math.random() * 20;
                const sp = scene.add.graphics().setDepth(11).setPosition(bx, by);
                sp.fillStyle(0xff9944, 1).fillCircle(0, 0, 3);
                scene.tweens.add({ targets: sp,
                    x: bx + Math.cos(sAng) * sDist,
                    y: by + Math.sin(sAng) * sDist,
                    alpha: 0, scaleX: 0.3, scaleY: 0.3,
                    duration: 350, ease: 'Quad.Out',
                    onComplete: () => sp.destroy() });
            }

            // 처치 처리
            b.destroy();
            roundBirdsHit++; roundMaterial += mat + getScrapBonus(); totalBirdsHit++;
            remainingBirds = Math.max(0, remainingBirds - 1);
            refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();

            showKillFx(scene, bx, by, mat, bk);
        });
    });

    // 모든 적 즉사 완료 후 라운드 클리어 체크
    scene.time.delayedCall(1500, () => {
        if (remainingBirds <= 0 && !isRoundEnding) {
            isRoundEnding = true;
            scene.time.delayedCall(500, () => showRoundClear(scene), [], scene);
        }
    });
}

// ─── 적 슬로우모션 — 차원균열 동안 새들이 느려짐 ────────
// factor: 속도 배수 (0.2 = 5배 느림)
// durationMs: 슬로우 유지 시간 (이후 원래 속도로 복귀)
function applyEnemySlowMotion(scene, factor, durationMs) {
    if (!scene || !birds) return;
    const targets = [];
    birds.getChildren().forEach(b => {
        if (!b.active || !b.body) return;
        // 원본 velocity 저장 + factor 적용
        b._slowOrigVX = b.body.velocity.x;
        b._slowOrigVY = b.body.velocity.y;
        b.body.setVelocity(b._slowOrigVX * factor, b._slowOrigVY * factor);
        // y-axis 부유 트윈도 같이 느려짐
        if (b.floatTween) {
            b._slowOrigTS = b.floatTween.timeScale;
            b.floatTween.timeScale = factor;
        }
        targets.push(b);
    });

    scene.time.delayedCall(durationMs, () => {
        targets.forEach(b => {
            if (!b.active || !b.body) return;
            if (b._slowOrigVX !== undefined) {
                // 슬로우 중 벽에 부딪혀 방향이 바뀐 경우 — 현재 방향 부호 유지
                const curVX = b.body.velocity.x;
                const restoredVX = curVX === 0 ? b._slowOrigVX
                                   : Math.sign(curVX) * Math.abs(b._slowOrigVX);
                b.body.setVelocity(restoredVX, b._slowOrigVY);
                b._slowOrigVX = b._slowOrigVY = undefined;
            }
            if (b.floatTween) {
                b.floatTween.timeScale = b._slowOrigTS ?? 1;
                b._slowOrigTS = undefined;
            }
        });
    });
}

// ─── 차원균열 (LEGENDARY): 화면 전체 색상 반전 + 블랙홀 다이아 ──
// 총 효과 시간 약 4초. 효과 동안 새들은 슬로우모션 (0.18배)
const RIFT_TOTAL_MS    = 4000;   // 효과 전체 시간
const RIFT_FADE_AT     = 3300;   // fade-out 시작 시점
const RIFT_FADE_DUR    = 700;
const RIFT_SLOWMO_FAC  = 0.18;   // 새들 속도 배수 (5.5배 느림)

function spawnDimensionalRift(scene, x, y) {
    if (!scene) return;
    const RIFT_HALF = 500;
    const cam = scene.cameras.main;
    const camW = config.width, camH = config.height;

    // 다이아 꼭지점 (top, right, bottom, left) — 상대 좌표
    const pts = [
        { x: 0, y: -RIFT_HALF },
        { x: RIFT_HALF, y: 0 },
        { x: 0, y: RIFT_HALF },
        { x: -RIFT_HALF, y: 0 },
    ];
    const drawDiamond = (g, scale = 1) => {
        g.beginPath();
        g.moveTo(pts[0].x * scale, pts[0].y * scale);
        g.lineTo(pts[1].x * scale, pts[1].y * scale);
        g.lineTo(pts[2].x * scale, pts[2].y * scale);
        g.lineTo(pts[3].x * scale, pts[3].y * scale);
        g.closePath();
    };

    // ══════ 슬로우모션 ══════
    applyEnemySlowMotion(scene, RIFT_SLOWMO_FAC, RIFT_TOTAL_MS);

    // ══════ 1. 화면 전체 색상 반전 (DIFFERENCE blend + 흰색 fullscreen rect) ══════
    // 흰색을 DIFFERENCE 블렌드로 그리면 아래의 모든 색이 반전됨 (white = 1, 1-color = invert)
    const invertOverlay = scene.add.graphics().setDepth(26).setScrollFactor(0);
    invertOverlay.fillStyle(0xffffff, 1).fillRect(0, 0, camW, camH);
    invertOverlay.setBlendMode(Phaser.BlendModes.DIFFERENCE);
    invertOverlay.setAlpha(0);
    // Fade-in 빠르게, 오래 유지, fade-out
    scene.tweens.add({ targets: invertOverlay, alpha: 1, duration: 220, ease: 'Quad.Out' });
    scene.tweens.add({ targets: invertOverlay, alpha: 0, duration: RIFT_FADE_DUR,
        delay: RIFT_FADE_AT, ease: 'Quad.In',
        onComplete: () => invertOverlay.destroy() });
    // 색상 반전 깜빡임 (불안정한 차원) — fade-out 전까지 지속
    scene.tweens.add({ targets: invertOverlay, alpha: 0.55,
        duration: 240, delay: 350,
        yoyo: true, repeat: 5, ease: 'Sine.InOut' });

    // ══════ 2. 블랙홀 다이아 (월드 좌표 — 공 주변) ══════
    const glow = scene.add.graphics().setDepth(27).setPosition(x, y);
    glow.fillStyle(0x4400aa, 0.5);
    drawDiamond(glow, 1.15);
    glow.fillPath();

    const diamond = scene.add.graphics().setDepth(28).setPosition(x, y);
    diamond.fillStyle(0x1a0825, 1);  drawDiamond(diamond, 1.0);  diamond.fillPath();
    diamond.fillStyle(0x0a0014, 1);  drawDiamond(diamond, 0.75); diamond.fillPath();
    diamond.fillStyle(0x000000, 1);  drawDiamond(diamond, 0.45); diamond.fillPath();
    diamond.fillStyle(0x6633ff, 0.85); drawDiamond(diamond, 0.12); diamond.fillPath();
    diamond.fillStyle(0xffffff, 0.9).fillCircle(0, 0, 4);

    const outline = scene.add.graphics().setDepth(29).setPosition(x, y);
    outline.lineStyle(7, 0x9933ff, 1);    drawDiamond(outline, 1.0); outline.strokePath();
    outline.lineStyle(3, 0x44ddff, 0.95); drawDiamond(outline, 1.0); outline.strokePath();

    // 등장 애니메이션 (Back.Out)
    [glow, diamond, outline].forEach(g => { g.setScale(0).setAlpha(0); });
    scene.tweens.add({
        targets: [glow, diamond, outline],
        scaleX: 1, scaleY: 1, alpha: 1,
        duration: 380, ease: 'Back.Out'
    });
    // 외곽 글로우 펄스 (지속적 진동 — 길어진 효과 동안 계속)
    scene.tweens.add({
        targets: glow,
        scaleX: 1.10, scaleY: 1.10, alpha: 0.7,
        duration: 480, delay: 380,
        yoyo: true, repeat: 5, ease: 'Sine.InOut'
    });
    // 본체 천천히 회전 (블랙홀 회전 — 긴 시간 동안 풀 회전)
    scene.tweens.add({
        targets: [diamond, outline],
        angle: 180,
        duration: RIFT_TOTAL_MS - 600, delay: 200,
        ease: 'Linear'
    });

    // 페이드 아웃 (효과 끝)
    scene.tweens.add({
        targets: [glow, diamond, outline],
        scaleX: 0.5, scaleY: 0.5, alpha: 0,
        duration: RIFT_FADE_DUR, delay: RIFT_FADE_AT,
        ease: 'Cubic.In',
        onComplete: () => {
            glow.destroy(); diamond.destroy(); outline.destroy();
        }
    });

    // ══════ 3. 차원 파편 — 효과 시간 내내 지속적으로 빨려들어감 ══════
    // 60개 파편을 시간차를 두고 spawning — 단발 폭발이 아닌 흐름
    for (let i = 0; i < 60; i++) {
        const ang = Math.random() * Math.PI * 2;
        const startDist = RIFT_HALF * (0.55 + Math.random() * 0.40);
        const sx = x + Math.cos(ang) * startDist * 0.8;
        const sy = y + Math.sin(ang) * startDist * 0.6;
        const col = Math.random() < 0.5 ? 0xaa44ff : 0x44ddff;
        const sparkle = scene.add.graphics().setDepth(30).setPosition(sx, sy);
        sparkle.fillStyle(col, 1).fillRect(-3, -3, 6, 6);
        scene.tweens.add({
            targets: sparkle,
            x: x, y: y,
            alpha: 0, scaleX: 0.1, scaleY: 0.1,
            angle: Phaser.Math.Between(360, 900),
            duration: 1200 + Math.random() * 1000,    // 더 긴 흡수 시간
            delay: 200 + Math.random() * 2400,         // 효과 시간 내내 분산
            ease: 'Cubic.In',
            onComplete: () => sparkle.destroy()
        });
    }

    // ══════ 4. 카메라 효과 (긴 셰이크) ══════
    cam.shake(RIFT_TOTAL_MS - 400, 0.018);
    cam.flash(220, 100, 30, 200);

    // ══════ 5. 자막 (오래 유지) ══════
    const subtitle = scene.add.text(640, 240, '◇  차 원 균 열  ◇', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '64px',
        color: '#cc66ff',
        stroke: '#001144',
        strokeThickness: 2,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(31);
    subtitle.setAlpha(0).setScale(0.3);
    scene.tweens.add({ targets: subtitle, alpha: 1, scaleX: 1.15, scaleY: 1.15,
        duration: 380, ease: 'Back.Out' });
    scene.tweens.add({ targets: subtitle, scaleX: 1.0, scaleY: 1.0,
        duration: 200, delay: 420 });
    // 보라↔시안 색상 진동 (효과 시간 내내)
    scene.tweens.add({
        targets: subtitle,
        duration: 350, delay: 700,
        yoyo: true, repeat: 6,
        ease: 'Linear',
        onUpdate: (tween, target) => {
            const t = tween.progress;
            target.setColor(t < 0.5 ? '#cc66ff' : '#44ddff');
        }
    });
    scene.tweens.add({ targets: subtitle, alpha: 0, y: 190,
        duration: 800, delay: RIFT_FADE_AT, ease: 'Quad.In',
        onComplete: () => subtitle.destroy() });
}

// 차원균열 안의 적 즉사 처리 (다이아 영역: |dx|+|dy| <= 500)
function killEnemiesInRift(scene, originX, originY) {
    const RIFT_HALF = 500;
    const targets = birds.getChildren().filter(b => {
        if (!b.active) return false;
        const dx = Math.abs(b.x - originX);
        const dy = Math.abs(b.y - originY);
        return (dx + dy) <= RIFT_HALF;
    }).slice();
    if (targets.length === 0) return;

    targets.forEach((b, i) => {
        // 거리 기반 점진 사망 (가까운 적부터) — 효과 시간 동안 천천히 빨려들어감
        const dist = Math.abs(b.x - originX) + Math.abs(b.y - originY);
        const delay = 200 + (dist / RIFT_HALF) * 2200;   // 200ms ~ 2400ms 분산

        scene.time.delayedCall(delay, () => {
            if (!b.active) return;
            const bx = b.x, by = b.y;
            const mat = b.materialValue ?? 10;
            const bk  = b.texture?.key;

            // 보라색 입자 폭발
            const puff = scene.add.graphics().setDepth(12).setPosition(bx, by);
            puff.fillStyle(0xff44ff, 1).fillCircle(0, 0, 18);
            scene.tweens.add({ targets: puff,
                scaleX: 3.2, scaleY: 3.2, alpha: 0,
                duration: 380, ease: 'Quad.Out',
                onComplete: () => puff.destroy() });

            // 시안색 사각형 파편 4방향
            for (let k = 0; k < 4; k++) {
                const sAng = (k / 4) * Math.PI * 2 + Math.random() * 0.3;
                const sDist = 30 + Math.random() * 25;
                const sp = scene.add.graphics().setDepth(11).setPosition(bx, by);
                sp.fillStyle(0x44ffff, 1).fillRect(-3, -3, 6, 6);
                scene.tweens.add({ targets: sp,
                    x: bx + Math.cos(sAng) * sDist,
                    y: by + Math.sin(sAng) * sDist,
                    alpha: 0, angle: 360,
                    duration: 400, ease: 'Quad.Out',
                    onComplete: () => sp.destroy() });
            }

            // 처치 처리
            b.destroy();
            roundBirdsHit++; roundMaterial += mat + getScrapBonus(); totalBirdsHit++;
            remainingBirds = Math.max(0, remainingBirds - 1);
            refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();

            showKillFx(scene, bx, by, mat, bk);
        });
    });

    // 라운드 클리어 체크 (모든 사망 후 — RIFT_TOTAL_MS 보다 살짝 후)
    scene.time.delayedCall(RIFT_TOTAL_MS + 200, () => {
        if (remainingBirds <= 0 && !isRoundEnding) {
            isRoundEnding = true;
            scene.time.delayedCall(500, () => showRoundClear(scene), [], scene);
        }
    });
}

// ─── 그라운드 제로 (RARE): 착지 시 하늘에서 수직 녹색 레이저 빔 ──
// 빔 폭 안의 모든 적(높이 무관)이 -1 피격
function spawnGroundZero(scene, gx) {
    playSfx('beam');
    const cam      = scene.cameras.main;
    const beamTopY = WORLD_TOP;                 // 월드 최상단(하늘 끝)부터 — 화면 밖 위쪽까지 수직 기둥
    const beamLen  = GROUND_Y - beamTopY;
    const BEAM_W   = 56;                       // 빔 시각 폭
    const HIT_HALF = BEAM_W / 2 + 6;           // 피격 판정은 시각보다 약간 넓게

    // ── 피격: 빔 세로 라인 안의 모든 적 (높이 무관) ──
    birds.getChildren().slice().forEach(b => {
        if (!b.active) return;
        if (Math.abs(b.x - gx) > HIT_HALF) return;
        b.hp = (b.hp ?? 1) - 1;
        if (b.hp <= 0) {
            const bx2 = b.x, by2 = b.y, mat2 = b.materialValue ?? 10, bk2 = b.texture?.key;
            b.destroy();
            roundBirdsHit++; roundMaterial += mat2 + getScrapBonus(); totalBirdsHit++;
            remainingBirds = Math.max(0, remainingBirds - 1);
            refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
            showKillFx(scene, bx2, by2, mat2, bk2);
        } else {
            scene.tweens.add({ targets: b, alpha: 0.15, duration: 60,
                yoyo: true, repeat: 2, onComplete: () => { if (b?.active) b.setAlpha(1); } });
        }
    });

    // ══════ 비주얼 ══════

    // 1) 지면 차징 점멸 — 빔 강하 직전 선행 표시
    const charge = scene.add.graphics().setDepth(10).setPosition(gx, GROUND_Y - 4);
    charge.fillStyle(0xeeffaa, 1).fillCircle(0, 0, 6);
    scene.tweens.add({ targets: charge, scaleX: 4, scaleY: 4, alpha: 0,
        duration: 110, ease: 'Quad.Out', onComplete: () => charge.destroy() });

    // 2) 빔 본체 (3겹 합성) — origin (0.5, 0)로 위에서 아래로 강하 (scaleY 0.04→1)
    //    외곽 글로우 → 중간 녹색 → 흰빛 코어 순으로 합성하여 깊이감 부여
    const glow = scene.add.rectangle(gx, beamTopY, BEAM_W * 1.6, beamLen, 0x44ff44, 0.22)
        .setOrigin(0.5, 0).setDepth(9);
    const mid  = scene.add.rectangle(gx, beamTopY, BEAM_W,        beamLen, 0x33ff14, 0.78)
        .setOrigin(0.5, 0).setDepth(9);
    const core = scene.add.rectangle(gx, beamTopY, BEAM_W * 0.3,  beamLen, 0xffffff, 1)
        .setOrigin(0.5, 0).setDepth(10);

    [glow, mid, core].forEach(r => { r.scaleY = 0.04; });
    scene.tweens.add({ targets: [glow, mid, core], scaleY: 1,
        duration: 90, ease: 'Quad.Out' });

    // 빔 유지 후 페이드아웃 (외곽이 먼저 사라지고 코어가 마지막까지 잔광)
    scene.tweens.add({ targets: [glow, mid], alpha: 0, duration: 280, delay: 160,
        ease: 'Quad.In', onComplete: () => { glow.destroy(); mid.destroy(); } });
    scene.tweens.add({ targets: core, alpha: 0, duration: 240, delay: 200,
        ease: 'Quad.In', onComplete: () => core.destroy() });

    // 3) 빔 본체 위에 흐르는 노이즈 라인 (역동적 느낌) — 짧은 가로 슬라이스 3개
    // 빔이 월드 전체로 길어졌으므로 슬라이스는 화면(카메라 뷰) 안에서 시작
    const camViewTop = cam.scrollY;
    const camViewH   = config.height / cam.zoom;
    for (let k = 0; k < 3; k++) {
        const slice = scene.add.rectangle(
            gx,
            camViewTop + camViewH * (0.1 + k * 0.28),
            BEAM_W * 1.1,
            5,
            0xffffff, 0.85
        ).setDepth(10);
        scene.tweens.add({
            targets: slice,
            y: GROUND_Y - 8,
            alpha: 0,
            scaleX: 0.4,
            duration: 280 + k * 40,
            delay: 30 + k * 20,
            ease: 'Quad.In',
            onComplete: () => slice.destroy()
        });
    }

    // 4) 지면 폭발 — 빔 도달 직후 (80ms 딜레이)
    scene.time.delayedCall(80, () => {
        // 백열 섬광
        const flash = scene.add.graphics().setDepth(11).setPosition(gx, GROUND_Y - 8);
        flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 28);
        scene.tweens.add({ targets: flash, scaleX: 2.6, scaleY: 2.6, alpha: 0,
            duration: 260, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // 녹색 충격파 링 — 3겹 (납작한 타원)
        const RING_DEFS = [
            { col: 0xccffaa, lw: 4, delay:   0, dur: 340 },
            { col: 0x88ff44, lw: 3, delay:  70, dur: 440 },
            { col: 0x44ee22, lw: 2, delay: 140, dur: 560 },
        ];
        RING_DEFS.forEach(({ col, lw, delay, dur }) => {
            const ring = scene.add.graphics().setDepth(9).setPosition(gx, GROUND_Y - 2);
            ring.lineStyle(lw, col, 0.95).strokeEllipse(0, 0, 18, 9);
            scene.tweens.add({ targets: ring, scaleX: 7, scaleY: 5, alpha: 0,
                duration: dur, delay, ease: 'Cubic.Out',
                onComplete: () => ring.destroy() });
        });

        // 녹색 스파크 12방향
        for (let i = 0; i < 12; i++) {
            const ang  = (i / 12) * Math.PI * 2;
            const dist = 80 + Math.random() * 70;
            const spk  = scene.add.graphics().setDepth(8).setPosition(gx, GROUND_Y - 4);
            spk.fillStyle(i % 2 === 0 ? 0xaaff44 : 0xccff88, 1)
               .fillCircle(0, 0, 4 - (i % 3));
            scene.tweens.add({ targets: spk,
                x: gx + Math.cos(ang) * dist,
                y: GROUND_Y - 4 + Math.sin(ang) * dist * 0.35,
                scaleX: 0.2, scaleY: 0.2, alpha: 0,
                duration: 500 + i * 18, ease: 'Quad.Out',
                onComplete: () => spk.destroy() });
        }

        // 흙먼지 파편 — 좌우로 갈라지는 사각형 8개
        for (let i = 0; i < 8; i++) {
            const dir  = i < 4 ? -1 : 1;
            const chip = scene.add.rectangle(gx, GROUND_Y,
                Phaser.Math.Between(3, 6), Phaser.Math.Between(3, 6),
                Phaser.Utils.Array.GetRandom([0xc8a060, 0xa07840, 0xe0c080])
            ).setDepth(7).setOrigin(0.5, 1);
            scene.physics.add.existing(chip);
            chip.body.setVelocity(dir * Phaser.Math.Between(120, 220),
                                   Phaser.Math.Between(-300, -120));
            chip.body.setGravityY(500);
            scene.tweens.add({ targets: chip, alpha: 0,
                duration: Phaser.Math.Between(550, 800),
                onComplete: () => chip.destroy() });
        }

        // 상승하는 녹색 잔열 입자 (5개) — 빔이 사라지며 위로 올라가는 잔광
        for (let i = 0; i < 5; i++) {
            const px = gx + Phaser.Math.Between(-18, 18);
            const py = GROUND_Y - 10;
            const ember = scene.add.graphics().setDepth(9).setPosition(px, py);
            ember.fillStyle(0xaaff66, 0.9).fillCircle(0, 0, 3);
            scene.tweens.add({ targets: ember,
                y: py - Phaser.Math.Between(120, 220),
                alpha: 0, scaleX: 0.3, scaleY: 0.3,
                duration: 700 + i * 80,
                delay: 60 + i * 30,
                ease: 'Quad.Out',
                onComplete: () => ember.destroy() });
        }

        scene.cameras.main.shake(220, 0.014);
    });

    // 5) 라운드 클리어 체크 (빔으로 마지막 적 처치 가능)
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        scene.time.delayedCall(900, () => showRoundClear(scene), [], scene);
    }
}

// ─── 재활용 (NORMAL): 빈손 착지 시 확률적으로 돌멩이 회수 ──
// 스택별 확률: 1=50%, 2=75%, 3=87.5% (1 - 0.5^stack)
// 메인 돌멩이만 대상 (산탄·분열 돌멩이 제외), 아무 적도 맞히지 않은 경우에 한함
function tryRecycleStone(stone) {
    if (!stone) return false;
    if (recycleStack <= 0 || !isOn('재활용')) return false;
    if (!stone.recyclable) return false;
    if (stone.hitBirds && stone.hitBirds.size > 0) return false;

    const chance = 1 - Math.pow(0.5, recycleStack);
    if (Math.random() > chance) return false;

    // 돌멩이 회수 (최대치 초과 방지)
    if (currentAmmo < currentMaxAmmo) {
        currentAmmo++;
        if (uiAmmoText) uiAmmoText.setText(`남은 돌멩이: ${currentAmmo} / ${currentMaxAmmo}`);
    }

    // 중복 방지 — 동일 돌멩이가 settled+out_of_bounds 양쪽에서 트리거 되지 않도록
    stone.recyclable = false;

    // 자막 표시 + 지면 회수 비주얼
    showRecycleSubtitle(sceneRef);
    spawnRecycleFx(sceneRef, stone.x, Math.min(stone.y, GROUND_Y));
    return true;
}

// 재활용 자막 — 화면 상단 중앙 (HUD 고정, 스케일·페이드 인 → 살짝 떠오르며 페이드 아웃)
function showRecycleSubtitle(scene) {
    if (!scene) return;
    const W = 1280;

    // 배경 글로우 (살짝 어두운 녹색 띠)
    const bg = scene.add.graphics().setScrollFactor(0).setDepth(49);
    bg.fillStyle(0x114422, 0.55).fillRoundedRect(W / 2 - 200, 158, 400, 56, 14);
    bg.lineStyle(2, 0x44ff88, 0.85).strokeRoundedRect(W / 2 - 200, 158, 400, 56, 14);

    const subtitle = scene.add.text(W / 2, 186, '♻  재활용 !  돌멩이 +1', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '26px',
        color: '#aaffcc',
        stroke: '#000000',
        strokeThickness: 2,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(50);

    subtitle.setAlpha(0).setScale(0.6);
    bg.setAlpha(0);

    // 등장: 살짝 튕기듯 확대
    scene.tweens.add({
        targets: subtitle,
        alpha: 1, scale: 1,
        duration: 220, ease: 'Back.Out'
    });
    scene.tweens.add({
        targets: bg, alpha: 1,
        duration: 180, ease: 'Quad.Out'
    });

    // 유지 후 살짝 떠오르며 페이드 아웃
    scene.tweens.add({
        targets: [subtitle, bg],
        y: '-=24', alpha: 0,
        duration: 550,
        delay: 950,
        ease: 'Quad.In',
        onComplete: () => { subtitle.destroy(); bg.destroy(); }
    });
}

// 재활용 성공 위치 비주얼 — 돌멩이가 빛이 되어 새총으로 돌아가는 연출
function spawnRecycleFx(scene, fx, fy) {
    if (!scene) return;

    // 1) 지면에서 녹색 ♻ 회수 링 (점차 좁아짐 — 빨려들어가는 느낌)
    const ring = scene.add.graphics().setDepth(7).setPosition(fx, fy);
    ring.lineStyle(3, 0x66ff99, 1).strokeCircle(0, 0, 36);
    scene.tweens.add({ targets: ring, scaleX: 0.2, scaleY: 0.2, alpha: 0,
        duration: 340, ease: 'Quad.In',
        onComplete: () => ring.destroy() });

    // 2) 6개 녹색 입자가 새총 쪽으로 빨려가는 곡선
    for (let i = 0; i < 6; i++) {
        const startAng = (i / 6) * Math.PI * 2;
        const startDist = 18 + Math.random() * 14;
        const px = fx + Math.cos(startAng) * startDist;
        const py = fy + Math.sin(startAng) * startDist;

        const dot = scene.add.graphics().setDepth(8).setPosition(px, py);
        dot.fillStyle(0xaaffcc, 1).fillCircle(0, 0, 3);

        // 새총 위치로 곡선 이동 (중간점에 살짝 위로 올라가는 호)
        scene.tweens.add({
            targets: dot,
            x: SLING_CENTER.x,
            y: SLING_CENTER.y - 10,
            alpha: 0,
            scaleX: 0.4, scaleY: 0.4,
            duration: 600 + i * 30,
            delay: i * 20,
            ease: 'Cubic.In',
            onComplete: () => dot.destroy()
        });
    }

    // 3) 새총 부근에 짧은 녹색 점멸 (도착 표시)
    scene.time.delayedCall(620, () => {
        const arrival = scene.add.graphics().setDepth(8)
            .setPosition(SLING_CENTER.x, SLING_CENTER.y - 10);
        arrival.fillStyle(0xaaffcc, 1).fillCircle(0, 0, 10);
        scene.tweens.add({ targets: arrival,
            scaleX: 2.4, scaleY: 2.4, alpha: 0,
            duration: 280, ease: 'Quad.Out',
            onComplete: () => arrival.destroy() });
    });
}

// ─── 발사 헬퍼: 단일 돌멩이 생성 + 산탄 동시 발사 ────────
// isPrimary: 사용자가 직접 발사한 메인 돌멩이 여부 (재활용 대상 / α=1)
// 발사 헬퍼 — 임의의 origin(x,y)에서 발사 가능 (default: SLING_CENTER)
// 분신 패시브에서 origin을 옮겨 같은 angle/dist로 동시 발사
function fireOneStone(angle, dist, isPrimary, originX, originY) {
    if (!sceneRef) return null;

    const defaultPos = getBallPos();
    const oX = originX ?? defaultPos.x;
    const oY = originY ?? defaultPos.y;
    const noGravity = gravityIgnoreStack > 0 && isOn('중력무시');
    const HIT_CAP   = 52;
    const effMult   = (armMuscleStack > 0 && isOn('탄성증가'))
        ? BASE_LAUNCH * Math.pow(1.2, armMuscleStack) : BASE_LAUNCH;
    const dmg = STONE_DAMAGE * Math.pow(2,
        (isOn('파워업') ? ironBallStack : 0) + (isOn('큰돌') ? bigStoneStack : 0));

    const s = activeStones.get(oX, oY, 'stone');
    if (!s) return null;

    // 똥볼 패시브: 위쪽 호 + 차징 기반 발사 강도
    let launchAngle = angle;
    let launchSpeed = dist * effMult;
    if (isDungBallOn()) {
        // 방향: 드래그 가로 성분에서 좌/우만 추출, 각도는 위쪽 60° 기준 (±15° 랜덤)
        // 드래그가 거의 없을 땐 무작위 좌/우
        const cosA = Math.cos(angle);
        const goLeft = Math.abs(cosA) < 0.01 ? Math.random() < 0.5 : cosA < 0;
        const horizOffset = 0.28 + Math.random() * 0.20;   // 16° ~ 28°
        launchAngle = -Math.PI / 2 + (goLeft ? -horizOffset : horizOffset);
        launchAngle += (Math.random() - 0.5) * 0.28;       // 똥볼 랜덤 흔들림
        // 강도: 차징 시간 (KICK_CHARGE_MAX 까지) 기반
        const heldMs = Math.max(0, Date.now() - _kickChargeStart);
        const charge = Math.min(1.0, heldMs / KICK_CHARGE_MAX);
        launchSpeed = KICK_SPEED_MIN + charge * (KICK_SPEED_MAX - KICK_SPEED_MIN);
    }

    s.setActive(true).setVisible(true).setDepth(1);
    s.setScale(getStoneScale());
    s.body.setSize(Math.min(s.displayWidth, HIT_CAP), Math.min(s.displayHeight, HIT_CAP));
    s.body.reset(oX, oY);
    s.body.allowGravity = !noGravity;
    s.setVelocity(Math.cos(launchAngle) * launchSpeed, Math.sin(launchAngle) * launchSpeed);
    s.body.setGravityY(0);
    s.damage           = dmg;
    s.bounceCount      = 0;
    s.settled          = false;
    s.magnetFired      = false;
    s.magnetTarget     = null;
    s.magnetTrackTime  = 0;
    s.magnetHitCooldown= 0;
    s.lightningTimer   = 0;
    s.hitBirds         = new Set();
    s.splitGen         = 0;
    s.recyclable       = isPrimary;     // 메인 발사만 재활용 가능
    s.noGravity        = noGravity;
    s.lifetime         = 0;
    s.setAlpha(isPrimary ? 1 : 0.92);
    applyStoneTint(s);

    // 산탄: ±20° 추가 2방향 동시 발사 (각 발사마다 적용)
    if (shotgunStack > 0 && isOn('산탄')) {
        [-0.175, 0.175].forEach(offset => {
            const sa = activeStones.get(oX, oY, 'stone');
            if (!sa) return;
            sa.setActive(true).setVisible(true).setDepth(1);
            sa.setScale(getStoneScale() * 0.75);
            sa.body.setSize(Math.min(sa.displayWidth, HIT_CAP), Math.min(sa.displayHeight, HIT_CAP));
            sa.body.reset(oX, oY);
            sa.body.allowGravity = !noGravity;
            sa.setVelocity(Math.cos(launchAngle + offset) * launchSpeed,
                           Math.sin(launchAngle + offset) * launchSpeed);
            sa.body.setGravityY(0);
            sa.damage           = dmg;
            sa.bounceCount      = 0;
            sa.settled          = false;
            sa.magnetFired      = false;
            sa.magnetTarget     = null;
            sa.magnetTrackTime  = 0;
            sa.magnetHitCooldown= 0;
            sa.lightningTimer   = 0;
            sa.hitBirds         = new Set();
            sa.splitGen         = 0;
            sa.recyclable       = false;
            sa.noGravity        = noGravity;
            sa.lifetime         = 0;
            sa.setAlpha(0.85);
            applyStoneTint(sa);
        });
    }

    return s;
}

// 분신 + 메인 동시 발사 — 산탄·다발장전 등 모든 발사 효과가 자동으로 양쪽에 적용됨
function fireVolley(angle, dist, isPrimary) {
    const s = fireOneStone(angle, dist, isPrimary);
    // 분신: 쌍둥이 새총에서도 동일한 각도/세기로 발사 (똥볼 모드일 땐 새총이 없으므로 비활성)
    if (twinStack > 0 && isOn('분신') && !isDungBallOn()) {
        const tx = SLING_CENTER.x + TWIN_OFFSET_X;
        const ty = SLING_CENTER.y;
        fireOneStone(angle, dist, false, tx, ty);
    }
    return s;
}

// ─── 슬링샷 boing 애니메이션 (발사 시 탄성 복원) ────────
function triggerSlingBoing() {
    if (_tiltTween) _tiltTween.stop();
    const startTilt = _slingTilt;
    if (Math.abs(startTilt) < 0.001) {
        _slingTilt = 0;
        redrawSlingStand();
        redrawTwinStand();
        return;
    }
    // 발사 방향 반대로 살짝 더 튕긴 뒤 진동하며 0으로 복귀
    const overshoot = -startTilt * 0.45;
    const obj = { v: startTilt };
    _tiltTween = sceneRef.tweens.add({
        targets: obj,
        v: { from: startTilt, to: 0 },
        duration: 750,
        ease: 'Elastic.Out',
        easeParams: [1.2, 0.45],
        onUpdate: () => {
            _slingTilt = obj.v;
            redrawSlingStand();
            redrawTwinStand();
        },
        onComplete: () => {
            _slingTilt = 0;
            redrawSlingStand();
            redrawTwinStand();
            _tiltTween = null;
        }
    });
}

// ─── 시간정지 (NORMAL): 발사 후 모든 적 3초 정지 ────────
const TIME_STOP_DURATION = 3000;
function triggerTimeStop(scene) {
    if (!scene) return;
    // 모든 적 velocity 저장 후 0으로 + tween 일시정지
    const frozen = [];
    birds.getChildren().forEach(b => {
        if (!b.active) return;
        const vx = b.body.velocity.x, vy = b.body.velocity.y;
        b._frozenVX = vx; b._frozenVY = vy;
        b.body.setVelocity(0, 0);
        if (b.floatTween && !b.floatTween.isPaused()) {
            b.floatTween.pause();
            b._floatPaused = true;
        }
        frozen.push(b);
    });

    // ── 시각 신호: 시간정지 ──
    // 화면 전체에 푸르스름한 잔상 + '⏱ TIME STOP' 자막
    const camW = config.width, camH = config.height;
    const tint = scene.add.graphics().setDepth(28).setScrollFactor(0);
    tint.fillStyle(0x88ccff, 0.18).fillRect(0, 0, camW, camH);
    scene.tweens.add({ targets: tint, alpha: 0,
        duration: TIME_STOP_DURATION, ease: 'Quad.In',
        onComplete: () => tint.destroy() });

    const label = scene.add.text(640, 110, '⏱  시 간 정 지', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '34px',
        color: '#ccddff',
        stroke: '#1a3a6a',
        strokeThickness: 2,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(29);
    label.setAlpha(0).setScale(0.6);
    scene.tweens.add({ targets: label, alpha: 1, scale: 1,
        duration: 180, ease: 'Back.Out' });
    scene.tweens.add({ targets: label, alpha: 0, y: 90,
        duration: 350, delay: TIME_STOP_DURATION - 250,
        ease: 'Quad.In',
        onComplete: () => label.destroy() });

    // 정해진 시간 후 정지 해제
    scene.time.delayedCall(TIME_STOP_DURATION, () => {
        frozen.forEach(b => {
            if (!b.active) return;
            const vx = b._frozenVX ?? 0, vy = b._frozenVY ?? 0;
            b.body.setVelocity(vx, vy);
            b._frozenVX = b._frozenVY = undefined;
            if (b._floatPaused && b.floatTween) {
                b.floatTween.resume();
                b._floatPaused = false;
            }
        });
    });
}

// 다발장전 추가탄 발사 시각 신호 (새총 머리에 노란 펄스)
function spawnBurstPuff(scene) {
    if (!scene) return;
    const puff = scene.add.graphics().setDepth(7).setPosition(SLING_CENTER.x, SLING_CENTER.y - 8);
    puff.fillStyle(0xffee66, 0.95).fillCircle(0, 0, 8);
    scene.tweens.add({ targets: puff,
        scaleX: 2.4, scaleY: 2.4, alpha: 0,
        duration: 240, ease: 'Quad.Out',
        onComplete: () => puff.destroy() });
}

// ─── 발사 ─────────────────────────────────────────────
function doFireStone(px, py) {
    if (!isDragging || !currentStone) return;
    isDragging = false;
    trajectoryGraphics.clear();

    const origin = getBallPos();
    const angle  = Phaser.Math.Angle.Between(currentStone.x, currentStone.y, origin.x, origin.y);
    let   dist   = Phaser.Math.Distance.Between(currentStone.x, currentStone.y, origin.x, origin.y);

    // 똥볼: 드래그 거리 없어도 차징만으로 발사 허용 (각도 계산용 최소 거리만 부여)
    if (isDungBallOn()) {
        if (dist < 5) dist = 50;
    } else if (dist < 20) {
        // 일반 모드: 드래그 너무 짧으면 발사 취소
        currentStone.setPosition(origin.x, origin.y);
        return;
    }

    currentAmmo--;
    uiAmmoText.setText(`남은 돌멩이: ${currentAmmo} / ${currentMaxAmmo}`);

    const s = fireVolley(angle, dist, true);   // 메인 + 분신 동시 발사
    if (s) {
        cameraFollowing = true;
        setAimBtnVisible(false);
        playSfx('shoot');
        // 손맛 E: 발사 줌펀치 — 카메라 살짝 줌인했다 복귀 (탄력감)
        const cam = sceneRef.cameras.main;
        cam.zoomTo(1.035, 70, 'Quad.Out', true);
        sceneRef.time.delayedCall(95, () => cam.zoomTo(1.0, 180, 'Quad.Out', true));
    }

    // ── 발사 시 슬링샷 boing 애니메이션 (Elastic.Out으로 탄성 복원) ──
    // 똥볼 활성 시 새총 대신 축구선수가 발 차기 애니메이션
    if (isDungBallOn()) {
        triggerKickAnim();
    } else {
        triggerSlingBoing();
    }

    // ── 시간정지 패시브: 발사 즉시 모든 적 정지 ──
    if (timeStopStack > 0 && isOn('시간정지')) {
        triggerTimeStop(sceneRef);
    }

    // ── 다발장전 패시브: 0.2초 간격으로 추가 발사 (공짜 — ammo 소비 없음) ──
    // 돌멩이는 메인 발사에서 1회만 차감됨. 추가탄은 순수 버프.
    const burstExtra = (burstLoadStack > 0 && isOn('다발장전')) ? burstLoadStack : 0;
    for (let i = 0; i < burstExtra; i++) {
        sceneRef.time.delayedCall(200 * (i + 1), () => {
            if (!sceneRef) return;
            spawnBurstPuff(sceneRef);
            const sb = fireVolley(angle, dist, false);  // 분신도 추가탄에 동참
            if (sb) cameraFollowing = true;             // 추가탄도 카메라 추적 대상
        });
    }

    currentStone.destroy();
    currentStone = null;

    if (currentAmmo <= 0) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(2000, checkRoundEnd, [], sceneRef);
    }
    updateResearchBtn();
    // 다음 돌은 카메라 복귀 후 wipeReturn 콜백에서 로드됨
}

// ─── 체세포분열: 분열 돌멩이 생성 ───────────────────────
const MAX_SPLIT_GEN = 3;   // 세대 0→1→2→3에서 분열 중지 (최대 1+2+4+8=15발)
function spawnSplitStones(stone) {
    if (!cellDivisionStack || !isOn('체세포분열')) return;
    const gen = stone.splitGen ?? 0;
    if (gen >= MAX_SPLIT_GEN) return;

    const sx         = stone.x;
    const sy         = stone.y;
    const parentDmg  = stone.damage ?? STONE_DAMAGE;
    const parentNoG  = !!stone.noGravity;
    const SPLIT_SPEED = 460;

    // 분수(fountain) 형태: 수직 위를 기준으로 ±22° 두 갈래
    [
        -Math.PI / 2 - 0.385,   // 왼쪽 상향 (~-112°)
        -Math.PI / 2 + 0.385,   // 오른쪽 상향 (~-68°)
    ].forEach(angle => {
        const ss = activeStones.get(sx, sy, 'stone');
        if (!ss) return;
        ss.setActive(true).setVisible(true).setDepth(1);
        ss.setScale((0.44 - gen * 0.06) / 2);   // 세대가 높을수록 작아짐 (텍스처 2배 반영)
        const HIT_CAP = 28;
        ss.body.setSize(Math.min(ss.displayWidth, HIT_CAP), Math.min(ss.displayHeight, HIT_CAP));
        ss.body.reset(sx, sy);
        ss.body.allowGravity = !parentNoG;
        ss.setVelocity(Math.cos(angle) * SPLIT_SPEED, Math.sin(angle) * SPLIT_SPEED);
        ss.body.setGravityY(0);
        ss.damage            = parentDmg;
        ss.bounceCount       = 0;
        ss.settled           = false;
        ss.magnetFired       = false;
        ss.magnetTarget      = null;
        ss.magnetTrackTime   = 0;
        ss.magnetHitCooldown = 0;
        ss.lightningTimer    = 0;
        ss.hitBirds          = new Set();
        ss.splitGen          = gen + 1;
        ss.recyclable        = false;  // 분열 돌멩이는 재활용 대상 아님
        ss.noGravity         = parentNoG;
        ss.lifetime          = 0;
        ss.setAlpha(0.88);
    });
}

// ─── 충돌: 돌멩이 vs 새 ──────────────────────────────
function hitBird(stone, bird) {
    if (!stone.active || !bird.active) return;

    // ── 발사 직후 근거리 오판정 방지 ──────────────────────
    // 새총에서 막 출발할 때 frame 0~1 의 직접 겹침만 차단. (90 → 30 으로 축소)
    // 90px 은 너무 컸음 — 새총 근처 알짱대는 나방을 잡을 수 없었음
    if (Phaser.Math.Distance.Between(stone.x, stone.y, SLING_CENTER.x, SLING_CENTER.y) < 30) return;

    // ── 중복 타격 방지 (오버랩 다중 발화 + 풀 재사용 대응) ──
    // 관통 여부와 무관하게 같은 돌이 같은 새를 두 번 맞히는 것을 원천 차단
    if (!stone.hitBirds) stone.hitBirds = new Set();
    if (stone.hitBirds.has(bird)) return;
    stone.hitBirds.add(bird);

    // ── 파견 (NORMAL): 명중 위치를 다음 턴 슬링샷 위치로 예약 ──
    // 핵탄두/관통 등 다른 효과보다 먼저 기록 (마지막 명중 위치가 적용됨)
    if (dispatchStack > 0 && isOn('파견')) {
        pendingDispatchX = bird.x;
    }

    // ── 차원균열 (LEGENDARY): 명중 위치 ±500 다이아몬드 영역 즉사 ──
    if (dimensionRiftStack > 0 && isOn('차원균열')) {
        activeStones.killAndHide(stone);
        playSfx('rift');
        spawnDimensionalRift(this, stone.x, stone.y);
        killEnemiesInRift(this, stone.x, stone.y);
        return;
    }

    // ── 핵탄두 (LEGENDARY): 명중 즉시 화면 내 모든 적 즉사 ──
    // 데미지 처리 / 패시브 전부보다 우선 발동 → 돌은 폭발과 함께 소멸
    if (nukeStack > 0 && isOn('핵탄두')) {
        activeStones.killAndHide(stone);
        playSfx('nuke');
        spawnNukeEffect(this, stone.x, stone.y);
        annihilateAllEnemies(this, stone.x, stone.y);
        return;
    }

    // ── 관통 패시브 (토글 반영) ─────────────────────
    if (piercingStack > 0 && isOn('관통')) {
        // 관통: 돌이 계속 날아감 (hitBirds로 중복 방지는 위에서 처리)
    } else {
        activeStones.killAndHide(stone);
    }

    const dmg = stone.damage ?? STONE_DAMAGE;
    bird.hp = (bird.hp ?? 1) - dmg;

    // 손맛 A: 히트스톱 — 명중 순간 묵직하게 (45ms)
    doHitStop(this, 45);
    playSfx('hit');

    if (bird.hp > 0) {
        // 새 생존 — 피격 플래시 + 데미지 숫자
        this.tweens.add({
            targets: bird, alpha: 0.15, duration: 75, yoyo: true, repeat: 2,
            onComplete: () => { if (bird && bird.active) bird.setAlpha(1); }
        });
        // 손맛 D: 스쿼시&스트레치 — 가로로 늘었다 복원 (말랑한 타격감)
        const _sx = bird.scaleX, _sy = bird.scaleY;
        this.tweens.add({
            targets: bird, scaleX: _sx * 1.35, scaleY: _sy * 0.72,
            duration: 90, yoyo: true, ease: 'Quad.Out',
            onComplete: () => { if (bird && bird.active) bird.setScale(_sx, _sy); }
        });
        this.cameras.main.shake(50, 0.003);

        const dmgTxt = this.add.text(bird.x, bird.y - 20, `-${dmg}`, {
            fontFamily: 'Arial Black', fontSize: '20px', color: '#ff6666'
        }).setOrigin(0.5).setDepth(8);
        this.tweens.add({
            targets: dmgTxt, y: dmgTxt.y - 45, alpha: 0,
            duration: 700, onComplete: () => dmgTxt.destroy()
        });
        // 체세포분열: 새가 살아있어도 명중 시 분열
        spawnSplitStones(stone);
        return;
    }

    // 새 처치
    // 체세포분열: 새 처치 시에도 분열
    spawnSplitStones(stone);
    const bx = bird.x, by = bird.y;
    const mat     = bird.materialValue ?? 10;
    const birdKey = bird.texture ? bird.texture.key : null;
    // 손맛 G: 강적(HP 2+ — 독수리/촉수체/오버로드) 처치 시 짧은 슬로우모션 + 묵직한 처치음
    if ((bird.maxHp ?? 1) >= 2) {
        doBossSlowmo(this, 280);
        playSfx('boss');
    } else {
        playSfx('kill');
    }
    bird.destroy();

    roundBirdsHit++;
    roundMaterial += mat + getScrapBonus();
    totalBirdsHit++;
    remainingBirds = Math.max(0, remainingBirds - 1);
    refreshMaterialHUD();
    refreshRemainingHUD();
    refreshPlayerPanel();
    this.cameras.main.shake(120, 0.008);
    // 모든 처치: 새 위치에서 떠오르는 텍스트 연출 통일
    showKillFx(this, bx, by, mat, birdKey);

    // 폭발 강화: 반경 130px 내 적에게 범위 데미지
    if (explosionStack > 0 && isOn('폭발')) {
        const EXPL_R = 130;

        // ── 데미지 즉시 적용 ──
        birds.getChildren().slice().forEach(b => {
            if (!b.active) return;
            if (Phaser.Math.Distance.Between(bx, by, b.x, b.y) <= EXPL_R) {
                b.hp = (b.hp ?? 1) - (stone ? stone.damage ?? STONE_DAMAGE : STONE_DAMAGE);
                if (b.hp <= 0) {
                    const ebx = b.x, eby = b.y;
                    const emat = b.materialValue ?? 10;
                    const ebk  = b.texture ? b.texture.key : null;
                    b.destroy();
                    roundBirdsHit++; roundMaterial += emat + getScrapBonus(); totalBirdsHit++;
                    remainingBirds = Math.max(0, remainingBirds - 1);
                    refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                    showKillFx(sceneRef, ebx, eby, emat, ebk);
                } else {
                    this.tweens.add({ targets: b, alpha: 0.2, duration: 60, yoyo: true, repeat: 2,
                        onComplete: () => { if (b && b.active) b.setAlpha(1); } });
                }
            }
        });

        // ── 폭발 비주얼: 소→대 확장 (PAANG 연출) ──
        // 1) 중심 백열 섬광
        const flash = this.add.graphics().setDepth(9).setPosition(bx, by);
        flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 18);
        this.tweens.add({ targets: flash, scaleX: 2.8, scaleY: 2.8, alpha: 0,
            duration: 160, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // 2) 충격파 링 3겹 (순차 확장 — 소→대)
        [[0xffff99, 5, 0], [0xff9933, 4, 55], [0xff4400, 3, 110]].forEach(([col, lw, delay]) => {
            const ring = this.add.graphics().setDepth(8).setPosition(bx, by);
            ring.lineStyle(lw, col, 1).strokeCircle(0, 0, 10);
            const ts = EXPL_R / 10;
            this.tweens.add({ targets: ring, scaleX: ts, scaleY: ts, alpha: 0,
                duration: 380, delay, ease: 'Cubic.Out',
                onComplete: () => ring.destroy() });
        });

        // 3) 불꽃 파편 8방향 방사
        for (let i = 0; i < 8; i++) {
            const ang  = (i / 8) * Math.PI * 2;
            const dist = EXPL_R * (0.7 + Math.random() * 0.3);
            const spark = this.add.graphics().setDepth(7).setPosition(bx, by);
            spark.fillStyle(i % 2 === 0 ? 0xff7700 : 0xffdd22, 1).fillCircle(0, 0, 5 - Math.floor(i / 3));
            this.tweens.add({ targets: spark,
                x: bx + Math.cos(ang) * dist,
                y: by + Math.sin(ang) * dist,
                scaleX: 0.2, scaleY: 0.2, alpha: 0,
                duration: 420 + i * 15, ease: 'Quad.Out',
                onComplete: () => spark.destroy() });
        }

        // 4) 카메라 진동
        this.cameras.main.shake(200, 0.018);

        // 폭발 처치 후 라운드 클리어 체크
        if (remainingBirds <= 0 && !isRoundEnding) {
            isRoundEnding = true;
            sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
        }
    }

    // 50마리 전멸 → 라운드 클리어
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
    }

    for (let i = 0; i < 8; i++) {
        const scrap = this.add.rectangle(bx, by, 6, 6, 0x39ff14);
        this.physics.add.existing(scrap);
        scrap.body.setVelocity(
            Phaser.Math.Between(-220, 220),
            Phaser.Math.Between(-300, -50)
        );
        this.tweens.add({ targets: scrap, alpha: 0, duration: 700, onComplete: () => scrap.destroy() });
    }

}

// ─── 페이드 트랜지션 + 카메라 복귀 (Phaser 네이티브 fade) ──
function wipeReturn(scene, onComplete) {
    setAimBtnVisible(false);
    const cam = scene.cameras.main;
    // 파견 대기 중이면 항상 fade 거쳐서 슬링샷 이동을 자연스럽게
    const hasDispatch = pendingDispatchX !== null;
    // 카메라가 이미 홈 근처면 암전 없이 즉시 복귀 (단, 파견 대기 없을 때만)
    const homeScrollX = Math.max(0, SLING_CENTER.x - config.width  / (2 * cam.zoom));
    const homeScrollY = CAM_HOME_Y - config.height / (2 * cam.zoom);
    const nearHome = !hasDispatch && cam.zoom >= 0.95 &&
                     Math.abs(cam.scrollX - homeScrollX) < 200 &&
                     Math.abs(cam.scrollY - homeScrollY) < 200;
    if (nearHome) {
        cam.stopFollow();
        cam.setZoom(1.0);
        cam.centerOn(SLING_CENTER.x, CAM_HOME_Y);
        if (onComplete) onComplete();
        return;
    }
    cam.fadeOut(280, 0, 0, 0);
    cam.once('camerafadeoutcomplete', () => {
        applyPendingDispatch();   // 파견 패시브: 새 위치로 슬링샷 이동
        cam.stopFollow();
        cam.setZoom(1.0);
        cam.centerOn(SLING_CENTER.x, CAM_HOME_Y);
        cam.fadeIn(280, 0, 0, 0);
        cam.once('camerafadeincomplete', () => { if (onComplete) onComplete(); });
    });
}

// ─── 라운드 종료 판정 (돌멩이 소진 시) ───────────────
// 새가 전멸된 경우는 hitBird에서 showRoundClear()로 처리됨
// 여기서는 돌멩이가 먼저 소진됐을 때만 호출됨
function checkRoundEnd() {
    if (activeStones.countActive(true) > 0) {
        sceneRef.time.delayedCall(500, checkRoundEnd, [], sceneRef);
        return;
    }
    // 혹시 마지막 돌에서 마지막 새까지 처치했다면 라운드 클리어 처리
    if (remainingBirds <= 0) return;  // showRoundClear가 이미 처리 중

    // 돌멩이 소진 & 새 잔존 → 게임오버
    wipeReturn(sceneRef, () => {
        materialStock += roundMaterial;
        roundMaterial = 0;
        refreshMaterialHUD();
        showGameOver(sceneRef);
    });
}

// applyPassive 의 미드플로우 안전망에서만 호출 → 그냥 엔딩화면으로 리다이렉트

// ─── 라운드 클리어 (모든 적 전멸) — 곧바로 엔딩 화면으로 ──
function showRoundClear(scene) {
    // 적립된 라운드 획득 재료 materialStock에 합산
    materialStock += roundMaterial;
    roundMaterial = 0;
    refreshMaterialHUD();
    updateResearchBtn();

    wipeReturn(scene, () => showGameOver(scene, true));
}

// ─── 순위 저장 (localStorage) ────────────────────────
const SCORE_KEY = 'slingshot_scores_v1';

function getScores() {
    try { return JSON.parse(localStorage.getItem(SCORE_KEY) || '[]'); }
    catch { return []; }
}

function saveScore(name, kills, round, material) {
    const scores = getScores();
    scores.push({
        name, kills, round, material,
        date: new Date().toLocaleDateString('ko-KR')
    });
    scores.sort((a, b) => b.kills - a.kills || b.round - a.round || b.material - a.material);
    scores.splice(10);  // 상위 10개만 보관
    localStorage.setItem(SCORE_KEY, JSON.stringify(scores));
}
