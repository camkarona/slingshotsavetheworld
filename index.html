// ─── update ───────────────────────────────────────────
function update(time, delta) {
    // 새 이동 범위 경계 — 타입별로 구간 분리
    birds.getChildren().forEach(b => {
        if (!b.active) return;
        const key    = b.texture && b.texture.key;
        const isFloater  = key === 'floater';
        const isTendril  = key === 'tendril';
        const maxX = isFloater ? 4000 : isTendril ? 950 : 3400;
        const minX = key === 'mothBird' ? 330 : isFloater ? 2000 : isTendril ? 300 : 800;
        if (b.x > maxX && b.body.velocity.x > 0) b.setVelocityX(-Math.abs(b.body.velocity.x));
        if (b.x < minX && b.body.velocity.x < 0) b.setVelocityX( Math.abs(b.body.velocity.x));
    });

    // 돌멩이 — 농구공 바운스 + 월드 이탈 처리
    activeStones.getChildren().forEach(s => {
        if (!s.active) return;

        // ── 자석탄: 정점 감지 → 락온 → 끝까지 열추적 ──────────────────────────────
        if (magnetStack > 0 && isOn('자석탄') && !s.settled) {

            // ① 정점 통과 시 가장 가까운 적 락온 (1회)
            if (!s.magnetFired && s.body.velocity.y > 60) {
                s.magnetFired = true;
                let nearest = null, nearDist = Infinity;
                birds.getChildren().forEach(b => {
                    if (!b.active) return;
                    const d = Phaser.Math.Distance.Between(s.x, s.y, b.x, b.y);
                    if (d < nearDist) { nearDist = d; nearest = b; }
                });
                if (nearest) {
                    s.magnetTarget = nearest;
                    // 락온 비주얼
                    if (sceneRef) {
                        const ring = sceneRef.add.graphics().setDepth(8).setPosition(s.x, s.y);
                        ring.lineStyle(4, 0x44ccff, 1).strokeCircle(0, 0, 14);
                        sceneRef.tweens.add({ targets: ring, scaleX: 5, scaleY: 5, alpha: 0,
                            duration: 320, ease: 'Cubic.Out', onComplete: () => ring.destroy() });
                        const beam = sceneRef.add.graphics().setDepth(7);
                        beam.lineStyle(2, 0x88eeff, 0.7)
                            .lineBetween(s.x, s.y, nearest.x, nearest.y);
                        sceneRef.tweens.add({ targets: beam, alpha: 0, duration: 250,
                            onComplete: () => beam.destroy() });
                    }
                }
            }

            // ② 락온 중 — 매 프레임 조향 (열추적 미사일)
            if (s.magnetTarget) {
                if (!s.magnetTarget.active) {
                    // 타깃 사망 → 추적 해제, 중력 복원
                    s.magnetTarget = null;
                    s.body.setGravityY(0);
                } else {
                    // 타임아웃: 4초 이상 추적해도 미명중 시 포기 (게임 멈춤 방지)
                    s.magnetTrackTime = (s.magnetTrackTime || 0) + delta;
                    if (s.magnetTrackTime > 4000) {
                        s.magnetTarget    = null;
                        s.magnetTrackTime = 0;
                        s.body.setGravityY(0);
                    } else {
                        s.body.setGravityY(-600);   // 중력 상쇄

                        // ── 재타격 쿨다운 (관통 + 자석탄 조합 시 hitBirds 맴돌기 방지) ──
                        // 관통 패시브로 돌이 살아남은 채 같은 적을 추적할 때,
                        // hitBirds가 재타격을 막아 영구 맴돌기→팅겨나가는 버그를 수정.
                        // 350ms마다 추적 타깃의 hitBirds 기록을 지워 재타격 허용.
                        s.magnetHitCooldown = (s.magnetHitCooldown ?? 0) - delta;
                        if (s.magnetHitCooldown <= 0) {
                            if (s.hitBirds) s.hitBirds.delete(s.magnetTarget);
                            s.magnetHitCooldown = 350;
                        }

                        const tDist = Phaser.Math.Distance.Between(
                            s.x, s.y, s.magnetTarget.x, s.magnetTarget.y);

                        // ── 근접 속도 제한 (충돌체 통과 후 역방향 진동 방지) ──
                        // 80px 이내에서는 거리에 비례해 속도를 줄여 충돌 감지를 보장.
                        const rawSpeed = Math.max(
                            Math.sqrt(s.body.velocity.x ** 2 + s.body.velocity.y ** 2), 580);
                        const speed = tDist < 80
                            ? Math.min(rawSpeed, Math.max(140, tDist * 4))
                            : rawSpeed;

                        const toAngle = Math.atan2(
                            s.magnetTarget.y - s.y, s.magnetTarget.x - s.x);

                        if (tDist < 120) {
                            // ── 근접: 회전 제한 없이 타깃 직접 조준 (궤도 탈출)
                            s.body.setVelocity(
                                Math.cos(toAngle) * speed,
                                Math.sin(toAngle) * speed);
                        } else {
                            // ── 원거리: 부드러운 조향
                            const nowAngle = Math.atan2(s.body.velocity.y, s.body.velocity.x);
                            let diff = toAngle - nowAngle;
                            while (diff >  Math.PI) diff -= 2 * Math.PI;
                            while (diff < -Math.PI) diff += 2 * Math.PI;
                            const newAngle = nowAngle + Math.max(-0.14, Math.min(0.14, diff));
                            s.body.setVelocity(
                                Math.cos(newAngle) * speed,
                                Math.sin(newAngle) * speed);
                        }
                    }
                }
            }
        }

        // ── 농구공 패시브: 지면 도달 시 튀어오름 ─────
        if (basketballStack > 0 && isOn('농구공')) {
            if (s.y >= GROUND_Y && s.body.velocity.y > 10
                    && s.bounceCount < basketballStack && !s.settled) {
                s.bounceCount++;
                s.setY(GROUND_Y - 4);
                s.body.setVelocityY(-Math.abs(s.body.velocity.y) * 0.85);
                if (sceneRef) {
                    sceneRef.cameras.main.shake(60, 0.006);
                    spawnGroundImpact(sceneRef, s.x);
                }
            }
        }

        // ── 일반 지면 착지: 스쿼시 → 굴러가다 페이드 아웃 ─
        if (!s.settled && s.y >= GROUND_Y && s.body.velocity.y > 10
                && !(basketballStack > 0 && isOn('농구공') && s.bounceCount < basketballStack)) {
            const slideVX = s.body.velocity.x;   // ← 착지 순간 수평 속도 포착
            s.settled = true;
            s.setY(GROUND_Y - s.displayHeight * 0.5);
            s.body.setVelocity(0, 0);
            s.body.allowGravity = false;
            if (sceneRef) {
                sceneRef.cameras.main.shake(75, 0.007);
                spawnGroundImpact(sceneRef, s.x);

                // ── 폭발 패시브: 착지 시에도 발동 ──
                if (explosionStack > 0 && isOn('폭발')) {
                    spawnGroundExplosion(sceneRef, s.x, s.y, s);
                }

                // ── 그라운드 제로 패시브: 착지 시 하늘에서 레이저 빔 강하 ──
                if (groundZeroStack > 0 && isOn('그라운드 제로')) {
                    spawnGroundZero(sceneRef, s.x);
                }

                // ── 재활용 패시브: 빈손 착지 시 확률적 회수 ──
                tryRecycleStone(s);

                const rollDist = Phaser.Math.Clamp(slideVX * 0.45, -340, 340);
                const rollDur  = 650 + Math.abs(rollDist) * 2.0;
                const spinDeg  = rollDist * 2.8;

                // 착지 순간 스쿼시 — 약하고 짧게 (돌은 고무공이 아님)
                sceneRef.tweens.add({
                    targets: s,
                    scaleX: s.scaleX * 1.28,
                    scaleY: s.scaleY * 0.80,
                    duration: 55, yoyo: true, ease: 'Sine.Out',
                });

                // 스쿼시와 동시에 굴러가며 페이드 아웃 (delay 없음)
                sceneRef.tweens.add({
                    targets: s,
                    x:     s.x + rollDist,
                    angle: s.angle + spinDeg,
                    alpha: 0,
                    duration: rollDur,
                    ease: 'Quad.Out',
                    onComplete: () => {
                        if (s.active) activeStones.killAndHide(s);
                        s.setAlpha(1); s.setAngle(0);
                        updateResearchBtn();
                    }
                });
            }
        }

        // ── 번개탄: 2초마다 주변 오염생물 번개 공격 ─────────────────────────────
        if (lightningStack > 0 && isOn('번개탄') && !s.settled) {
            s.lightningTimer = (s.lightningTimer || 0) + delta;
            if (s.lightningTimer >= 500) {
                s.lightningTimer = 0;
                const BOLT_R = 160;
                const sx = s.x, sy = s.y;
                // 피해
                birds.getChildren().slice().forEach(b => {
                    if (!b.active) return;
                    if (Phaser.Math.Distance.Between(sx, sy, b.x, b.y) > BOLT_R) return;
                    b.hp = (b.hp ?? 1) - STONE_DAMAGE;
                    if (b.hp <= 0) {
                        const bx2 = b.x, by2 = b.y, mat2 = b.materialValue ?? 10, bk2 = b.texture?.key;
                        b.destroy();
                        roundBirdsHit++; roundMaterial += mat2; totalBirdsHit++;
                        remainingBirds = Math.max(0, remainingBirds - 1);
                        refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                        showKillFx(sceneRef, bx2, by2, mat2, bk2);
                    } else {
                        sceneRef.tweens.add({ targets: b, alpha: 0.1, duration: 50,
                            yoyo: true, repeat: 2, onComplete: () => { if (b?.active) b.setAlpha(1); } });
                    }
                });
                // 번개 비주얼
                spawnLightningFx(sceneRef, sx, sy, BOLT_R);
                // 번개 처치 후 라운드 클리어 체크
                if (remainingBirds <= 0 && !isRoundEnding) {
                    isRoundEnding = true;
                    sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
                }
            }
        }

        // 월드 이탈 (지면 아래로 빠진 경우 / 오른쪽 벽)
        if (s.y > 820 || s.x > WORLD_LIMIT_X) {
            // 재활용 패시브: 화면 밖으로 떠난 경우에도 회수 시도
            tryRecycleStone(s);
            activeStones.killAndHide(s);
        }
    });

    // ── 수동 scroll lerp (줌 없음 — 프레임드랍 원인 제거)
    if (cameraFollowing) {
        const flying = activeStones.getChildren().filter(s => s.active);
        const cam = this.cameras.main;
        if (flying.length > 0) {
            const target = flying.reduce((a, b) =>
                Phaser.Math.Distance.Between(b.x, b.y, SLING_CENTER.x, SLING_CENTER.y) >
                Phaser.Math.Distance.Between(a.x, a.y, SLING_CENTER.x, SLING_CENTER.y) ? b : a
            );
            const tx = Phaser.Math.Clamp(target.x - config.width  / 2, 0, WORLD_LIMIT_X - config.width);
            const ty = Phaser.Math.Clamp(
                target.y - CAM_FOLLOW_OFFSET_Y - config.height / 2,
                WORLD_TOP, WORLD_TOP + WORLD_H - config.height
            );
            cam.scrollX = Phaser.Math.Linear(cam.scrollX, tx, 0.1);
            cam.scrollY = Phaser.Math.Linear(cam.scrollY, ty, 0.1);
        }
        if (!isRoundEnding && activeStones.countActive(true) === 0) {
            cameraFollowing = false;
            sceneRef.time.delayedCall(2000, () => wipeReturn(sceneRef, () => loadStone(sceneRef)));
        }
    }

    drawHpBars();
    drawRubberBand();
    compensateHUDZoom();

    // 미니맵은 4프레임마다 갱신 (성능 최적화)
    minimapFrame++;
    if (minimapFrame % 4 === 0) drawMinimap();
}

// ─── 새 스폰 ──────────────────────────────────────────
function spawnBird(scene, withFade = false, fixedX = null, forcedType = null) {
    const type = forcedType ?? BIRD_TYPES[Phaser.Math.Between(0, BIRD_TYPES.length - 1)];
    const x = fixedX !== null ? fixedX : Phaser.Math.Between(500, 2500);
    const zoneY = type.zoneY ?? [80, 260];
    const y = Phaser.Math.Between(zoneY[0], zoneY[1]);
    const bird = birds.create(x, y, type.key);
    bird.setScale(type.key === 'eagle'    ? 0.72
                : type.key === 'tendril'  ? 1.05
                : type.key === 'overlord' ? 1.15
                : 0.5);
    bird.body.allowGravity = false;
    bird.materialValue = type.material;
    bird.hp    = type.hp ?? 1;
    bird.maxHp = type.hp ?? 1;
    if (withFade) bird.setAlpha(0);

    const spd = Phaser.Math.Between(type.speedMin, type.speedMax);
    bird.setVelocityX(Phaser.Math.Between(0, 1) ? spd : -spd);
    const floatAmt = type.key === 'mothBird' ? Phaser.Math.Between(-8, 8)
                   : type.key === 'eagle'   ? Phaser.Math.Between(-30, 30)
                   : type.key === 'floater' ? Phaser.Math.Between(-55, 55)
                   : type.key === 'tendril'  ? Phaser.Math.Between(-18, 18)
                   : type.key === 'overlord' ? Phaser.Math.Between(-4, 4)
                   : Phaser.Math.Between(-20, 20);
    const floatDur = type.key === 'mothBird' ? Phaser.Math.Between(300, 600)
                   : type.key === 'eagle'    ? Phaser.Math.Between(800, 1600)
                   : type.key === 'floater'  ? Phaser.Math.Between(1800, 3200)
                   : type.key === 'tendril'  ? Phaser.Math.Between(1600, 2800)
                   : type.key === 'overlord' ? Phaser.Math.Between(3000, 5000)
                   : Phaser.Math.Between(1000, 2000);
    scene.tweens.add({ targets: bird, y: y + floatAmt, duration: floatDur, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    if (withFade) scene.tweens.add({ targets: bird, alpha: 1, duration: 400 });

}

// 패시브가 현재 활성 상태인지 (보유 + 토글 ON)
function isOn(name) { return passiveActive[name] !== false; }

// 패시브 토글 라인 재구성 — 패시브 획득·토글 클릭·재시작 시 호출
// • 스탯(공격력·탄성)을 "── 강화 ──" 바로 아래에 표시
// • 뱃지([N]/[R]/[E])와 이름을 별도 텍스트 오브젝트로 분리하여 색상 구분
function rebuildPassiveLines(scene) {
    uiPassiveLines.forEach(o => o.destroy());
    uiPassiveLines = [];

    const STACK_OF = { '탄성증가': armMuscleStack,  '큰돌':           bigStoneStack,
                       '파워업':   ironBallStack,   '조준선':         aimLineStack,
                       '농구공':   basketballStack, '관통':           piercingStack,
                       '자석탄':   magnetStack,     '돌을 줍다':      pickupStoneStack,
                       '산탄':     shotgunStack,    '폭발':           explosionStack,
                       '번개탄':   lightningStack,  '체세포분열':     cellDivisionStack,
                       '그라운드 제로': groundZeroStack,
                       '재활용':   recycleStack };
    const owned = Object.keys(STACK_OF).filter(k => STACK_OF[k] > 0);

    const PASSIVE_RARITY = {
        '탄성증가': 'NORMAL', '파워업': 'NORMAL', '돌을 줍다':  'NORMAL', '재활용': 'NORMAL',
        '큰돌':   'RARE',   '조준선': 'RARE',   '농구공':    'RARE',
        '자석탄': 'RARE',   '그라운드 제로': 'RARE',
        '관통':   'EPIC',   '산탄':   'EPIC',   '폭발':      'EPIC', '번개탄': 'EPIC',
        '체세포분열': 'EPIC',
    };
    const PANEL_BADGE = { NORMAL: '[N]', RARE: '[R]', EPIC: '[E]' };
    const PANEL_COL   = { NORMAL: '#aaaaaa', RARE: '#44bbff', EPIC: '#cc66ff' };

    const LINE_H = 17;
    const BASE_Y = 103;   // "── 강화 ──" 헤더 직후 y
    let   row    = 0;

    // 텍스트 생성 헬퍼 — _hx, _hy, _fs 저장 (compensateHUDZoom 에서 사용)
    const addTxt = (sx, sy, label, style, fs) => {
        const o = scene.add.text(sx, sy, label, style).setScrollFactor(0).setDepth(10);
        o._hx = sx;  o._hy = sy;  o._fs = fs;
        uiPassiveLines.push(o);
        return o;
    };

    // ── 현재 스탯 (공격력 / 탄성) ────────────────────────
    if (owned.length > 0) {
        const atkMult = STONE_DAMAGE * Math.pow(2,
            (isOn('파워업') ? ironBallStack : 0) + (isOn('큰돌') ? bigStoneStack : 0));
        const elastX  = (launchMult / BASE_LAUNCH).toFixed(2);

        addTxt(18, BASE_Y + row * LINE_H,
            `⚔  공격력  ${atkMult}`,
            { fontFamily: 'Arial', fontSize: '12px', color: '#ffcc44' }, 12);
        row++;

        addTxt(18, BASE_Y + row * LINE_H,
            `↗  탄성   ×${elastX}`,
            { fontFamily: 'Arial', fontSize: '12px', color: '#66ddff' }, 12);
        row++;
    }

    // ── 패시브 라인 (뱃지 + 이름 분리) ────────────────────
    owned.forEach(name => {
        const on       = isOn(name);
        const rarity   = PASSIVE_RARITY[name] ?? 'NORMAL';
        const badgeStr = PANEL_BADGE[rarity]   ?? '[N]';
        const tierCol  = PANEL_COL[rarity]     ?? '#aaaaaa';
        const stackStr = (name === '관통' || name === '체세포분열' || name === '그라운드 제로')
                         ? '' : ` ×${STACK_OF[name]}`;
        const lineY    = BASE_Y + row * LINE_H;

        // 뱃지 — 티어 색상
        const badgeObj = addTxt(18, lineY, badgeStr, {
            fontFamily: 'Arial', fontSize: '11px',
            color: on ? tierCol : '#444444',
        }, 11);

        // 이름 — 흰색(ON) / 어두운(OFF), 클릭 가능
        const nameLabel = `${on ? '☑' : '☐'} ${name}${stackStr}`;
        const nameObj   = addTxt(40, lineY, nameLabel, {
            fontFamily: 'Arial', fontSize: '13px',
            color: on ? '#e8e8e8' : '#555555',
        }, 13);
        nameObj.setInteractive({ useHandCursor: true });
        nameObj.on('pointerup',   () => { passiveActive[name] = !isOn(name); rebuildPassiveLines(scene); });
        nameObj.on('pointerover', () => { badgeObj.setAlpha(0.65); nameObj.setAlpha(0.65); });
        nameObj.on('pointerout',  () => { badgeObj.setAlpha(1.0);  nameObj.setAlpha(1.0);  });

        row++;
    });

    // ── 패널 높이 동적 조정 ───────────────────────────────
    // BASE_Y=103 에서 시작, row개 행, +12px 하단 여백
    _panelH = Math.max(240, BASE_Y + row * LINE_H + 12 - 8);

    // 헤더(STAGE N / 강화 구분선) 갱신 + 패널 배경 재렌더
    refreshPlayerPanel(owned.length > 0);
}

function getStoneScale() {
    return 0.5 * Math.pow(2, (isOn('큰돌') ? bigStoneStack : 0));
}

// 새들을 x=1000-3200 구역에 균등하게 산포 (스테이지별 수량은 STAGE_DATA 참조)
function spawnBirdsSpread(scene, withFade = false) {
    const stage = STAGE_DATA[Math.min(roundNumber, STAGE_DATA.length) - 1];
    const { birdCount, mothCount, eagleCount, overlordCount } = stage;

    const minX = 1000, maxX = 3200;
    const step = (maxX - minX) / birdCount;
    for (let i = 0; i < birdCount; i++) {
        const jitter = Phaser.Math.Between(-Math.floor(step * 0.3), Math.floor(step * 0.3));
        const x = Phaser.Math.Clamp(Math.floor(minX + (i + 0.5) * step + jitter), minX, maxX);
        spawnBird(scene, withFade, x);
    }
    // 지상 나방 — 새총 옆부터 전 구역
    for (let i = 0; i < mothCount; i++) {
        const x = Phaser.Math.Between(330, 3200);
        spawnBird(scene, withFade, x, MOTH_TYPE);
    }
    // 독수리 — 전 스테이지 5마리, 화면 상단 가시권
    for (let i = 0; i < eagleCount; i++) {
        const x = Phaser.Math.Between(400, 3200);
        spawnBird(scene, withFade, x, EAGLE_TYPE);
    }
    // 부유 생물체 — 원거리 구역(x=2000~4000)에 4마리 고정
    for (let i = 0; i < 4; i++) {
        const x = Phaser.Math.Between(2000, 4000);
        spawnBird(scene, withFade, x, FLOATER_TYPE);
    }
    // 고공 오염체 — 새총 근처 상공 2마리 고정
    for (let i = 0; i < 2; i++) {
        const x = Phaser.Math.Between(380, 880);
        spawnBird(scene, withFade, x, TENDRIL_TYPE);
    }
    // 부유 오염 기지 (오버로드) — 맵 전역 극고공에 고정
    for (let i = 0; i < overlordCount; i++) {
        const x = Phaser.Math.Between(500, 3000);
        spawnBird(scene, withFade, x, OVERLORD_TYPE);
    }
}

// ─── 돌멩이 장전 ──────────────────────────────────────
function loadStone(scene) {
    if (currentAmmo <= 0) return;
    currentStone = scene.add.image(SLING_CENTER.x, SLING_CENTER.y, 'stone').setDepth(1).setScale(getStoneScale());
}

// ─── 고무줄 렌더링 ────────────────────────────────────
function drawRubberBand() {
    rubberBandGraphics.clear();
    rubberBandGraphics.lineStyle(6, 0xD2691E, 1);
    if (!currentStone) return;
    rubberBandGraphics.lineBetween(PRONG_L.x, PRONG_L.y, currentStone.x, currentStone.y);
    rubberBandGraphics.lineBetween(PRONG_R.x, PRONG_R.y, currentStone.x, currentStone.y);
}

// ─── HUD 줌 보정 ──────────────────────────────────────
// setScrollFactor(0) 은 스크롤만 무시, 줌은 그대로 영향받음.
// zoom 이 바뀔 때만 world 위치를 역산해 보정 (매 프레임 불필요 연산 방지).
let _lastHUDZoom = 1.0;
let _panelH      = 240;   // 패널 배경 현재 높이 (screen px) — rebuildPassiveLines에서 동적 갱신
function compensateHUDZoom() {
    const z = sceneRef.cameras.main.zoom;
    if (Math.abs(z - _lastHUDZoom) < 0.001) return;
    _lastHUDZoom = z;
    const cx = config.width  / 2;
    const cy = config.height / 2;
    const f  = (sx, sy) => ({ x: cx + (sx - cx) / z, y: cy + (sy - cy) / z });
    let p;
    p = f(640, 18);   uiRoundText.setPosition(p.x, p.y);
    p = f(640, 48);   uiAmmoText.setPosition(p.x, p.y);
    // uiPassiveText 는 숨김 상태 — 줌 보정 불필요
    p = f(PANEL_CX, 652);  if (uiRemainingText) uiRemainingText.setPosition(p.x, p.y);
    p = f(1200, 20);  if (uiResearchBtnTxt) uiResearchBtnTxt.setPosition(p.x, p.y).setFontSize(`${15 / z}px`);
    p = f(1260, 58);  uiMaterialText.setPosition(p.x, p.y);
    p = f(1260, 84);  if (uiPollutionText) uiPollutionText.setPosition(p.x, p.y);
    // Player Status 패널 + 미니맵 토글 버튼
    drawPanelBg(z);
    p = f(PANEL_CX, 22); if (uiPanelTitle)   uiPanelTitle.setPosition(p.x, p.y);
    p = f(18,  52); if (uiPanelContent) uiPanelContent.setPosition(p.x, p.y).setFontSize(`${14 / z}px`);
    drawMinimapBtn(z);
    p = f(PANEL_CX, 262); if (uiMinimapBtnTxt) uiMinimapBtnTxt.setPosition(p.x, p.y).setFontSize(`${14 / z}px`);
    // 조준화면으로 버튼은 화면 정중앙 → 위치는 불변, 크기만 역보정
    if (uiAimBtn) { uiAimBtn.setScale(1 / z); uiAimBtnTxt.setScale(1 / z); }
    // 패시브 라인 줌 보정 (각 오브젝트에 저장된 _hx, _hy, _fs 사용)
    uiPassiveLines.forEach(obj => {
        const p2 = f(obj._hx ?? 18, obj._hy ?? 103);
        obj.setPosition(p2.x, p2.y).setFontSize(`${(obj._fs ?? 13) / z}px`);
    });
}

// ─── 미니맵 렌더링 (줌 보정 적용) ────────────────────
function drawMinimap() {
    if (!minimapVisible) return;
    minimapGraphics.clear();
    const cam = sceneRef.cameras.main;
    const z   = cam.zoom;
    const cx  = config.width / 2, cy = config.height / 2;

    // 원하는 화면 좌표를 scrollFactor(0) world 좌표로 변환
    const wx0 = cx + (MM_X       - cx) / z;
    const wy0 = cy + (MM_Y       - cy) / z;
    const ww  = MM_W / z;
    const wh  = MM_H / z;

    // 배경 + 테두리
    minimapGraphics.fillStyle(0x000000, 1).fillRect(wx0, wy0, ww, wh);
    minimapGraphics.lineStyle(1 / z, 0xe8a030, 0.50).strokeRect(wx0, wy0, ww, wh);

    // 월드 좌표 → 미니맵 world 픽셀 변환
    const toMX = wx => wx0 + ((wx - MM_WX0) / (MM_WX1 - MM_WX0)) * ww;
    const toMY = wy => wy0 + ((wy - MM_WY0) / (MM_WY1 - MM_WY0)) * wh;

    // 새총 마커
    const sx = toMX(SLING_CENTER.x), sy = toMY(SLING_CENTER.y);
    const ms = 4 / z;
    minimapGraphics.fillStyle(0xD2691E, 1).fillRect(sx - ms/2, sy - ms*0.75, ms, ms * 1.5);

    // 새 (독수리=주황, 부유생물체=보라, 나방=황갈색, 나머지=초록)
    birds.getChildren().forEach(b => {
        if (!b.active) return;
        const mx = toMX(b.x), my = toMY(b.y);
        if (mx >= wx0 && mx <= wx0 + ww && my >= wy0 && my <= wy0 + wh) {
            const key     = b.texture && b.texture.key;
            const isEagle    = key === 'eagle';
            const isFloater  = key === 'floater';
            const isMoth     = key === 'mothBird';
            const isTendril  = key === 'tendril';
            const isOverlord = key === 'overlord';
            const col = isOverlord ? 0xff8800
                      : isTendril  ? 0xff2222
                      : isEagle    ? 0xff4400
                      : isFloater  ? 0xcc44ff
                      : isMoth     ? 0xd4bc8a : 0x39ff14;
            const ds  = isOverlord ? 8/z : isTendril ? 6/z : isEagle ? 6/z : isFloater ? 5/z : 3/z;
            minimapGraphics.fillStyle(col, 0.9).fillRect(mx - ds/2, my - ds/2, ds, ds);
        }
    });

    // 비행 중인 돌멩이
    minimapGraphics.fillStyle(0xffffff, 0.9);
    activeStones.getChildren().forEach(s => {
        if (!s.active) return;
        minimapGraphics.fillCircle(toMX(s.x), toMY(s.y), 2 / z);
    });

    // 카메라 뷰 사각형 — 미니맵 경계 내로 클램핑
    const cvX0 = toMX(cam.scrollX);
    const cvY0 = toMY(cam.scrollY);
    const cvX1 = cvX0 + (config.width  / cam.zoom / WORLD_LIMIT_X) * ww;
    const cvY1 = cvY0 + (config.height / cam.zoom / (MM_WY1 - MM_WY0)) * wh;
    const cx0c = Math.max(wx0, cvX0), cy0c = Math.max(wy0, cvY0);
    const cx1c = Math.min(wx0 + ww, cvX1), cy1c = Math.min(wy0 + wh, cvY1);
    if (cx1c > cx0c && cy1c > cy0c) {
        minimapGraphics.lineStyle(1 / z, 0xffffff, 0.75)
            .strokeRect(cx0c, cy0c, cx1c - cx0c, cy1c - cy0c);
    }
}

// ─── HP 바 렌더링 (maxHp > 1인 새만 표시) ───────────
function drawHpBars() {
    hpBarGraphics.clear();
    birds.getChildren().forEach(bird => {
        if (!bird.active || (bird.maxHp ?? 1) <= 1) return;
        const ratio = Math.max(0, bird.hp / bird.maxHp);
        const _bkey = bird.texture && bird.texture.key;
        const bw = _bkey === 'overlord' ? 76 : _bkey === 'tendril' ? 62 : 44;
        const bh = 5;
        const bx = bird.x - bw / 2;
        const by = bird.y - (_bkey === 'overlord' ? 62 : _bkey === 'tendril' ? 46 : 36);
        hpBarGraphics.fillStyle(0x222222, 0.85).fillRect(bx, by, bw, bh);
        const col = ratio > 0.5 ? 0x44ff44 : ratio > 0.25 ? 0xffff00 : 0xff4444;
        hpBarGraphics.fillStyle(col, 1).fillRect(bx, by, bw * ratio, bh);
    });
}

// ─── 드래그 ───────────────────────────────────────────
function startDrag(pointer) {
    // 조준화면으로 버튼 클릭 감지 (스크린 좌표 기준)
    if (uiAimBtn && uiAimBtn.visible) {
        if (Math.abs(pointer.x - 640) < 135 && Math.abs(pointer.y - 360) < 29) {
            returnToAimView();
            return;
        }
    }
    // 새총 근처이고 탄약 있을 때: 돌 드래그
    // pointer.worldX/Y는 줌 상태에서 부정확할 수 있으므로 toWorldPos와 동일 공식 사용
    const cam = sceneRef.cameras.main;
    const wx = cam.scrollX + pointer.x / cam.zoom;
    const wy = cam.scrollY + pointer.y / cam.zoom;
    if (currentStone && currentAmmo > 0 && !isRoundEnding &&
        Phaser.Math.Distance.Between(wx, wy, currentStone.x, currentStone.y) < 50) {
        isDragging = true;
        return;
    }
    // 그 외: 맵 드래그 (카메라 팬)
    if (!cameraFollowing) {
        isMapDragging  = true;
        mapDragOriginX = pointer.x;
        mapDragOriginY = pointer.y;
        mapDragScrollX = sceneRef.cameras.main.scrollX;
        mapDragScrollY = sceneRef.cameras.main.scrollY;
    }
}

function doDragAt(px, py) {
    if (!isDragging || !currentStone) return;

    // 새총 중심 오른쪽으로 당기면 바다(왼쪽) 방향으로 발사됨 → 완전 차단
    if (px > SLING_CENTER.x) {
        currentStone.setPosition(SLING_CENTER.x, SLING_CENTER.y);
        trajectoryGraphics.clear();
        return;
    }

    const angle = Phaser.Math.Angle.Between(px, py, SLING_CENTER.x, SLING_CENTER.y);
    let dist    = Phaser.Math.Distance.Between(px, py, SLING_CENTER.x, SLING_CENTER.y);
    if (dist > BASE_DRAG) dist = BASE_DRAG;

    currentStone.x = SLING_CENTER.x - Math.cos(angle) * dist;
    currentStone.y = SLING_CENTER.y - Math.sin(angle) * dist;

    // 궤적 예측선 (조준선 패시브 보유 + ON 시에만 표시)
    trajectoryGraphics.clear();
    if (aimLineStack > 0 && isOn('조준선')) {
        // 탄성증가 토글 반영한 실효 발사력
        const effMult = (armMuscleStack > 0 && isOn('탄성증가'))
            ? BASE_LAUNCH * Math.pow(1.2, armMuscleStack) : BASE_LAUNCH;
        const vx  = Math.cos(angle) * dist * effMult;
        const vy  = Math.sin(angle) * dist * effMult;
        const g   = config.physics.arcade.gravity.y;
        const cam = sceneRef.cameras.main;
        const visR = cam.scrollX + config.width  / cam.zoom;
        const visB = cam.scrollY + config.height / cam.zoom;

        // 1패스: 화면 내 전체 궤적 점 수집
        const allDots = [];
        for (let i = 0; i < 80; i++) {
            const t  = i * 0.05;
            const tx = SLING_CENTER.x + vx * t;
            const ty = SLING_CENTER.y + vy * t + 0.5 * g * t * t;
            if (tx > visR || tx < cam.scrollX || ty > visB) break;
            allDots.push({ tx, ty });
        }

        // 2패스: 스택1=전체의 50%, 스택2=100% 표시 + 끝으로 갈수록 페이드
        const showCount = aimLineStack >= 2 ? allDots.length : Math.ceil(allDots.length * 0.5);
        for (let i = 0; i < showCount; i++) {
            const alpha = aimLineStack >= 2
                ? 0.58
                : Math.max(0.04, 0.65 * (1 - i / showCount));
            trajectoryGraphics.fillStyle(0x00ffff, alpha);
            trajectoryGraphics.fillCircle(allDots[i].tx, allDots[i].ty, 3);
        }
    }
}

// ─── 지면 충격 파티클 (착지·바운스 공용) ────────────────
function spawnGroundImpact(scene, x) {
    // 흙먼지 파편 — 좌우로 튀는 작은 사각형
    for (let i = 0; i < 6; i++) {
        const chip = scene.add.rectangle(
            x + Phaser.Math.Between(-10, 10),
            GROUND_Y,
            Phaser.Math.Between(3, 7),
            Phaser.Math.Between(3, 7),
            Phaser.Utils.Array.GetRandom([0xc8a060, 0xa07840, 0xe0c080, 0x806030])
        ).setDepth(6).setOrigin(0.5, 1);
        scene.physics.add.existing(chip);
        chip.body.setVelocity(
            Phaser.Math.Between(-160, 160),
            Phaser.Math.Between(-220, -60)
        );
        chip.body.setGravityY(400);
        scene.tweens.add({
            targets: chip, alpha: 0, duration: Phaser.Math.Between(400, 700),
            onComplete: () => chip.destroy()
        });
    }
    // 충격파 링 (빠르게 퍼지다 사라짐)
    const ring = scene.add.graphics().setDepth(6);
    ring.lineStyle(2, 0xffd080, 0.9).strokeEllipse(x, GROUND_Y, 12, 6);
    scene.tweens.add({
        targets: ring,
        scaleX: 5, scaleY: 3, alpha: 0,
        duration: 280,
        ease: 'Quad.Out',
        onComplete: () => ring.destroy()
    });
}

// ─── 착지 폭발 (폭발 패시브 — 지면 충돌 시) ──────────
function spawnGroundExplosion(scene, gx, gy, stone) {
    const EXPL_R = 130;
    const dmg    = stone ? (stone.damage ?? STONE_DAMAGE) : STONE_DAMAGE;

    // 범위 내 새 데미지
    birds.getChildren().slice().forEach(b => {
        if (!b.active) return;
        if (Phaser.Math.Distance.Between(gx, gy, b.x, b.y) <= EXPL_R) {
            b.hp = (b.hp ?? 1) - dmg;
            if (b.hp <= 0) {
                const ebx = b.x, eby = b.y;
                const emat = b.materialValue ?? 10;
                const ebk  = b.texture ? b.texture.key : null;
                b.destroy();
                roundBirdsHit++; roundMaterial += emat; totalBirdsHit++;
                remainingBirds = Math.max(0, remainingBirds - 1);
                refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                showKillFx(sceneRef, ebx, eby, emat, ebk);
            } else {
                scene.tweens.add({ targets: b, alpha: 0.2, duration: 60, yoyo: true, repeat: 2,
                    onComplete: () => { if (b && b.active) b.setAlpha(1); } });
            }
        }
    });

    // 비주얼 (hitBird 폭발과 동일 연출)
    const flash = scene.add.graphics().setDepth(9).setPosition(gx, gy);
    flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 18);
    scene.tweens.add({ targets: flash, scaleX: 2.8, scaleY: 2.8, alpha: 0,
        duration: 160, ease: 'Quad.Out', onComplete: () => flash.destroy() });

    [[0xffff99, 5, 0], [0xff9933, 4, 55], [0xff4400, 3, 110]].forEach(([col, lw, delay]) => {
        const ring = scene.add.graphics().setDepth(8).setPosition(gx, gy);
        ring.lineStyle(lw, col, 1).strokeCircle(0, 0, 10);
        const ts = EXPL_R / 10;
        scene.tweens.add({ targets: ring, scaleX: ts, scaleY: ts, alpha: 0,
            duration: 380, delay, ease: 'Cubic.Out', onComplete: () => ring.destroy() });
    });

    for (let i = 0; i < 8; i++) {
        const ang  = (i / 8) * Math.PI * 2;
        const dist = EXPL_R * (0.7 + Math.random() * 0.3);
        const spark = scene.add.graphics().setDepth(7).setPosition(gx, gy);
        spark.fillStyle(i % 2 === 0 ? 0xff7700 : 0xffdd22, 1).fillCircle(0, 0, 5 - Math.floor(i / 3));
        scene.tweens.add({ targets: spark,
            x: gx + Math.cos(ang) * dist,
            y: gy + Math.sin(ang) * dist,
            scaleX: 0.2, scaleY: 0.2, alpha: 0,
            duration: 420 + i * 15, ease: 'Quad.Out',
            onComplete: () => spark.destroy() });
    }

    scene.cameras.main.shake(200, 0.018);

    // 착지 폭발 처치 후 라운드 클리어 체크
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
    }
}

// ─── 번개탄 비주얼: 프레임 밖 하늘에서 내려치는 번개 ──
function spawnLightningFx(scene, cx, cy, radius) {
    const cam    = scene.cameras.main;
    // 화면 상단보다 위 — 완전히 프레임 밖에서 시작
    const skyTop = cam.scrollY - 80;

    const BOLT_COUNT = 4;

    for (let i = 0; i < BOLT_COUNT; i++) {
        // 착지 지점: 반경 내 랜덤 (첫 번째는 돌 중심)
        const ang   = Math.random() * Math.PI * 2;
        const dist  = (i === 0) ? 0 : Math.random() * radius * 0.8;
        const landX = cx + Math.cos(ang) * dist;
        const landY = cy + Math.sin(ang) * dist * 0.35;

        // 시작점: 프레임 밖 상단, 착지 X에서 살짝만 벗어남
        const startX = landX + (Math.random() - 0.5) * 18;
        const startY = skyTop;

        // 지그재그 경로 — 세그먼트 많이, 흔들림 크게
        const SEGS = 10;
        const pts  = [{ x: startX, y: startY }];
        for (let j = 1; j < SEGS; j++) {
            const t = j / SEGS;
            pts.push({
                x: startX + (landX - startX) * t + (Math.random() - 0.5) * 48,
                y: startY + (landY - startY) * t,
            });
        }
        pts.push({ x: landX, y: landY });

        scene.time.delayedCall(i * 60, () => {
            const g = scene.add.graphics().setDepth(9);

            // 외곽: 하늘색 굵은 선
            g.lineStyle(4, 0x44ccff, 0.9);
            g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
            g.strokePath();

            // 내심: 흰색 얇은 선
            g.lineStyle(1.5, 0xffffff, 1);
            g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
            pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
            g.strokePath();

            // 착지 섬광
            const impact = scene.add.graphics().setDepth(10).setPosition(landX, landY);
            impact.fillStyle(0xffffff, 1).fillCircle(0, 0, 12);
            impact.lineStyle(2, 0x88eeff, 1).strokeCircle(0, 0, 22);
            scene.tweens.add({ targets: impact, scaleX: 2.8, scaleY: 2.8, alpha: 0,
                duration: 220, ease: 'Quad.Out', onComplete: () => impact.destroy() });

            // 번개 빠르게 페이드
            scene.tweens.add({ targets: g, alpha: 0, duration: 150,
                ease: 'Quad.In', onComplete: () => g.destroy() });

            if (i === 0) scene.cameras.main.shake(60, 0.007);
        });
    }
}

// ─── 그라운드 제로 (RARE): 착지 시 하늘에서 수직 녹색 레이저 빔 ──
// 빔 폭 안의 모든 적(높이 무관)이 -1 피격
function spawnGroundZero(scene, gx) {
    const cam      = scene.cameras.main;
    const beamTopY = cam.scrollY - 100;        // 화면 상단 위 (보이지 않는 곳에서 출발)
    const beamLen  = GROUND_Y - beamTopY;
    const BEAM_W   = 56;                       // 빔 시각 폭
    const HIT_HALF = BEAM_W / 2 + 6;           // 피격 판정은 시각보다 약간 넓게

    // ── 피격: 빔 세로 라인 안의 모든 적 (높이 무관) ──
    birds.getChildren().slice().forEach(b => {
        if (!b.active) return;
        if (Math.abs(b.x - gx) > HIT_HALF) return;
        b.hp = (b.hp ?? 1) - 1;
        if (b.hp <= 0) {
            const bx2 = b.x, by2 = b.y, mat2 = b.materialValue ?? 10, bk2 = b.texture?.key;
            b.destroy();
            roundBirdsHit++; roundMaterial += mat2; totalBirdsHit++;
            remainingBirds = Math.max(0, remainingBirds - 1);
            refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
            showKillFx(scene, bx2, by2, mat2, bk2);
        } else {
            scene.tweens.add({ targets: b, alpha: 0.15, duration: 60,
                yoyo: true, repeat: 2, onComplete: () => { if (b?.active) b.setAlpha(1); } });
        }
    });

    // ══════ 비주얼 ══════

    // 1) 지면 차징 점멸 — 빔 강하 직전 선행 표시
    const charge = scene.add.graphics().setDepth(10).setPosition(gx, GROUND_Y - 4);
    charge.fillStyle(0xeeffaa, 1).fillCircle(0, 0, 6);
    scene.tweens.add({ targets: charge, scaleX: 4, scaleY: 4, alpha: 0,
        duration: 110, ease: 'Quad.Out', onComplete: () => charge.destroy() });

    // 2) 빔 본체 (3겹 합성) — origin (0.5, 0)로 위에서 아래로 강하 (scaleY 0.04→1)
    //    외곽 글로우 → 중간 녹색 → 흰빛 코어 순으로 합성하여 깊이감 부여
    const glow = scene.add.rectangle(gx, beamTopY, BEAM_W * 1.6, beamLen, 0x44ff44, 0.22)
        .setOrigin(0.5, 0).setDepth(9);
    const mid  = scene.add.rectangle(gx, beamTopY, BEAM_W,        beamLen, 0x33ff14, 0.78)
        .setOrigin(0.5, 0).setDepth(9);
    const core = scene.add.rectangle(gx, beamTopY, BEAM_W * 0.3,  beamLen, 0xffffff, 1)
        .setOrigin(0.5, 0).setDepth(10);

    [glow, mid, core].forEach(r => { r.scaleY = 0.04; });
    scene.tweens.add({ targets: [glow, mid, core], scaleY: 1,
        duration: 90, ease: 'Quad.Out' });

    // 빔 유지 후 페이드아웃 (외곽이 먼저 사라지고 코어가 마지막까지 잔광)
    scene.tweens.add({ targets: [glow, mid], alpha: 0, duration: 280, delay: 160,
        ease: 'Quad.In', onComplete: () => { glow.destroy(); mid.destroy(); } });
    scene.tweens.add({ targets: core, alpha: 0, duration: 240, delay: 200,
        ease: 'Quad.In', onComplete: () => core.destroy() });

    // 3) 빔 본체 위에 흐르는 노이즈 라인 (역동적 느낌) — 짧은 가로 슬라이스 3개
    for (let k = 0; k < 3; k++) {
        const slice = scene.add.rectangle(
            gx,
            beamTopY + beamLen * (0.15 + k * 0.3),
            BEAM_W * 1.1,
            5,
            0xffffff, 0.85
        ).setDepth(10);
        scene.tweens.add({
            targets: slice,
            y: GROUND_Y - 8,
            alpha: 0,
            scaleX: 0.4,
            duration: 280 + k * 40,
            delay: 30 + k * 20,
            ease: 'Quad.In',
            onComplete: () => slice.destroy()
        });
    }

    // 4) 지면 폭발 — 빔 도달 직후 (80ms 딜레이)
    scene.time.delayedCall(80, () => {
        // 백열 섬광
        const flash = scene.add.graphics().setDepth(11).setPosition(gx, GROUND_Y - 8);
        flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 28);
        scene.tweens.add({ targets: flash, scaleX: 2.6, scaleY: 2.6, alpha: 0,
            duration: 260, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // 녹색 충격파 링 — 3겹 (납작한 타원)
        const RING_DEFS = [
            { col: 0xccffaa, lw: 4, delay:   0, dur: 340 },
            { col: 0x88ff44, lw: 3, delay:  70, dur: 440 },
            { col: 0x44ee22, lw: 2, delay: 140, dur: 560 },
        ];
        RING_DEFS.forEach(({ col, lw, delay, dur }) => {
            const ring = scene.add.graphics().setDepth(9).setPosition(gx, GROUND_Y - 2);
            ring.lineStyle(lw, col, 0.95).strokeEllipse(0, 0, 18, 9);
            scene.tweens.add({ targets: ring, scaleX: 7, scaleY: 5, alpha: 0,
                duration: dur, delay, ease: 'Cubic.Out',
                onComplete: () => ring.destroy() });
        });

        // 녹색 스파크 12방향
        for (let i = 0; i < 12; i++) {
            const ang  = (i / 12) * Math.PI * 2;
            const dist = 80 + Math.random() * 70;
            const spk  = scene.add.graphics().setDepth(8).setPosition(gx, GROUND_Y - 4);
            spk.fillStyle(i % 2 === 0 ? 0xaaff44 : 0xccff88, 1)
               .fillCircle(0, 0, 4 - (i % 3));
            scene.tweens.add({ targets: spk,
                x: gx + Math.cos(ang) * dist,
                y: GROUND_Y - 4 + Math.sin(ang) * dist * 0.35,
                scaleX: 0.2, scaleY: 0.2, alpha: 0,
                duration: 500 + i * 18, ease: 'Quad.Out',
                onComplete: () => spk.destroy() });
        }

        // 흙먼지 파편 — 좌우로 갈라지는 사각형 8개
        for (let i = 0; i < 8; i++) {
            const dir  = i < 4 ? -1 : 1;
            const chip = scene.add.rectangle(gx, GROUND_Y,
                Phaser.Math.Between(3, 6), Phaser.Math.Between(3, 6),
                Phaser.Utils.Array.GetRandom([0xc8a060, 0xa07840, 0xe0c080])
            ).setDepth(7).setOrigin(0.5, 1);
            scene.physics.add.existing(chip);
            chip.body.setVelocity(dir * Phaser.Math.Between(120, 220),
                                   Phaser.Math.Between(-300, -120));
            chip.body.setGravityY(500);
            scene.tweens.add({ targets: chip, alpha: 0,
                duration: Phaser.Math.Between(550, 800),
                onComplete: () => chip.destroy() });
        }

        // 상승하는 녹색 잔열 입자 (5개) — 빔이 사라지며 위로 올라가는 잔광
        for (let i = 0; i < 5; i++) {
            const px = gx + Phaser.Math.Between(-18, 18);
            const py = GROUND_Y - 10;
            const ember = scene.add.graphics().setDepth(9).setPosition(px, py);
            ember.fillStyle(0xaaff66, 0.9).fillCircle(0, 0, 3);
            scene.tweens.add({ targets: ember,
                y: py - Phaser.Math.Between(120, 220),
                alpha: 0, scaleX: 0.3, scaleY: 0.3,
                duration: 700 + i * 80,
                delay: 60 + i * 30,
                ease: 'Quad.Out',
                onComplete: () => ember.destroy() });
        }

        scene.cameras.main.shake(220, 0.014);
    });

    // 5) 라운드 클리어 체크 (빔으로 마지막 적 처치 가능)
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        scene.time.delayedCall(900, () => showRoundClear(scene), [], scene);
    }
}

// ─── 재활용 (NORMAL): 빈손 착지 시 확률적으로 돌멩이 회수 ──
// 스택별 확률: 1=50%, 2=75%, 3=87.5% (1 - 0.5^stack)
// 메인 돌멩이만 대상 (산탄·분열 돌멩이 제외), 아무 적도 맞히지 않은 경우에 한함
function tryRecycleStone(stone) {
    if (!stone) return false;
    if (recycleStack <= 0 || !isOn('재활용')) return false;
    if (!stone.recyclable) return false;
    if (stone.hitBirds && stone.hitBirds.size > 0) return false;

    const chance = 1 - Math.pow(0.5, recycleStack);
    if (Math.random() > chance) return false;

    // 돌멩이 회수 (최대치 초과 방지)
    if (currentAmmo < currentMaxAmmo) {
        currentAmmo++;
        if (uiAmmoText) uiAmmoText.setText(`남은 돌멩이: ${currentAmmo} / ${currentMaxAmmo}`);
    }

    // 중복 방지 — 동일 돌멩이가 settled+out_of_bounds 양쪽에서 트리거 되지 않도록
    stone.recyclable = false;

    // 자막 표시 + 지면 회수 비주얼
    showRecycleSubtitle(sceneRef);
    spawnRecycleFx(sceneRef, stone.x, Math.min(stone.y, GROUND_Y));
    return true;
}

// 재활용 자막 — 화면 상단 중앙 (HUD 고정, 스케일·페이드 인 → 살짝 떠오르며 페이드 아웃)
function showRecycleSubtitle(scene) {
    if (!scene) return;
    const W = 1280;

    // 배경 글로우 (살짝 어두운 녹색 띠)
    const bg = scene.add.graphics().setScrollFactor(0).setDepth(49);
    bg.fillStyle(0x114422, 0.55).fillRoundedRect(W / 2 - 200, 158, 400, 56, 14);
    bg.lineStyle(2, 0x44ff88, 0.85).strokeRoundedRect(W / 2 - 200, 158, 400, 56, 14);

    const subtitle = scene.add.text(W / 2, 186, '♻  재활용 !  돌멩이 +1', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '26px',
        color: '#aaffcc',
        stroke: '#000000',
        strokeThickness: 4,
    }).setOrigin(0.5).setScrollFactor(0).setDepth(50);

    subtitle.setAlpha(0).setScale(0.6);
    bg.setAlpha(0);

    // 등장: 살짝 튕기듯 확대
    scene.tweens.add({
        targets: subtitle,
        alpha: 1, scale: 1,
        duration: 220, ease: 'Back.Out'
    });
    scene.tweens.add({
        targets: bg, alpha: 1,
        duration: 180, ease: 'Quad.Out'
    });

    // 유지 후 살짝 떠오르며 페이드 아웃
    scene.tweens.add({
        targets: [subtitle, bg],
        y: '-=24', alpha: 0,
        duration: 550,
        delay: 950,
        ease: 'Quad.In',
        onComplete: () => { subtitle.destroy(); bg.destroy(); }
    });
}

// 재활용 성공 위치 비주얼 — 돌멩이가 빛이 되어 새총으로 돌아가는 연출
function spawnRecycleFx(scene, fx, fy) {
    if (!scene) return;

    // 1) 지면에서 녹색 ♻ 회수 링 (점차 좁아짐 — 빨려들어가는 느낌)
    const ring = scene.add.graphics().setDepth(7).setPosition(fx, fy);
    ring.lineStyle(3, 0x66ff99, 1).strokeCircle(0, 0, 36);
    scene.tweens.add({ targets: ring, scaleX: 0.2, scaleY: 0.2, alpha: 0,
        duration: 340, ease: 'Quad.In',
        onComplete: () => ring.destroy() });

    // 2) 6개 녹색 입자가 새총 쪽으로 빨려가는 곡선
    for (let i = 0; i < 6; i++) {
        const startAng = (i / 6) * Math.PI * 2;
        const startDist = 18 + Math.random() * 14;
        const px = fx + Math.cos(startAng) * startDist;
        const py = fy + Math.sin(startAng) * startDist;

        const dot = scene.add.graphics().setDepth(8).setPosition(px, py);
        dot.fillStyle(0xaaffcc, 1).fillCircle(0, 0, 3);

        // 새총 위치로 곡선 이동 (중간점에 살짝 위로 올라가는 호)
        scene.tweens.add({
            targets: dot,
            x: SLING_CENTER.x,
            y: SLING_CENTER.y - 10,
            alpha: 0,
            scaleX: 0.4, scaleY: 0.4,
            duration: 600 + i * 30,
            delay: i * 20,
            ease: 'Cubic.In',
            onComplete: () => dot.destroy()
        });
    }

    // 3) 새총 부근에 짧은 녹색 점멸 (도착 표시)
    scene.time.delayedCall(620, () => {
        const arrival = scene.add.graphics().setDepth(8)
            .setPosition(SLING_CENTER.x, SLING_CENTER.y - 10);
        arrival.fillStyle(0xaaffcc, 1).fillCircle(0, 0, 10);
        scene.tweens.add({ targets: arrival,
            scaleX: 2.4, scaleY: 2.4, alpha: 0,
            duration: 280, ease: 'Quad.Out',
            onComplete: () => arrival.destroy() });
    });
}

// ─── 발사 ─────────────────────────────────────────────
function doFireStone(px, py) {
    if (!isDragging || !currentStone) return;
    isDragging = false;
    trajectoryGraphics.clear();

    const angle = Phaser.Math.Angle.Between(currentStone.x, currentStone.y, SLING_CENTER.x, SLING_CENTER.y);
    const dist  = Phaser.Math.Distance.Between(currentStone.x, currentStone.y, SLING_CENTER.x, SLING_CENTER.y);

    if (dist < 20) {
        currentStone.setPosition(SLING_CENTER.x, SLING_CENTER.y);
        return;
    }

    currentAmmo--;
    uiAmmoText.setText(`남은 돌멩이: ${currentAmmo} / ${currentMaxAmmo}`);

    const s = activeStones.get(SLING_CENTER.x, SLING_CENTER.y, 'stone');
    if (s) {
        s.setActive(true).setVisible(true).setDepth(1);
        s.setScale(getStoneScale());  // 큰돌 토글 반영 (getStoneScale 내부에서 isOn 사용)
        // 히트박스는 시각 크기와 분리 — 최대 52px로 고정 (큰돌 x3 오판정 방지)
        const HIT_CAP = 52;
        s.body.setSize(Math.min(s.displayWidth, HIT_CAP), Math.min(s.displayHeight, HIT_CAP));
        s.body.reset(SLING_CENTER.x, SLING_CENTER.y);
        s.body.allowGravity = true;
        // 탄성증가 토글 반영한 실효 발사력
        const effMult = (armMuscleStack > 0 && isOn('탄성증가'))
            ? BASE_LAUNCH * Math.pow(1.2, armMuscleStack) : BASE_LAUNCH;
        const vx = Math.cos(angle) * dist * effMult;
        const vy = Math.sin(angle) * dist * effMult;
        s.setVelocity(vx, vy);
        s.body.setGravityY(0);
        // 파워업 토글 반영한 실효 데미지
        s.damage      = STONE_DAMAGE * Math.pow(2, (isOn('파워업') ? ironBallStack : 0)
                                                     + (isOn('큰돌')  ? bigStoneStack  : 0));
        s.bounceCount      = 0;
        s.settled          = false;
        s.magnetFired      = false;
        s.magnetTarget     = null;
        s.magnetTrackTime  = 0;
        s.magnetHitCooldown= 0;   // 자석탄 재타격 쿨다운 (관통 조합용)
        s.lightningTimer   = 0;
        s.hitBirds        = new Set();
        s.splitGen        = 0;   // 체세포분열 세대 (0=원본)
        s.recyclable      = true;  // 재활용 대상 — 사용자가 직접 발사한 메인 돌멩이만
        s.setAlpha(1);

        // 산탄: ±20° 추가 2방향 동시 발사 (ammo 소비 없음)
        if (shotgunStack > 0 && isOn('산탄')) {
            [-0.175, 0.175].forEach(offset => {
                const sa = activeStones.get(SLING_CENTER.x, SLING_CENTER.y, 'stone');
                if (!sa) return;
                sa.setActive(true).setVisible(true).setDepth(1);
                sa.setScale(getStoneScale() * 0.75);
                sa.body.setSize(Math.min(sa.displayWidth, HIT_CAP), Math.min(sa.displayHeight, HIT_CAP));
                sa.body.reset(SLING_CENTER.x, SLING_CENTER.y);
                sa.body.allowGravity = true;
                sa.setVelocity(Math.cos(angle + offset) * dist * effMult,
                               Math.sin(angle + offset) * dist * effMult);
                sa.body.setGravityY(0);
                sa.damage         = s.damage;
                sa.bounceCount      = 0;
                sa.settled          = false;
                sa.magnetFired      = false;
                sa.magnetTarget     = null;
                sa.magnetTrackTime  = 0;
                sa.magnetHitCooldown= 0;
                sa.lightningTimer   = 0;
                sa.hitBirds        = new Set();
                sa.splitGen        = 0;   // 체세포분열 세대 (0=원본)
                sa.recyclable      = false;  // 산탄 추가 돌멩이는 재활용 대상 아님
                sa.setAlpha(0.85);
            });
        }

        cameraFollowing = true;
        setAimBtnVisible(false);
    }

    currentStone.destroy();
    currentStone = null;

    if (currentAmmo <= 0) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(2000, checkRoundEnd, [], sceneRef);
    }
    updateResearchBtn();
    // 다음 돌은 카메라 복귀 후 wipeReturn 콜백에서 로드됨
}

// ─── 체세포분열: 분열 돌멩이 생성 ───────────────────────
const MAX_SPLIT_GEN = 3;   // 세대 0→1→2→3에서 분열 중지 (최대 1+2+4+8=15발)
function spawnSplitStones(stone) {
    if (!cellDivisionStack || !isOn('체세포분열')) return;
    const gen = stone.splitGen ?? 0;
    if (gen >= MAX_SPLIT_GEN) return;

    const sx         = stone.x;
    const sy         = stone.y;
    const parentDmg  = stone.damage ?? STONE_DAMAGE;
    const SPLIT_SPEED = 460;

    // 분수(fountain) 형태: 수직 위를 기준으로 ±22° 두 갈래
    [
        -Math.PI / 2 - 0.385,   // 왼쪽 상향 (~-112°)
        -Math.PI / 2 + 0.385,   // 오른쪽 상향 (~-68°)
    ].forEach(angle => {
        const ss = activeStones.get(sx, sy, 'stone');
        if (!ss) return;
        ss.setActive(true).setVisible(true).setDepth(1);
        ss.setScale(0.44 - gen * 0.06);   // 세대가 높을수록 약간 작아짐
        const HIT_CAP = 28;
        ss.body.setSize(Math.min(ss.displayWidth, HIT_CAP), Math.min(ss.displayHeight, HIT_CAP));
        ss.body.reset(sx, sy);
        ss.body.allowGravity = true;
        ss.setVelocity(Math.cos(angle) * SPLIT_SPEED, Math.sin(angle) * SPLIT_SPEED);
        ss.body.setGravityY(0);
        ss.damage            = parentDmg;
        ss.bounceCount       = 0;
        ss.settled           = false;
        ss.magnetFired       = false;
        ss.magnetTarget      = null;
        ss.magnetTrackTime   = 0;
        ss.magnetHitCooldown = 0;
        ss.lightningTimer    = 0;
        ss.hitBirds          = new Set();
        ss.splitGen          = gen + 1;
        ss.recyclable        = false;  // 분열 돌멩이는 재활용 대상 아님
        ss.setAlpha(0.88);
    });
}

// ─── 충돌: 돌멩이 vs 새 ──────────────────────────────
function hitBird(stone, bird) {
    if (!stone.active || !bird.active) return;

    // ── 발사 직후 근거리 오판정 방지 ──────────────────────
    // 큰돌 패시브로 히트박스가 커질 경우, 새총 주변 적에 즉시 겹치는 문제 차단
    // 새총 중심에서 90px 이상 벗어난 뒤부터만 판정
    if (Phaser.Math.Distance.Between(stone.x, stone.y, SLING_CENTER.x, SLING_CENTER.y) < 90) return;

    // ── 중복 타격 방지 (오버랩 다중 발화 + 풀 재사용 대응) ──
    // 관통 여부와 무관하게 같은 돌이 같은 새를 두 번 맞히는 것을 원천 차단
    if (!stone.hitBirds) stone.hitBirds = new Set();
    if (stone.hitBirds.has(bird)) return;
    stone.hitBirds.add(bird);

    // ── 관통 패시브 (토글 반영) ─────────────────────
    if (piercingStack > 0 && isOn('관통')) {
        // 관통: 돌이 계속 날아감 (hitBirds로 중복 방지는 위에서 처리)
    } else {
        activeStones.killAndHide(stone);
    }

    const dmg = stone.damage ?? STONE_DAMAGE;
    bird.hp = (bird.hp ?? 1) - dmg;

    if (bird.hp > 0) {
        // 새 생존 — 피격 플래시 + 데미지 숫자
        this.tweens.add({
            targets: bird, alpha: 0.15, duration: 75, yoyo: true, repeat: 2,
            onComplete: () => { if (bird && bird.active) bird.setAlpha(1); }
        });
        this.cameras.main.shake(50, 0.003);

        const dmgTxt = this.add.text(bird.x, bird.y - 20, `-${dmg}`, {
            fontFamily: 'Arial Black', fontSize: '20px', color: '#ff6666'
        }).setOrigin(0.5).setDepth(8);
        this.tweens.add({
            targets: dmgTxt, y: dmgTxt.y - 45, alpha: 0,
            duration: 700, onComplete: () => dmgTxt.destroy()
        });
        // 체세포분열: 새가 살아있어도 명중 시 분열
        spawnSplitStones(stone);
        return;
    }

    // 새 처치
    // 체세포분열: 새 처치 시에도 분열
    spawnSplitStones(stone);
    const bx = bird.x, by = bird.y;
    const mat     = bird.materialValue ?? 10;
    const birdKey = bird.texture ? bird.texture.key : null;
    bird.destroy();

    roundBirdsHit++;
    roundMaterial += mat;
    totalBirdsHit++;
    remainingBirds = Math.max(0, remainingBirds - 1);
    refreshMaterialHUD();
    refreshRemainingHUD();
    refreshPlayerPanel();
    this.cameras.main.shake(120, 0.008);
    // 모든 처치: 새 위치에서 떠오르는 텍스트 연출 통일
    showKillFx(this, bx, by, mat, birdKey);

    // 폭발 강화: 반경 130px 내 적에게 범위 데미지
    if (explosionStack > 0 && isOn('폭발')) {
        const EXPL_R = 130;

        // ── 데미지 즉시 적용 ──
        birds.getChildren().slice().forEach(b => {
            if (!b.active) return;
            if (Phaser.Math.Distance.Between(bx, by, b.x, b.y) <= EXPL_R) {
                b.hp = (b.hp ?? 1) - (stone ? stone.damage ?? STONE_DAMAGE : STONE_DAMAGE);
                if (b.hp <= 0) {
                    const ebx = b.x, eby = b.y;
                    const emat = b.materialValue ?? 10;
                    const ebk  = b.texture ? b.texture.key : null;
                    b.destroy();
                    roundBirdsHit++; roundMaterial += emat; totalBirdsHit++;
                    remainingBirds = Math.max(0, remainingBirds - 1);
                    refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                    showKillFx(sceneRef, ebx, eby, emat, ebk);
                } else {
                    this.tweens.add({ targets: b, alpha: 0.2, duration: 60, yoyo: true, repeat: 2,
                        onComplete: () => { if (b && b.active) b.setAlpha(1); } });
                }
            }
        });

        // ── 폭발 비주얼: 소→대 확장 (PAANG 연출) ──
        // 1) 중심 백열 섬광
        const flash = this.add.graphics().setDepth(9).setPosition(bx, by);
        flash.fillStyle(0xffffff, 1).fillCircle(0, 0, 18);
        this.tweens.add({ targets: flash, scaleX: 2.8, scaleY: 2.8, alpha: 0,
            duration: 160, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // 2) 충격파 링 3겹 (순차 확장 — 소→대)
        [[0xffff99, 5, 0], [0xff9933, 4, 55], [0xff4400, 3, 110]].forEach(([col, lw, delay]) => {
            const ring = this.add.graphics().setDepth(8).setPosition(bx, by);
            ring.lineStyle(lw, col, 1).strokeCircle(0, 0, 10);
            const ts = EXPL_R / 10;
            this.tweens.add({ targets: ring, scaleX: ts, scaleY: ts, alpha: 0,
                duration: 380, delay, ease: 'Cubic.Out',
                onComplete: () => ring.destroy() });
        });

        // 3) 불꽃 파편 8방향 방사
        for (let i = 0; i < 8; i++) {
            const ang  = (i / 8) * Math.PI * 2;
            const dist = EXPL_R * (0.7 + Math.random() * 0.3);
            const spark = this.add.graphics().setDepth(7).setPosition(bx, by);
            spark.fillStyle(i % 2 === 0 ? 0xff7700 : 0xffdd22, 1).fillCircle(0, 0, 5 - Math.floor(i / 3));
            this.tweens.add({ targets: spark,
                x: bx + Math.cos(ang) * dist,
                y: by + Math.sin(ang) * dist,
                scaleX: 0.2, scaleY: 0.2, alpha: 0,
                duration: 420 + i * 15, ease: 'Quad.Out',
                onComplete: () => spark.destroy() });
        }

        // 4) 카메라 진동
        this.cameras.main.shake(200, 0.018);

        // 폭발 처치 후 라운드 클리어 체크
        if (remainingBirds <= 0 && !isRoundEnding) {
            isRoundEnding = true;
            sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
        }
    }

    // 50마리 전멸 → 라운드 클리어
    if (remainingBirds <= 0 && !isRoundEnding) {
        isRoundEnding = true;
        sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
    }

    for (let i = 0; i < 8; i++) {
        const scrap = this.add.rectangle(bx, by, 6, 6, 0x39ff14);
        this.physics.add.existing(scrap);
        scrap.body.setVelocity(
            Phaser.Math.Between(-220, 220),
            Phaser.Math.Between(-300, -50)
        );
        this.tweens.add({ targets: scrap, alpha: 0, duration: 700, onComplete: () => scrap.destroy() });
    }

}

// ─── 페이드 트랜지션 + 카메라 복귀 (Phaser 네이티브 fade) ──
function wipeReturn(scene, onComplete) {
    setAimBtnVisible(false);
    const cam = scene.cameras.main;
    // 카메라가 이미 홈 근처면 암전 없이 즉시 복귀
    const homeScrollX = Math.max(0, SLING_CENTER.x - config.width  / (2 * cam.zoom));
    const homeScrollY = CAM_HOME_Y - config.height / (2 * cam.zoom);
    const nearHome = cam.zoom >= 0.95 &&
                     Math.abs(cam.scrollX - homeScrollX) < 200 &&
                     Math.abs(cam.scrollY - homeScrollY) < 200;
    if (nearHome) {
        cam.stopFollow();
        cam.setZoom(1.0);
        cam.centerOn(SLING_CENTER.x, CAM_HOME_Y);
        if (onComplete) onComplete();
        return;
    }
    cam.fadeOut(280, 0, 0, 0);
    cam.once('camerafadeoutcomplete', () => {
        cam.stopFollow();
        cam.setZoom(1.0);
        cam.centerOn(SLING_CENTER.x, CAM_HOME_Y);
        cam.fadeIn(280, 0, 0, 0);
        cam.once('camerafadeincomplete', () => { if (onComplete) onComplete(); });
    });
}

// ─── 라운드 종료 판정 (돌멩이 소진 시) ───────────────
// 새가 전멸된 경우는 hitBird에서 showRoundClear()로 처리됨
// 여기서는 돌멩이가 먼저 소진됐을 때만 호출됨
function checkRoundEnd() {
    if (activeStones.countActive(true) > 0) {
        sceneRef.time.delayedCall(500, checkRoundEnd, [], sceneRef);
        return;
    }
    // 혹시 마지막 돌에서 마지막 새까지 처치했다면 라운드 클리어 처리
    if (remainingBirds <= 0) return;  // showRoundClear가 이미 처리 중

    // 돌멩이 소진 & 새 잔존 → 게임오버
    wipeReturn(sceneRef, () => {
        materialStock += roundMaterial;
        roundMaterial = 0;
        refreshMaterialHUD();
        showGameOver(sceneRef);
    });
}

// ─── 라운드 클리어 오버레이 (직접 표시, wipe 없음) ───
function showRoundClearOverlay(scene) {
    clearOverlay();
    uiOverlay = scene.add.container(0, 0).setDepth(50).setScrollFactor(0);

    mkRect(scene, uiOverlay, 0, 0, 1280, 720, 0x000000, 0.82);
    mkPanel(scene, uiOverlay, 290, 145, 700, 430);

    mkText(scene, uiOverlay, 640, 200, `ROUND  ${roundNumber}  CLEAR!`, {
        fontFamily: 'Arial Black', fontSize: '48px', color: '#39ff14'
    });
    mkText(scene, uiOverlay, 640, 280, `보유 특수물질 : ${materialStock}g`, {
        fontFamily: 'Arial Black', fontSize: '26px', color: '#e8a030'
    });
    mkText(scene, uiOverlay, 640, 322, '박사님 연구에 투자할 수 있습니다!', {
        fontFamily: 'Arial', fontSize: '16px', color: '#aaaaaa'
    });

    const div = scene.add.graphics();
    div.lineStyle(1, 0x4a3010, 1).lineBetween(320, 350, 960, 350);
    uiOverlay.add(div);

    // 연구 버튼 (오버레이 내부) — 기증 팝업 표시
    mkBtn(scene, uiOverlay, 640, 420, 300, 52, '🔬 박사님 강화 연구  (10g~)', 0xffdd44, '#000000', () => {
        if (materialStock >= 10) {
            showDonationUI(scene, 0, materialStock);
        }
    });

    mkBtn(scene, uiOverlay, 640, 500, 280, 52, '다음 라운드 ▶', 0x39ff14, '#000000',
        () => startNextRound(scene)
    );
}

// ─── 라운드 클리어 (50마리 전멸) — wipe 트랜지션 후 오버레이 ─
function showRoundClear(scene) {
    // 적립된 라운드 획득 재료 materialStock에 합산
    materialStock += roundMaterial;
    roundMaterial = 0;
    refreshMaterialHUD();
    updateResearchBtn();

    wipeReturn(scene, () => showRoundClearOverlay(scene));
}

// ─── 순위 저장 (localStorage) ────────────────────────
const SCORE_KEY = 'slingshot_scores_v1';

function getScores() {
    try { return JSON.parse(localStorage.getItem(SCORE_KEY) || '[]'); }
    catch { return []; }
}

function saveScore(name, kills, round, material) {
    const scores = getScores();
    scores.push({
        name, kills, round, material,
        date: new Date().toLocaleDateString('ko-KR')
    });
    scores.sort((a, b) => b.kills - a.kills || b.round - a.round || b.material - a.material);
    scores.splice(10);  // 상위 10개만 보관
    localStorage.setItem(SCORE_KEY, JSON.stringify(scores));
}

    if (old) old.remove();

    const div = document.createElement('div');
    div.id = 'sling-name-overlay';

function getRarityHint(donated) {
    const entry = RARITY_TABLE.find(e => donated >= e.minAmount) ?? RARITY_TABLE[RARITY_TABLE.length - 1];
    const w = entry.weights;
    let detail = `노멀 ${w.NORMAL}%`;
    if (w.RARE  > 0) detail += `  /  레어 ${w.RARE}%`;
    if (w.EPIC  > 0) detail += `  /  EPIC ${w.EPIC}%`;
    return `${entry.hint}\n(${detail})`;
}

// ─── 희귀도 추첨 헬퍼 ─────────────────────────────────
function rollRarity(donatedAmt) {
    const row = RARITY_TABLE.find(r => donatedAmt >= r.minAmount) ?? RARITY_TABLE[RARITY_TABLE.length - 1];
    const w   = row.weights;
    const total = w.NORMAL + w.RARE + w.EPIC;
    let rand = Math.random() * total;
    if ((rand -= w.NORMAL) < 0) return 'NORMAL';
    if ((rand -= w.RARE)   < 0) return 'RARE';
    return 'EPIC';
}

            fontFamily: 'Arial Black', fontSize: '28px', color: tierCol
        });

        // 설명 텍스트
        mkText(scene, uiOverlay, cx, cy + 14, p.desc, {
            fontFamily: 'Arial', fontSize: '16px', color: '#cccccc',
            wordWrap: { width: CW - 28 }, align: 'center'
        });

        const hit = scene.add.rectangle(cx, cy, CW, CH, 0x000000, 0)
            .setInteractive({ useHandCursor: true });
        hit.on('pointerover', () => { card.clear(); drawCard(card, cx, cy, CW, CH, 0x2e3e52, p.color, 3); });
        hit.on('pointerout',  () => { card.clear(); drawCard(card, cx, cy, CW, CH, 0x1e2a3a, p.color, 2); });
        overlayHitAreas.push({ x: cx, y: cy, hw: CW / 2, hh: CH / 2, cb: () => applyPassive(scene, p) });
        uiOverlay.add(hit);
    });

    // ── 뒤로 가기 버튼 — 기증금액 환불 후 기증 UI 재표시 ──
    mkBtn(scene, uiOverlay, 640, 668, 200, 42, '◀ 뒤로 가기', 0x334455, '#aaaaaa', () => {
        // 기증했던 금액 환불
        materialStock += donatedAmt;
        refreshMaterialHUD();
        updateResearchBtn();
        // 기증 UI 다시 표시
        showDonationUI(scene, 0, materialStock);
    }, 18);
}

// ─── 패시브 적용 ──────────────────────────────────────
function applyPassive(scene, passive) {
    // 안전망: 최대 스택 도달 시 무시 (풀 필터링이 1차 방어, 여기가 2차)
    const _ms = n => PASSIVE_MAX_STACK_OF[n] ?? PASSIVE_MAX_STACK;
    if (passive.name === '탄성증가') {
        if (armMuscleStack >= _ms('탄성증가')) return;
        armMuscleStack++;
        launchMult = BASE_LAUNCH * Math.pow(1.2, armMuscleStack);
    } else if (passive.name === '파워업') {
        if (ironBallStack >= _ms('파워업')) return;
        ironBallStack++;
    } else if (passive.name === '돌을 줍다') {
        if (pickupStoneStack >= _ms('돌을 줍다')) return;
        pickupStoneStack++;
        // 즉시 돌멩이 +2 지급 (1회성) — 현재 탄수·최대 탄수 동시 증가
        currentAmmo    += 2;
        currentMaxAmmo += 2;
        if (uiAmmoText) uiAmmoText.setText(`남은 돌멩이: ${currentAmmo} / ${currentMaxAmmo}`);
    } else if (passive.name === '큰돌') {
        if (bigStoneStack >= _ms('큰돌')) return;
        bigStoneStack++;
    } else if (passive.name === '조준선') {
        if (aimLineStack >= _ms('조준선')) return;
        aimLineStack++;
    } else if (passive.name === '농구공') {
        if (basketballStack >= _ms('농구공')) return;
        basketballStack++;
    } else if (passive.name === '관통') {
        if (piercingStack >= _ms('관통')) return;
        piercingStack++;
    } else if (passive.name === '자석탄') {
        if (magnetStack >= _ms('자석탄')) return;
        magnetStack++;
    } else if (passive.name === '산탄') {
        if (shotgunStack >= _ms('산탄')) return;
        shotgunStack++;
    } else if (passive.name === '폭발') {
        if (explosionStack >= _ms('폭발')) return;
        explosionStack++;
    } else if (passive.name === '번개탄') {
        if (lightningStack >= _ms('번개탄')) return;
        lightningStack++;
    } else if (passive.name === '체세포분열') {
        if (cellDivisionStack >= _ms('체세포분열')) return;
        cellDivisionStack++;
    } else if (passive.name === '그라운드 제로') {
        if (groundZeroStack >= _ms('그라운드 제로')) return;
        groundZeroStack++;
    } else if (passive.name === '재활용') {
        if (recycleStack >= _ms('재활용')) return;
        recycleStack++;
    }
    // 첫 획득 시 토글 ON으로 초기화
    if (!(passive.name in passiveActive)) {
        passiveActive[passive.name] = true;
    }
    refreshPassiveHUD();
    rebuildPassiveLines(scene);
    // 장전된 돌이 있으면 즉시 스케일 갱신 (큰돌 패시브 적용 즉시 반영)
    if (currentStone) {
        currentStone.setScale(getStoneScale());
    }
    // 라운드 클리어 상태에서 연구한 경우 → 클리어 화면 재표시 (wipe 없이)
    // 미드라운드 연구인 경우 → 오버레이 닫고 게임 화면 복귀
    if (remainingBirds <= 0 && isRoundEnding) {
        showRoundClearOverlay(scene);
    } else {
        clearOverlay();
    }
}

function refreshPassiveHUD() {
    // 좌측 플레이어 패널(refreshPlayerPanel)에 패시브가 표시되므로 여기서는 빈 문자열 유지
    uiPassiveText.setText('');
}

// ─── 다음 라운드 시작 ─────────────────────────────────
function startNextRound(scene) {
    clearOverlay();
    setAimBtnVisible(false);
    isRoundEnding   = false;
    cameraFollowing = false;
    roundNumber++;

    // 매 라운드 새 50마리 재스폰 + 돌멩이 30개 초기화
    birds.clear(true, true);
    roundBirdsHit = 0;
    roundMaterial = 0;
    currentAmmo   = MAX_AMMO;

    uiRoundText.setText(`ROUND ${roundNumber}`);
    uiAmmoText.setText(`남은 돌멩이: ${MAX_AMMO} / ${MAX_AMMO}`); currentMaxAmmo = MAX_AMMO;
    refreshPollutionHUD();
    refreshPlayerPanel();

    spawnBirdsSpread(scene);
    grandTotalBirds = birds.getChildren().length;
    remainingBirds  = grandTotalBirds;
    refreshRemainingHUD();
    updateResearchBtn();

    showMissionOverlay(scene);
}

// ─── 메인 메뉴로 복귀 ────────────────────────────────
function goToMainMenu(scene) {
    const nameOvl = document.getElementById('sling-name-overlay');
    if (nameOvl) nameOvl.remove();
    clearOverlay();
    setAimBtnVisible(false);
    isRoundEnding = false;
    scene.cameras.main.fadeOut(600, 0, 0, 0);
    scene.cameras.main.once('camerafadeoutcomplete', () => {
        playBgm(scene, 'introMusic');
        scene.scene.start('IntroScene');
    });
}

// ─── 게임 재시작 ──────────────────────────────────────
function restartGame(scene) {
    // HTML 이름 입력창 닫기
    const nameOvl = document.getElementById('sling-name-overlay');
    if (nameOvl) nameOvl.remove();
    clearOverlay();
    setAimBtnVisible(false);
    isRoundEnding = false;

    // 카메라 즉시 초기화
    scene.cameras.main.stopFollow();
    scene.cameras.main.centerOn(SLING_CENTER.x, CAM_HOME_Y);
    scene.cameras.main.setZoom(1.0);
    cameraFollowing = false;

    activeStones.clear(true, true);
    birds.clear(true, true);
    if (currentStone) { currentStone.destroy(); currentStone = null; }

    roundNumber    = 1;
    totalBirdsHit  = 0;
    roundBirdsHit  = 0;
    roundMaterial  = 0;
    materialStock  = 0;
    remainingBirds = 0;   // spawnBirdsSpread 이후 실제 소환 수로 재설정됨
    currentAmmo    = MAX_AMMO;
    armMuscleStack = 0;
    bigStoneStack  = 0;
    ironBallStack  = 0;
    aimLineStack   = 0;
    piercingStack  = 0;
    basketballStack = 0;
    shotgunStack     = 0;
    magnetStack      = 0;
    explosionStack   = 0;
    pickupStoneStack  = 0;
    lightningStack    = 0;
    cellDivisionStack = 0;
    groundZeroStack   = 0;
    recycleStack      = 0;
    launchMult     = BASE_LAUNCH;

    // 패시브 라인 초기화
    uiPassiveLines.forEach(o => o.destroy());
    uiPassiveLines = [];
    Object.keys(passiveActive).forEach(k => delete passiveActive[k]);

    uiRoundText.setText('ROUND 1');
    uiAmmoText.setText(`남은 돌멩이: ${MAX_AMMO} / ${MAX_AMMO}`); currentMaxAmmo = MAX_AMMO;
    uiPassiveText.setText('');
    refreshMaterialHUD();
    refreshPollutionHUD();
    refreshRemainingHUD();
    refreshPlayerPanel();
    updateResearchBtn();

    spawnBirdsSpread(scene);
    // 재시작 시 실제 소환 수량으로 재확정
    grandTotalBirds = birds.getChildren().length;
    remainingBirds  = grandTotalBirds;
    refreshRemainingHUD();
    showMissionOverlay(scene);
}

// ─── UI 헬퍼 ─────────────────────────────────────────
function clearOverlay() {
    if (uiOverlay) { uiOverlay.destroy(true); uiOverlay = null; }
    overlayHitAreas = [];
}

function setAimBtnVisible(v) {
    if (!uiAimBtn) return;
    uiAimBtn.setVisible(v);
    uiAimBtnTxt.setVisible(v);
}

function returnToAimView() {
    const cam = sceneRef.cameras.main;
    cam.setZoom(1.0);
    cam.centerOn(SLING_CENTER.x, CAM_HOME_Y);
    setAimBtnVisible(false);
}

function refreshMaterialHUD() {
    if (uiMaterialText) uiMaterialText.setText(`보유 특수물질 : ${materialStock + roundMaterial}g`);
    updateResearchBtn();
}

// ─── 연구 버튼 상태 갱신 ─────────────────────────────
// 재료 충분 AND 돌 비행 중 아님 AND 오버레이 없음 → 활성
function updateResearchBtn() {
    if (!uiResearchBtnTxt) return;
    const stoneFlying = activeStones && activeStones.countActive(true) > 0;
    const canResearch  = (materialStock + roundMaterial) >= 10 && !stoneFlying;
    uiResearchBtnTxt.setColor(canResearch ? '#ffdd44' : '#554422');
    uiResearchBtnTxt.setAlpha(canResearch ? 1.0 : 0.45);
    if (uiResearchBtn && uiResearchBtn._draw) uiResearchBtn._draw(canResearch);
}

function refreshRemainingHUD() {
    if (!uiRemainingText) return;
    const pct  = grandTotalBirds > 0
        ? Math.round((remainingBirds / grandTotalBirds) * 100)
        : 0;
    const color = remainingBirds === 0 ? '#44ff88'
                : pct <= 20           ? '#ff4444'
                : pct <= 50           ? '#ffaa22'
                :                       '#ffdd55';
    uiRemainingText.setColor(color);
    uiRemainingText.setText(`남은 오염 생물들 = ${remainingBirds}마리`);
}

// ─── 킬 알림 자막 ────────────────────────────────────
// ─── 킬 연출: 새 위치에서 팍팍팍 떠오름 (전 처치 공통) ──
function showKillFx(scene, worldX, worldY, material, textureKey) {
    const enemyInfo = Object.values(ENEMY_DATA).find(e => e.key === textureKey);
    const name = enemyInfo ? enemyInfo.name : '오염 생물';

    // 획득 g 수 텍스트 — 월드 좌표 (카메라 팔로우와 함께 이동)
    const matTxt = scene.add.text(worldX, worldY - 10,
        `+${material}g`, {
            fontFamily: '"Arial Black", Arial',
            fontSize: '34px',
            color: '#39ff14',
            stroke: '#003300',
            strokeThickness: 5,
        }
    ).setOrigin(0.5).setDepth(18).setScale(1.5).setAlpha(1);

    // 적 이름 소자막 — 아래쪽에 살짝
    const nameTxt = scene.add.text(worldX, worldY + 18,
        name, {
            fontFamily: 'Arial',
            fontSize: '14px',
            color: '#aaffaa',
            stroke: '#001100',
            strokeThickness: 3,
        }
    ).setOrigin(0.5).setDepth(18).setAlpha(0.9);

    // 팍! 팝인: 크게 등장 → 작아지며 위로 떠오름 → 페이드
    scene.tweens.add({
        targets: matTxt,
        y:       worldY - 170,
        scaleX:  0.85,
        scaleY:  0.85,
        alpha:   0,
        duration: 820,
        ease: 'Power2.easeOut',
        onComplete: () => matTxt.destroy()
    });
    scene.tweens.add({
        targets: nameTxt,
        y:       worldY - 130,
        alpha:   0,
        duration: 620,
        delay:   80,
        ease: 'Power2.easeOut',
        onComplete: () => nameTxt.destroy()
    });
}

function showKillNotification(scene, textureKey, material) {
    const enemyInfo = Object.values(ENEMY_DATA).find(e => e.key === textureKey);
    const name = enemyInfo ? enemyInfo.name : '방사능 새';

    const bg = scene.add.rectangle(640, 345, 500, 82, 0x000000, 0.58)
        .setScrollFactor(0).setDepth(14).setAlpha(0);

    const msg = scene.add.text(640, 345,
        `${name} 한마리를 잡았습니다\n특수물질 ${material}g 획득`,
        {
            fontFamily: 'Arial Black', fontSize: '22px',
            color: '#39ff14', align: 'center',
            stroke: '#000000', strokeThickness: 3,
            lineSpacing: 8,
        }
    ).setOrigin(0.5).setScrollFactor(0).setDepth(15).setAlpha(0);

    scene.tweens.add({
        targets: [bg, msg], alpha: 1, duration: 140,
        onComplete: () => {
            scene.time.delayedCall(1100, () => {
                scene.tweens.add({
                    targets: [bg, msg], alpha: 0, duration: 380,
                    onComplete: () => { bg.destroy(); msg.destroy(); }
                });
            });
        }
    });
}

function refreshPollutionHUD() {
    if (uiPollutionText) uiPollutionText.setText(`지구 오염도: ${roundNumber * 10}%`);
}

function drawMinimapBtn(z) {
    if (!uiMinimapBtnBg) return;
    uiMinimapBtnBg.clear();
    const cx = config.width / 2, cy = config.height / 2;
    const bw = 216 / z, bh = 26 / z;
    const x0 = cx + (PANEL_CX - cx) / z - bw / 2;
    const y0 = cy + (262 - cy) / z - bh / 2;
    const bgCol  = minimapVisible ? 0x140e02 : 0x100c04;
    const borCol = minimapVisible ? 0xe8a030 : 0x4a3010;
    uiMinimapBtnBg.fillStyle(bgCol, 0.90).fillRoundedRect(x0, y0, bw, bh, 6 / z);
    uiMinimapBtnBg.lineStyle(1 / z, borCol, 0.75).strokeRoundedRect(x0, y0, bw, bh, 6 / z);
}

function drawPanelBg(z) {
    if (!uiPanelBg) return;
    uiPanelBg.clear();
    const cx = config.width / 2, cy = config.height / 2;
    const x0 = cx + (8   - cx) / z;
    const y0 = cy + (8   - cy) / z;
    const w  = PANEL_W / z, h = _panelH / z;   // ← 동적 높이
    uiPanelBg.fillStyle(0x110c02, 0.92).fillRoundedRect(x0, y0, w, h, 10 / z);
    uiPanelBg.lineStyle(1 / z, 0xe8a030, 0.40).strokeRoundedRect(x0, y0, w, h, 10 / z);
    // 제목 구분선
    uiPanelBg.lineStyle(1 / z, 0x5a3e10, 0.8).lineBetween(
        x0 + 10 / z, y0 + 38 / z,
        x0 + w - 10 / z, y0 + 38 / z
    );
}

// hasPassives: 구분선 표시 여부. 미전달 시 현재 스택으로 자동 판단
function refreshPlayerPanel(hasPassives) {
    if (!uiPanelContent) return;
    if (hasPassives === undefined) {
        hasPassives = (armMuscleStack + bigStoneStack + ironBallStack
                     + aimLineStack + basketballStack + piercingStack
                     + shotgunStack + magnetStack + explosionStack
                     + pickupStoneStack + lightningStack + cellDivisionStack
                     + groundZeroStack + recycleStack) > 0;
    }
    const lines = [`STAGE  ${roundNumber}`];
    if (hasPassives) lines.push('', '── 강화 ──');
    uiPanelContent.setText(lines.join('\n'));
    // 패널 배경 재렌더 (높이 변경 반영)
    if (sceneRef) drawPanelBg(sceneRef.cameras.main.zoom ?? 1.0);
}

// ─── 스테이지 시작 미션 오버레이 ─────────────────────
function showMissionOverlay(scene) {
    clearOverlay();
    uiOverlay = scene.add.container(0, 0).setDepth(50).setScrollFactor(0);

    const stage = STAGE_DATA[Math.min(roundNumber, STAGE_DATA.length) - 1];

    mkRect(scene, uiOverlay, 0, 0, 1280, 720, 0x000000, 0.86);
    mkPanel(scene, uiOverlay, 290, 155, 700, 410);

    mkText(scene, uiOverlay, 640, 208, `STAGE  ${roundNumber}`, {
        fontFamily: 'Arial Black', fontSize: '40px', color: '#e8a030'
    });
    mkText(scene, uiOverlay, 640, 272, `지구 오염도 ${roundNumber * 10}%`, {
        fontFamily: 'Arial', fontSize: '17px', color: '#ff5533'
    });

    const div = scene.add.graphics();
    div.lineStyle(1, 0x4a3010, 1).lineBetween(320, 302, 960, 302);
    uiOverlay.add(div);

    mkText(scene, uiOverlay, 640, 340,
        `오염 생물 ${grandTotalBirds}마리를 전멸시켜라!\n돌멩이 ${MAX_AMMO}개로 모두 처치하면 라운드 클리어\n돌이 먼저 소진되면 게임오버!`,
        { fontFamily: 'Arial', fontSize: '17px', color: '#cccccc', align: 'center', lineSpacing: 5 }
    );

    mkBtn(scene, uiOverlay, 640, 487, 200, 52, '시 작 !', 0xe8a030, '#000000',
        () => { clearOverlay(); loadStone(scene); }
    );
}

// ─── 실패 화면 (10스테이지 종료 후 잔여 생물 있을 때) ─
function showFailure(scene) {
    clearOverlay();
    uiOverlay = scene.add.container(0, 0).setDepth(50).setScrollFactor(0);
    mkRect(scene, uiOverlay, 0, 0, 1280, 720, 0x000000, 0.90);
    mkText(scene, uiOverlay, 640, 210, '지구를 구하지 못했습니다.', {
        fontFamily: 'Arial Black', fontSize: '52px', color: '#ff4444'
    });
    mkText(scene, uiOverlay, 640, 305, `남은 오염생물: ${remainingBirds}마리`, {
        fontFamily: 'Arial', fontSize: '26px', color: '#ff9999'
    });
    mkText(scene, uiOverlay, 640, 358, '10 스테이지 안에 모든 생물을 처치하지 못했습니다.', {
        fontFamily: 'Arial', fontSize: '18px', color: '#888888'
    });
    mkBtn(scene, uiOverlay, 640, 460, 240, 58, '메인 메뉴로', 0xff4444, '#ffffff',
        () => goToMainMenu(scene)
    );
}

// ─── 클리어 화면 ──────────────────────────────────────
function showVictory(scene) {
    clearOverlay();
    uiOverlay = scene.add.container(0, 0).setDepth(50).setScrollFactor(0);
    mkRect(scene, uiOverlay, 0, 0, 1280, 720, 0x000000, 0.90);
    mkText(scene, uiOverlay, 640, 220, '임 무 완 료 !', {
        fontFamily: 'Arial Black', fontSize: '68px', color: '#e8a030'
    });
    mkText(scene, uiOverlay, 640, 340, `총 처치한 새: ${totalBirdsHit}`, {
        fontFamily: 'Arial', fontSize: '28px', color: '#ffffff'
    });
    mkText(scene, uiOverlay, 640, 385, '지구를 오염에서 구해냈습니다!', {
        fontFamily: 'Arial', fontSize: '20px', color: '#aaaaaa'
    });
    mkBtn(scene, uiOverlay, 640, 470, 240, 56, '메인 메뉴로', 0x39ff14, '#000000',
        () => goToMainMenu(scene)
    );
}

function mkRect(scene, c, x, y, w, h, color, alpha) {
    const g = scene.add.graphics();
    g.fillStyle(color, alpha).fillRect(x, y, w, h);
    c.add(g);
    return g;
}

function mkPanel(scene, c, x, y, w, h) {
    const g = scene.add.graphics();
    g.fillStyle(0x1a1208, 1).fillRoundedRect(x, y, w, h, 20);
    g.lineStyle(2, 0xe8a030, 1).strokeRoundedRect(x, y, w, h, 20);
    c.add(g);
    return g;
}

function mkText(scene, c, x, y, str, style) {
    const t = scene.add.text(x, y, str, style).setOrigin(0.5);
    c.add(t);
    return t;
}

function mkBtn(scene, c, cx, cy, w, h, label, bgColor, textColor, callback, fontSize = 22) {
    const bg = scene.add.graphics();
    bg.fillStyle(bgColor, 1).fillRoundedRect(cx - w / 2, cy - h / 2, w, h, 10);
    c.add(bg);
    const txt = scene.add.text(cx, cy, label, {
        fontFamily: 'Arial', fontSize: `${fontSize}px`, color: textColor, fontStyle: 'bold'
    }).setOrigin(0.5);
    c.add(txt);
    // 스크린 좌표 기반 hit area 등록 (카메라 좌표계 버그 우회)
    overlayHitAreas.push({ x: cx, y: cy, hw: w / 2, hh: h / 2, cb: callback });
    // 커서 변경용 invisible rect (판정은 overlayHitAreas가 담당)
    const hit = scene.add.rectangle(cx, cy, w, h, 0x000000, 0)
        .setInteractive({ useHandCursor: true });
    c.add(hit);
    return hit;
}

function drawCard(g, cx, cy, w, h, fill, stroke, strokeW) {
    g.fillStyle(fill, 1).fillRoundedRect(cx - w / 2, cy - h / 2, w, h, 16);
    g.lineStyle(strokeW, stroke, 1).strokeRoundedRect(cx - w / 2, cy - h / 2, w, h, 16);
}

let uiMaterialText   = null;
let uiRemainingText  = null;   // 하단 중앙 '남은 오염 생물들 = N마리'

// ─── 씬 등록 & 게임 실행 ──────────────────────────────
const game = new Phaser.Game({
    ...config,
    scene: [
        ClickToStartScene,
        IntroScene,
        { key: 'GameScene', preload, create, update }
    ]
});
</script>
</body>
