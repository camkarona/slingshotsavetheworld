// scene.add.text() 호출을 가로채서 style.resolution 을 디바이스 DPR로 자동 적용
(function patchPhaserTextResolution() {
    const TEXT_RES = Math.max(2, Math.ceil((window.devicePixelRatio || 1) * 1.5));
    const factory = Phaser.GameObjects.GameObjectFactory.prototype;
    const origText = factory.text;
    factory.text = function(x, y, text, style) {
        if (!style) style = {};
        if (style.resolution === undefined) style.resolution = TEXT_RES;
        return origText.call(this, x, y, text, style);
    };
})();

let bgmVolume       = 0.5;    // 0.0 ~ 1.0
let sfxVolume       = 0.5;    // 0.0 ~ 1.0

// ─── 코드 합성 효과음 (Web Audio API — 외부 파일 없음) ──
let _audioCtx = null;
function getAudioCtx() {
    if (!_audioCtx) {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();  // autoplay 정책: 첫 제스처 후 깨움
    return _audioCtx;
}

// 톤 합성 — 주파수 freqA→freqB 로 글라이드, ADSR 간이 엔벨로프
function _tone(freqA, freqB, dur, wave, vol, delay) {
    const ctx = getAudioCtx(); if (!ctx) return;
    const t0  = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = wave || 'sine';
    osc.frequency.setValueAtTime(freqA, t0);
    if (freqB && freqB !== freqA)
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqB), t0 + dur);
    const v = Math.max(0.0001, (vol ?? 0.3) * sfxVolume);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(v, t0 + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
}

// 노이즈 버스트 — 타격/폭발용 (lowpass 필터)
function _noise(dur, vol, filterHz, delay) {
    const ctx = getAudioCtx(); if (!ctx) return;
    const t0  = ctx.currentTime + (delay || 0);
    const n   = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const flt = ctx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = filterHz || 1200;
    const g = ctx.createGain();
    const v = Math.max(0.0001, (vol ?? 0.3) * sfxVolume);
    g.gain.setValueAtTime(v, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(flt).connect(g).connect(ctx.destination);
    src.start(t0); src.stop(t0 + dur + 0.02);
}

// 효과음 디스패치
function playSfx(name) {
    if (sfxVolume <= 0) return;
    switch (name) {
        case 'shoot':     _tone(680, 180, 0.16, 'triangle', 0.22); break;       // 발사 "퓽"
        case 'hit':       _noise(0.07, 0.28, 2000); _tone(420, 150, 0.07, 'square', 0.12); break;  // 명중 "탁"
        case 'kill':      _tone(520, 520, 0.07, 'sine', 0.18); _tone(840, 840, 0.11, 'sine', 0.18, 0.05); break;  // 처치 "띠링"
        case 'boss':      _tone(280, 55, 0.5, 'sawtooth', 0.3); _noise(0.3, 0.22, 700); break;       // 보스 처치
        case 'explosion': _noise(0.42, 0.4, 600); _tone(110, 38, 0.4, 'sawtooth', 0.26); break;      // 폭발
        case 'beam':      _tone(180, 880, 0.28, 'sawtooth', 0.2); break;                              // 빔
        case 'land':      _noise(0.09, 0.16, 480); break;                                             // 착지 "툭"
        case 'nuke':      _noise(0.9, 0.5, 500); _tone(90, 30, 0.9, 'sawtooth', 0.3); break;          // 핵폭발
        case 'rift':      _tone(120, 600, 0.6, 'sine', 0.22); _tone(600, 120, 0.6, 'sine', 0.18, 0.3); break;  // 차원균열
    }
}

/**
 * playBgm(scene, key)
 * ─ HTML <audio> 태그 직접 제어 방식
 * ─ file:// 프로토콜의 CORS 차단을 완전히 우회
 *   (Phaser의 XHR 오디오 로더 미사용)
 * scene 파라미터는 하위 호환 유지용 (사용하지 않음)
 */
function playBgm(_scene, key) {
    // 진행 중인 페이드 타이머 즉시 취소 (씬 전환 타이밍 충돌 방지)
    if (bgmFadeTimer) { clearInterval(bgmFadeTimer); bgmFadeTimer = null; }

    // 기존 BGM 정지
    if (currentBgm) {
        currentBgm.pause();
        currentBgm.currentTime = 0;
        currentBgm = null;
    }

    const elId = key === 'introMusic' ? 'bgm-intro' : 'bgm-game';
    const el   = document.getElementById(elId);
    if (!el) {
        console.warn(`[BGM] <audio id="${elId}"> 엘리먼트를 찾지 못했습니다.`);
        return;
    }

    el.volume      = bgmVolume;
    el.currentTime = 0;
    const promise  = el.play();
    if (promise !== undefined) {
        promise
            .then(() => console.log(`[BGM] "${key}" 재생 시작 (볼륨 ${Math.round(bgmVolume * 100)}%)`))
            .catch(e  => console.warn(`[BGM] "${key}" 재생 실패:`, e));
    }
    currentBgm = el;   // HTMLAudioElement 참조 저장
}

    // ── 다음 발사 패턴 선택 ──────────────────────────────
    nextShot() {
        if (!this.stone) return;
        this.currentPattern = Phaser.Math.RND.pick(this.firePatterns);
        this.pullBack();
    }

    // ── 새총 당기기 (패턴에 따라 다른 거리·시간) ────────
    pullBack() {
        if (!this.stone) return;
        const p = this.currentPattern;
        this.tweens.add({
            targets: [this.stone, this.stoneHL],
            x: this.sX + p.pull.dx,
            y: this.sY + p.pull.dy,
            duration: p.hold,
            ease: 'Quad.Out',
            onComplete: () => this.time.delayedCall(180 + Math.random() * 220, () => this.release())
        });
    }

    // ── 발사 ─────────────────────────────────────────────
    release() {
        if (!this.stone) return;
        const dx = this.sX - this.stone.x, dy = this.sY - this.stone.y;
        const ang = Math.atan2(dy, dx);
        const dist = Math.hypot(dx, dy);
        const scale = this.currentPattern.scale;
        this.stoneVX = Math.cos(ang) * dist * scale;
        this.stoneVY = Math.sin(ang) * dist * scale;
        this.stoneFlying = true;
    }

    // ── 새 명중 이펙트 ───────────────────────────────────
    hitEffect(x, y) {
        for (let i = 0; i < 18; i++) {
            const ang = Math.random() * Math.PI * 2;
            const spd = 100 + Math.random() * 230;
            this.particles.push({
                x, y,
                vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 50,
                life: 1.0, decay: 1.0 + Math.random() * 0.6,
                color: [0x39ff14, 0xff4444, 0xffaa00, 0xffee88][Phaser.Math.Between(0, 3)],
                size: 3 + Math.random() * 5
            });
        }
    }

    // ── 돌 리셋 후 다음 발사 예약 ────────────────────────
    resetStone(delay) {
        this.stone.setPosition(this.sX, this.sY);
        this.stoneHL.setPosition(this.sX - 3, this.sY - 3);
        this.stoneFlying = false;
        this.time.delayedCall(delay, () => this.nextShot());
    }

    update(time, delta) {
        if (!this.stone) return;
        const dt = delta / 1000;

        // 새 이동 + 경계 반사 + 리스폰
        if (this.birds) {
            this.birds.forEach(b => {
                if (b.isAlive) {
                    b.x += b.vx * dt;
                    // 방향에 따라 스프라이트 flip (왼쪽 갈때 좌우반전)
                    b.setFlipX(b.vx < 0);
                    if (b.x < b.minX) { b.x = b.minX; b.vx =  Math.abs(b.vx); }
                    if (b.x > b.maxX) { b.x = b.maxX; b.vx = -Math.abs(b.vx); }
                } else {
                    b.respawnTimer -= dt;
                    if (b.respawnTimer <= 0) {
                        b.isAlive = true;
                        // 좌우 끝에서 등장
                        const fromLeft = Math.random() < 0.5;
                        b.x = fromLeft ? b.minX + 5 : b.maxX - 5;
                        b.y = Phaser.Math.Between(b.zoneY[0], b.zoneY[1]);
                        const speedMag = Phaser.Math.Between(b.baseSpeedMin, b.baseSpeedMax);
                        b.vx = fromLeft ? speedMag : -speedMag;
                        b.setVisible(true).setAlpha(0).setScale(b.scaleX);
                        this.tweens.add({ targets: b, alpha: 1, duration: 400 });
                    }
                }
            });
        }

        // 돌멩이 비행 (중력 + 명중 / 화면 밖)
        if (this.stoneFlying) {
            this.stone.x   += this.stoneVX * dt;
            this.stone.y   += this.stoneVY * dt;
            this.stoneVY   += 660 * dt;
            this.stoneHL.x  = this.stone.x - 3;
            this.stoneHL.y  = this.stone.y - 3;

            // 새 명중 판정 (가장 가까운 살아있는 새 확인)
            let hitBird = null;
            for (const b of this.birds) {
                if (!b.isAlive) continue;
                const hitR = (b.texture && b.texture.key === 'eagle') ? 28 : 22;
                if (Math.hypot(this.stone.x - b.x, this.stone.y - b.y) < hitR) {
                    hitBird = b; break;
                }
            }
            if (hitBird) {
                this.hitEffect(hitBird.x, hitBird.y);
                hitBird.isAlive = false;
                hitBird.setVisible(false);
                hitBird.respawnTimer = 2.0 + Math.random() * 2.5;
                this.resetStone(700 + Math.random() * 600);
            }
            // 화면 밖 (실패 / 멀리 / 위로 너무 높게)
            else if (this.stone.x > 1420 || this.stone.x < -50
                  || this.stone.y > 820 || this.stone.y < -250) {
                this.resetStone(900 + Math.random() * 500);
            }
        }

        // 고무줄 (당기는 동안만)
        this.bandG.clear();
        if (!this.stoneFlying) {
            this.bandG.lineStyle(4, 0xD2691E, 1);
            this.bandG.lineBetween(this.pL.x, this.pL.y, this.stone.x, this.stone.y);
            this.bandG.lineBetween(this.pR.x, this.pR.y, this.stone.x, this.stone.y);
        }

        // 파티클
        if (this.particles.length > 0) {
            this.fxG.clear();
            this.particles = this.particles.filter(p => {
                p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 380 * dt;
                p.life -= p.decay * dt;
                if (p.life <= 0) return false;
                this.fxG.fillStyle(p.color, p.life)
                         .fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                return true;
            });
        }
    }

    startGame() {
        // 인트로 BGM 볼륨 페이드아웃 (700ms, setInterval 방식 — tween 미지원 우회)
        if (currentBgm) {
            const fadeDuration = 700;
            const steps = 14;
            const interval = fadeDuration / steps;
            const startVol = currentBgm.volume;   // 현재 실제 볼륨 기준으로 페이드
            const volStep  = startVol / steps;
            let stepCount  = 0;
            const introEl  = currentBgm;           // 페이드할 인트로 엘리먼트 고정 참조
            bgmFadeTimer = setInterval(() => {
                stepCount++;
                const nextVol = Math.max(0, startVol - volStep * stepCount);
                introEl.volume = nextVol;
                if (stepCount >= steps) {
                    clearInterval(bgmFadeTimer);
                    bgmFadeTimer = null;
                    introEl.pause();
                    introEl.currentTime = 0;
                    // currentBgm은 이미 게임 BGM으로 교체됐을 수 있으므로 건드리지 않음
                }
            }, interval);
        }
        this.cameras.main.fadeOut(700, 0, 0, 0);
        this.cameras.main.once('camerafadeoutcomplete', () => this.scene.start('GameScene'));
    }

        const div2 = this.add.graphics();
        div2.lineStyle(1, 0x333333, 1).lineBetween(PX + 40, hY + 20, PX + PW - 40, hY + 20);
        modal.add(div2);

        if (scores.length === 0) {
            modal.add(this.add.text(W / 2, H / 2 + 20, '아직 기록이 없습니다.\n게임을 플레이하고 이름을 남겨보세요!', {
                fontFamily: 'Arial', fontSize: '17px', color: '#555555', align: 'center', lineSpacing: 6
            }).setOrigin(0.5));
        } else {
            scores.slice(0, 8).forEach((s, idx) => {
                const ry  = hY + 36 + idx * 38;
                const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx + 1}위`;
                const rowG = this.add.graphics();
                rowG.fillStyle(idx % 2 === 0 ? 0x111111 : 0x0a0a0a, 0.55)
                    .fillRect(PX + 40, ry - 15, PW - 80, 34);
                modal.add(rowG);

                const tc = idx < 3 ? '#ffffff' : '#aaaaaa';
                modal.add(this.add.text(colX[0], ry, medal,            { fontFamily: 'Arial',        fontSize: '17px', color: tc }).setOrigin(0, 0.5));
                modal.add(this.add.text(colX[1], ry, s.name,           { fontFamily: '"Arial Black"', fontSize: '17px', color: tc }).setOrigin(0, 0.5));
                modal.add(this.add.text(colX[2], ry, `${s.kills}마리`, { fontFamily: 'Arial',        fontSize: '17px', color: tc }).setOrigin(0, 0.5));
                modal.add(this.add.text(colX[3], ry, `R${s.round}`,    { fontFamily: 'Arial',        fontSize: '17px', color: tc }).setOrigin(0, 0.5));
                modal.add(this.add.text(colX[4], ry, s.date,           { fontFamily: 'Arial',        fontSize: '13px', color: '#666666' }).setOrigin(0, 0.5));
            });
        }

        // 닫기 버튼
        const closeBtn = this.add.text(W / 2, PY + PH - 38, '  닫  기  ', {
            fontFamily: '"Arial Black", Arial', fontSize: '19px', color: '#aabbcc',
            backgroundColor: '#162230', padding: { x: 22, y: 10 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        closeBtn.on('pointerover', () => closeBtn.setColor('#ffffff'));
        closeBtn.on('pointerout',  () => closeBtn.setColor('#aabbcc'));
        closeBtn.on('pointerup',   () => { modal.destroy(true); this.modalOpen = false; });
        modal.add(closeBtn);
    }

    // ── 모달 (SETTING / CREDIT) ──────────────────────────
    openModal(type) {
        if (this.modalOpen) return;
        this.modalOpen = true;
        const W = this.W, H = this.H;
        const modal = this.add.container(0, 0).setDepth(100);

        const dimBg = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.8).setInteractive();
        modal.add(dimBg);

        const pg = this.add.graphics();
        pg.fillStyle(0x0c1a28, 1).fillRoundedRect(W / 2 - 270, H / 2 - 190, 540, 380, 18);
        pg.lineStyle(2, 0x4af0c8, 1).strokeRoundedRect(W / 2 - 270, H / 2 - 190, 540, 380, 18);
        modal.add(pg);

        modal.add(this.add.text(W / 2, H / 2 - 148, type === 'setting' ? 'SETTING' : 'CREDIT', {
            fontFamily: '"Arial Black", Arial', fontSize: '30px', color: '#4af0c8'
        }).setOrigin(0.5));

        // ── SETTING: 볼륨 슬라이더 ──────────────────────
        let onMove = null, onUp = null;
        if (type === 'setting') {
            let activeSlideFn = null;
            onMove = (ptr) => { if (ptr.isDown && activeSlideFn) activeSlideFn(ptr.x); };
            onUp   = ()    => { activeSlideFn = null; };
            this.input.on('pointermove', onMove);
            this.input.on('pointerup',   onUp);

            modal.add(this.add.text(W / 2, H / 2 - 88, '볼륨 설정', {
                fontFamily: '"Arial Black", Arial', fontSize: '18px', color: '#aabbcc'
            }).setOrigin(0.5));

            this.makeSlider(modal, W / 2, H / 2 - 38, 340, bgmVolume, 'BGM 볼륨', (val) => {
                bgmVolume = val;
                if (currentBgm) currentBgm.volume = bgmVolume;  // HTMLAudioElement
            }, (fn) => { activeSlideFn = fn; });

            this.makeSlider(modal, W / 2, H / 2 + 48, 340, sfxVolume, 'SFX 볼륨', (val) => {
                sfxVolume = val;
            }, (fn) => { activeSlideFn = fn; });

            modal.add(this.add.text(W / 2, H / 2 + 115, '* SFX는 향후 업데이트에서 적용됩니다', {
                fontFamily: 'Arial', fontSize: '13px', color: '#445566'
            }).setOrigin(0.5));

        // ── CREDIT ──────────────────────────────────────
        } else {
            const creditLines = [
                'THE SLINGSHOT TO RESCUE WORLD',
                '세상을 구하는 새 총',
                '',
                'Game Design & Development',
                'Karona Games',
                '',
                'Engine  ·  Phaser 3.60.0',
                'Art  ·  TBD  ·  BGM  ·  TBD',
            ];
            creditLines.forEach((line, i) => {
                const big = ['THE SLINGSHOT TO RESCUE WORLD', '세상을 구하는 새 총', 'Karona Games'].includes(line);
                modal.add(this.add.text(W / 2, H / 2 - 95 + i * 30, line, {
                    fontFamily: 'Arial', fontSize: big ? '18px' : '15px',
                    color: big ? '#ffffff' : '#667788', fontStyle: big ? 'bold' : 'normal'
                }).setOrigin(0.5));
            });
        }

        // ── 닫기 버튼 ────────────────────────────────────
        const closeBtn = this.add.text(W / 2, H / 2 + 152, '  닫  기  ', {
            fontFamily: '"Arial Black", Arial', fontSize: '19px', color: '#aabbcc',
            backgroundColor: '#162230', padding: { x: 22, y: 10 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        closeBtn.on('pointerover', () => closeBtn.setColor('#ffffff'));
        closeBtn.on('pointerout',  () => closeBtn.setColor('#aabbcc'));
        closeBtn.on('pointerup', () => {
            if (onMove) this.input.off('pointermove', onMove);
            if (onUp)   this.input.off('pointerup',   onUp);
            modal.destroy(true);
            this.modalOpen = false;
        });
        modal.add(closeBtn);
    }

    // ── 볼륨 슬라이더 헬퍼 ──────────────────────────────
    // onchange(value) : 값 변경 콜백
    // setActiveDrag(fn) : 전역 드래그 핸들러 등록 콜백
    makeSlider(modal, cx, cy, trackW, initVal, label, onchange, setActiveDrag) {
        const scene = this;

        // 라벨
        modal.add(scene.add.text(cx - trackW / 2, cy - 22, label, {
            fontFamily: '"Arial Black", Arial', fontSize: '15px', color: '#7a9aaa'
        }).setOrigin(0, 0.5));

        // 퍼센트 표시
        const valTxt = scene.add.text(cx + trackW / 2 + 16, cy, `${Math.round(initVal * 100)}%`, {
            fontFamily: '"Arial Black", Arial', fontSize: '15px', color: '#4af0c8'
        }).setOrigin(0, 0.5);
        modal.add(valTxt);

        // 트랙 배경
        modal.add(scene.add.rectangle(cx, cy, trackW, 6, 0x1e3446));

        // 채움 바 (왼쪽 기준 origin)
        let curVal = initVal;
        const fill = scene.add.rectangle(
            cx - trackW / 2, cy,
            Math.max(trackW * curVal, 1), 6, 0x4af0c8
        ).setOrigin(0, 0.5);
        modal.add(fill);

        // 핸들
        const handle = scene.add.circle(cx - trackW / 2 + trackW * curVal, cy, 11, 0xffffff);
        const handleRing = scene.add.circle(cx - trackW / 2 + trackW * curVal, cy, 7, 0x4af0c8);
        modal.add(handle);
        modal.add(handleRing);

        // 업데이트 함수
        const updateSlider = (ptrX) => {
            const relX = Phaser.Math.Clamp(ptrX - (cx - trackW / 2), 0, trackW);
            curVal = relX / trackW;
            fill.setSize(Math.max(relX, 1), 6);
            handle.x   = cx - trackW / 2 + relX;
            handleRing.x = cx - trackW / 2 + relX;
            valTxt.setText(`${Math.round(curVal * 100)}%`);
            onchange(curVal);
        };

        // 트랙 히트 영역 (클릭 + 드래그)
        const track = scene.add.rectangle(cx, cy, trackW + 22, 34, 0x000000, 0)
            .setInteractive({ useHandCursor: true });
        track.on('pointerdown', (ptr) => {
            setActiveDrag(updateSlider);
            updateSlider(ptr.x);
        });
        modal.add(track);
    }
}

// ─── preload ──────────────────────────────────────────
function preload() {
    // 텍스처 해상도 2배 — 같은 화면 크기로 표시되지만 디테일 4배 (50×50 → 100×100)
    const TEX_SCALE = 2;
    const newGfx = () => {
        const opts = { add: false };
        const g = this.make.graphics(opts);
        g.scaleCanvas(TEX_SCALE, TEX_SCALE);   // 모든 후속 그리기 명령 자동 2x 적용
        return g;
    };

    // 돌멩이 — 고대비 비대칭 (회전이 눈에 보이도록 명암 + 점/크랙 무늬)
    const sg = newGfx();

    // 무늬 — 회전 인지용 (어두운 점 + 크랙)
    sg.fillStyle(0x2a2e32, 1).fillCircle(17.5, 10.5, 2.2);
    sg.fillStyle(0x2a2e32, 1).fillCircle(10.5, 18.5, 1.7);
    sg.lineStyle(1.3, 0x2a2e32, 0.85).lineBetween(8, 13.5, 14.5, 20);
    sg.generateTexture('stone', 30 * TEX_SCALE, 30 * TEX_SCALE);
    sg.destroy();

    // 기계 변이 새 — 흰색·회색·검정 + 녹색 눈 (어두운 배경과 강한 대비)
    const mg = newGfx();
    // 후광 — 청록빛 (기계 + 녹색 눈 테마)
    mg.fillStyle(0xaaffcc, 0.22).fillEllipse(25, 25, 48, 36);
    // ── 본체 (밝은 회색) ──
    mg.fillStyle(0xe0e0e0, 1).fillRect(0, 13, 50, 24);
    // 윗 하이라이트 (순백 띠)
    mg.fillStyle(0xffffff, 1).fillRect(2, 14, 46, 4);

    mg.fillStyle(0x6a6a6a, 1).fillRect(0, 30, 50, 7);
    // ── 날개 (검정, 위·아래) ──
    mg.fillStyle(0x1a1a1a, 1).fillRect(12,  0, 26, 13);
    mg.fillStyle(0x1a1a1a, 1).fillRect(12, 37, 26, 13);
    // 날개 안쪽 띠 (회색 — 기계 패널감)
    mg.fillStyle(0x555555, 1).fillRect(12, 10, 26, 3);
    mg.fillStyle(0x555555, 1).fillRect(12, 37, 26, 3);
    // ── 본체 패널 라인 (검정 세로 디테일) ──
    mg.fillStyle(0x222222, 1).fillRect(15, 17, 2, 16);
    mg.fillStyle(0x222222, 1).fillRect(30, 17, 2, 16);
    // ── 녹색 눈 (전방 센서) ──

    // 방사능 돌연변이 새 — 뾰족한 날개·부리 (매처럼 날카로운 실루엣)
    const rg = newGfx();

    // ── 날개 (뒤로 swept된 뾰족한 검붉은 삼각) ──
    // 윗 날개 — 좌상단 뒤로 길게 뻗음
    rg.fillStyle(0x2a0a0a, 1).fillTriangle(28, 24, 0, 1, 26, 17);

    const dg = newGfx();

    dg.fillStyle(0x88ddff, 0.18).fillEllipse(25, 25, 44, 44);

    mothg.generateTexture('mothBird', 50 * TEX_SCALE, 50 * TEX_SCALE);

    // 부유 생물체 (원거리 보상 — 젤리피시 형태)
    const floatG = newGfx();

    // ⭐ 림 라이트 — 몸통에 밝은 보라 외곽선
    tng.lineStyle(1.5, 0xcc88ff, 0.85).strokeEllipse(35, 50, 50, 30);
    tng.generateTexture('tendril', 70 * TEX_SCALE, 70 * TEX_SCALE);
    tng.destroy();

    // 부유 오염 기지 — 오버로드형 (90×90, HP 5, 고정 부유)
    const ovg = newGfx();
    // 후광 (강한 올리브-녹색 외부 글로우 — 부유체 강조)
    ovg.fillStyle(0xaaff66, 0.22).fillEllipse(45, 44, 90, 72);
    ovg.fillStyle(0x66cc22, 0.32).fillEllipse(45, 44, 82, 64);
    // 외곽 글로우 (어두운 올리브)
    ovg.fillStyle(0x0e1a06, 0.28).fillEllipse(45, 44, 86, 66);
    // 상단 혹 4개 (등 돌기 — 오버로드 특유)
    ovg.fillStyle(0x0d1408, 1);
    ovg.fillCircle(20, 27, 10).fillCircle(35, 17, 9).fillCircle(55, 17, 9).fillCircle(70, 27, 10);
    // 메인 몸통 돔
    ovg.fillStyle(0x131c09, 1).fillEllipse(45, 43, 72, 54);
    // 몸통 내부 막 질감 (얇아서 살짝 밝은 부분)
    ovg.fillStyle(0x1d2a0f, 0.7).fillEllipse(45, 39, 54, 38);
    ovg.fillStyle(0x243312, 0.38).fillEllipse(45, 34, 36, 24);
    // 배면 (아랫면 어두운 막)
    ovg.fillStyle(0x0a0f06, 0.88).fillEllipse(45, 63, 62, 22);
    // 몸통 막 혈관 (가는 선)
    ovg.lineStyle(1.2, 0x0a1006, 0.6);
    ovg.lineBetween(45, 22, 28, 54);
    ovg.lineBetween(45, 22, 45, 57);
    ovg.lineBetween(45, 22, 62, 54);
    // 아래 촉수 6개
    ovg.lineStyle(3, 0x0c1509, 1);
    [18, 28, 38, 52, 62, 72].forEach((rx) => {
        let px = rx, py = 60;
        for (let s = 0; s < 4; s++) {
            const nx = px + (s % 2 === 0 ? 5 : -5);
            const ny = py + 6;
            ovg.lineBetween(px, py, nx, ny);
            px = nx; py = ny;
        }
    });
    // 눈 (주황색 발광, 작지만 뚜렷)
    ovg.fillStyle(0xbb4400, 1).fillEllipse(31, 39, 14, 9).fillEllipse(59, 39, 14, 9);
    ovg.fillStyle(0xff7722, 1).fillEllipse(31, 39, 7, 5).fillEllipse(59, 39, 7, 5);
    ovg.fillStyle(0xffcc88, 0.8).fillCircle(31, 38, 2).fillCircle(59, 38, 2);
    // ⭐ 림 라이트 — 메인 돔에 밝은 녹색 외곽선
    ovg.lineStyle(2, 0xaaff66, 0.85).strokeEllipse(45, 43, 72, 54);
    ovg.generateTexture('overlord', 90 * TEX_SCALE, 90 * TEX_SCALE);
    ovg.destroy();

}

// ─── create ───────────────────────────────────────────
function create() {
    // ─── 새 게임 시작 시 슬링샷 위치 원복 ───────────────────
    // 직전 게임에서 '파견' 등으로 이동된 위치가 남아있으면 카메라가 잘못된 곳에서 시작됨
    const xReset = 320 - SLING_CENTER.x;
    if (Math.abs(xReset) > 0.5) {
        SLING_CENTER.x += xReset;
        PRONG_L.x      += xReset;
        PRONG_R.x      += xReset;
    }
    pendingDispatchX = null;     // 보류된 파견 이동도 클리어
    clearDispatchTraces();        // 파견 자국 흙 그래픽 제거 (있다면)

    // ─── 게임 상태 초기화 (새 게임/재시작 시 이전 판 값 잔류 방지) ──
    // 특히 currentAmmo=0, isRoundEnding=true 가 남으면 둘째 판에서 돌이 안 생김
    currentAmmo     = MAX_AMMO;
    currentMaxAmmo  = MAX_AMMO;
    isRoundEnding   = false;
    isDragging      = false;
    cameraFollowing = false;
    currentStone    = null;
    roundNumber     = 1;
    totalBirdsHit   = 0;
    roundBirdsHit   = 0;
    roundMaterial   = 0;
    materialStock   = 0;
    remainingBirds  = 0;
    // 새총 높이 복원 — GAME START 경로(slingModStack=0)면 BASE 로,
    // DEV MODE(slingModStack 유지)면 그 높이로. 게임오버 후 높이 잔류 방지.
    applySlingHeight();

    // 물리 월드 범위 — 세로를 축소하여 Arcade physics 연산 비용 절감
    this.physics.world.setBounds(0, -1200, WORLD_W, 2200);
    this.cameras.main.setBounds(0, WORLD_TOP, WORLD_LIMIT_X + 80, WORLD_H);
    this.cameras.main.centerOn(SLING_CENTER.x, CAM_HOME_Y);
    this.cameras.main.setRoundPixels(true);  // 서브픽셀 렌더링 OFF → 카메라 흔들림 제거

    // ─── 동적 하늘 그라데이션 (아포칼립스) ────────────────
    // 별도 graphics 객체로 매 프레임 색이 은은하게 흐름 (drawSkyGradient)
    uiSkyGradient = this.add.graphics().setDepth(-5);
    drawSkyGradient(0);   // 초기 1회 렌더

    // ─── 저 멀리 태양의 여명 (오염된 흐릿한 태양 + 방사형 글로우) ──
    // 지평선 근처에서 은은히 맥동. (0,0) 상대좌표로 그려 중심 기준 scale
    const sunX = 2400, sunY = 415;
    const sun = this.add.graphics().setDepth(-4.5).setPosition(sunX, sunY);
    [[200, 0.06], [150, 0.09], [105, 0.13], [68, 0.20], [40, 0.34], [22, 0.6]]
        .forEach(([r, a]) => sun.fillStyle(0xc25a2a, a).fillCircle(0, 0, r));
    sun.fillStyle(0xe8915a, 0.5).fillCircle(0, 0, 16);   // 태양 코어
    this.tweens.add({
        targets: sun, scaleX: 1.10, scaleY: 1.10, alpha: 0.82,
        duration: 4200, yoyo: true, repeat: -1, ease: 'Sine.InOut'
    });

    // ─── 솜사탕 구름 텍스처 생성 (부드러운 다겹 뭉게구름) ──
    if (!this.textures.exists('softCloud')) {
        const cg = this.make.graphics({ add: false });
        // 뭉게구름 덩어리 — 여러 원 겹침 (x, y, r)
        const puffs = [
            [70, 70, 42], [125, 56, 54], [185, 64, 46],
            [105, 80, 48], [160, 82, 44], [225, 74, 34], [45, 78, 30],
        ];
        // 1) 바깥 부드러운 헤일로 (반투명 크게)
        cg.fillStyle(0xe6dcef, 0.18);
        puffs.forEach(([x, y, r]) => cg.fillCircle(x, y, r * 1.35));
        // 2) 중간 본체
        cg.fillStyle(0xd8cce6, 0.45);
        puffs.forEach(([x, y, r]) => cg.fillCircle(x, y, r));
        // 3) 밝은 윗면 하이라이트 (솜사탕 폭신함)
        cg.fillStyle(0xf4eef8, 0.75);
        puffs.forEach(([x, y, r]) => cg.fillCircle(x, y - r * 0.28, r * 0.62));
        cg.generateTexture('softCloud', 290, 150);
        cg.destroy();
    }

    // ─── 구름 배치 (하늘 영역에 점점이, 천천히 흐름) ──────
    uiClouds = [];
    const cloudSpots = [
        { x: 700,  y: 120, s: 0.9,  a: 0.55 },
        { x: 2200, y: 90,  s: 1.3,  a: 0.42 },
        { x: 3600, y: 160, s: 0.7,  a: 0.6  },
        { x: 5000, y: 110, s: 1.1,  a: 0.48 },
        { x: 6400, y: 75,  s: 1.5,  a: 0.36 },
        { x: 7800, y: 145, s: 0.85, a: 0.55 },
        { x: 9200, y: 100, s: 1.2,  a: 0.45 },
        { x: 10600,y: 130, s: 0.95, a: 0.52 },
    ];
    cloudSpots.forEach((c, i) => {
        const cloud = this.add.image(c.x, c.y, 'softCloud')
            .setDepth(-4).setScale(c.s).setAlpha(c.a);
        // 멀수록(작을수록) 느리게 → 패럴랙스 깊이감
        cloud.cloudSpeed = 4 + c.s * 5;   // 8~12 px/s
        uiClouds.push(cloud);
    });

    // ─── 배경 레이어: 오염된 대지 (정적) ──────────────────
    const worldBg = this.add.graphics().setDepth(-3);
    // 지평선 방사능 글로우 (옅은 황록 — 오염된 빛)
    worldBg.fillStyle(0x3a4a1e, 0.30).fillRect(0, 300, WORLD_W, 180);
    worldBg.fillStyle(0x4a5a22, 0.22).fillRect(0, 360, WORLD_W, 120);
    // 오염된 대지 (탁한 적갈/황록)
    worldBg.fillStyle(0x3a3420, 0.92).fillRect(0,  440, WORLD_W, 240);   // 메마른 평원
    worldBg.fillStyle(0x4a3a22, 1   ).fillRect(0,  680, WORLD_W, 80);    // 흙 표층
    worldBg.fillStyle(0x2a1c10, 1   ).fillRect(0,  760, WORLD_W, 250);   // 지하

    // 원거리 산 능선 — 코사인 다중합성 (오염된 잿빛 보라)
    const mtFar = this.add.graphics().setDepth(-1);
    mtFar.fillStyle(0x241a2a, 0.78);
    const farPts = [{ x: 0, y: 492 }];
    for (let i = 0; i <= 400; i++) {
        const t = i / 400;
        const x = t * WORLD_W;
        const h = 220 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 3  + 0.70))
                +  90 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 7  + 1.30))
                +  38 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 13 + 0.55));
        farPts.push({ x, y: 492 - h });
    }
    farPts.push({ x: WORLD_W, y: 492 });
    mtFar.fillPoints(farPts, true);

    // ─── 저 멀리 폐허가 된 도시 실루엣 (원거리 산 위에 점점이) ───
    drawRuinedCity(this, 470);

    // 근거리 산/언덕 능선 — 메마른 황갈 대지
    const mtNear = this.add.graphics().setDepth(-1);
    mtNear.fillStyle(0x2e2418, 0.88);
    const nearPts = [{ x: 0, y: 662 }];
    for (let i = 0; i <= 400; i++) {
        const t = i / 400;
        const x = t * WORLD_W;
        const h = 175 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 4  + 1.10))
                +  68 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 9  + 2.30))
                +  28 * (0.5 + 0.5 * Math.cos(t * 2 * Math.PI * 16 + 0.90));
        nearPts.push({ x, y: 662 - h });
    }
    nearPts.push({ x: WORLD_W, y: 662 });
    mtNear.fillPoints(nearPts, true);

    // ─── 마른 가지 나무 (앞쪽 대지에 점점이) ───────────────
    drawDeadTrees(this);

    // 지표면 라인
    const soilLine = this.add.graphics().setDepth(0);
    soilLine.lineStyle(2, 0x5a3520, 0.6).lineBetween(0, 680, WORLD_LIMIT_X, 680);

    // ─── 세계 끝 절벽 (WORLD_LIMIT_X) ────────────────────
    const cliff = this.add.graphics().setDepth(3);
    // 절벽 뒤 허공 (칠흑)
    cliff.fillStyle(0x020100, 1).fillRect(WORLD_LIMIT_X + 45, WORLD_TOP, WORLD_W, WORLD_H);
    // 절벽 단면 — 3레이어로 입체감
    cliff.fillStyle(0x6b3d1e, 1).fillRect(WORLD_LIMIT_X,      WORLD_TOP, 22, WORLD_H); // 표면 (밝음)
    cliff.fillStyle(0x3d200a, 1).fillRect(WORLD_LIMIT_X + 22, WORLD_TOP, 14, WORLD_H); // 중간
    cliff.fillStyle(0x1a0d03, 1).fillRect(WORLD_LIMIT_X + 36, WORLD_TOP, 9,  WORLD_H); // 그림자
    // 절벽 위 경고 라인
    cliff.lineStyle(2, 0xff4400, 0.55).lineBetween(WORLD_LIMIT_X - 2, 80, WORLD_LIMIT_X - 2, 700);

    activeStones = this.physics.add.group({ maxSize: 20 });
    birds        = this.physics.add.group();

    // 새총 거치대 (월드 공간) — 높이개조 패시브에 따라 동적 재렌더
    uiSlingStand = this.add.graphics();
    // 분신 쌍둥이 새총 — 분신 패시브 활성 시 표시
    uiTwinStand  = this.add.graphics();
    // 똥볼 축구선수 — 똥볼 패시브 활성 시 표시
    uiKicker     = this.add.graphics().setDepth(2);
    redrawSlingStand();
    redrawTwinStand();
    redrawKicker();

    trajectoryGraphics = this.add.graphics();
    rubberBandGraphics = this.add.graphics();
    hpBarGraphics      = this.add.graphics().setDepth(5);
    minimapGraphics    = this.add.graphics().setScrollFactor(0).setDepth(20);

    // HUD — setScrollFactor(0) 으로 카메라 이동/줌에 고정
    // ROUND 표시는 단일 라운드 게임 루프이므로 의미 없음 → 숨김
    uiRoundText = this.add.text(640, 18, '', {
        fontFamily: 'Arial Black', fontSize: '22px', color: '#a09060'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(10).setVisible(false);

    // uiScoreText 제거 — '처치한 방사능 새' 텍스트 삭제 (직관적 정보로 대체됨)

    uiAmmoText = this.add.text(640, 48, `남은 돌멩이: ${MAX_AMMO} / ${MAX_AMMO}`, {
        fontFamily: 'Arial Black', fontSize: '24px', color: '#e8e0c8'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(10);

    // uiPassiveText — 좌측 플레이어 패널과 중복이므로 화면 밖 보관 (참조 유지)
    uiPassiveText = this.add.text(-9999, -9999, '', {
        fontFamily: 'Arial', fontSize: '18px', color: '#c8960a'
    }).setOrigin(0, 1).setScrollFactor(0).setDepth(10).setAlpha(0);

    // ─── 박사님 연구 버튼 (우상단 최상단 — HUD 고정) ─────
    // 배경 그래픽 (반짝이는 테두리 패널)
    uiResearchBtn = this.add.graphics().setScrollFactor(0).setDepth(10);
    // 텍스트
    uiResearchBtnTxt = this.add.text(1200, 20, '🔬  박사님 연구', {
        fontFamily: 'Arial Black', fontSize: '15px', color: '#ffdd44',
        stroke: '#000000', strokeThickness: 2,
        shadow: { offsetX: 0, offsetY: 0, color: '#ffaa00', blur: 8, fill: true }
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(11).setInteractive({ useHandCursor: true });
    // 버튼 배경 그리기 함수 (활성/호버 + zoom 보정 공용)
    uiResearchBtn._active = false;
    uiResearchBtn._hover  = false;
    uiResearchBtn._draw = (active) => {
        uiResearchBtn._active = !!active;
        uiResearchBtn._hover  = false;
        uiResearchBtn._render();
    };
    uiResearchBtn._render = () => {
        uiResearchBtn.clear();
        const z = sceneRef ? sceneRef.cameras.main.zoom : 1.0;
        const ccx = config.width / 2, ccy = config.height / 2;
        const f = (sx, sy) => ({ x: ccx + (sx - ccx) / z, y: ccy + (sy - ccy) / z });
        const bx = 1260, by = 18, bw = 148, bh = 28;
        const tl = f(bx - bw, by);
        const w = bw / z, h = bh / z, r = 6 / z;
        const active = uiResearchBtn._active;
        const hover  = uiResearchBtn._hover;
        if (hover && active) {
            uiResearchBtn.fillStyle(0x3d2200, 1).fillRoundedRect(tl.x, tl.y, w, h, r);
            uiResearchBtn.lineStyle(2 / z, 0xffee88, 1).strokeRoundedRect(tl.x, tl.y, w, h, r);
            uiResearchBtn.lineStyle(6 / z, 0xffcc44, 0.35)
                .strokeRoundedRect(tl.x - 3/z, tl.y - 3/z, w + 6/z, h + 6/z, 10/z);
        } else if (active) {
            uiResearchBtn.fillStyle(0x2a1800, 1).fillRoundedRect(tl.x, tl.y, w, h, r);
            uiResearchBtn.lineStyle(2 / z, 0xffcc44, 1).strokeRoundedRect(tl.x, tl.y, w, h, r);
            uiResearchBtn.lineStyle(4 / z, 0xffaa00, 0.25)
                .strokeRoundedRect(tl.x - 2/z, tl.y - 2/z, w + 4/z, h + 4/z, 8/z);
        } else {
            uiResearchBtn.fillStyle(0x1a1208, 1).fillRoundedRect(tl.x, tl.y, w, h, r);
            uiResearchBtn.lineStyle(1 / z, 0x443311, 1).strokeRoundedRect(tl.x, tl.y, w, h, r);
        }
    };
    uiResearchBtn._draw(false);
    uiResearchBtnTxt.on('pointerover', () => {
        if (materialStock + roundMaterial >= 10) {
            uiResearchBtn._hover = true;
            uiResearchBtn._render();
        }
    });
    uiResearchBtnTxt.on('pointerout', () => updateResearchBtn());
    uiResearchBtnTxt.on('pointerup', () => {
        const total       = materialStock + roundMaterial;
        const stoneFlying = activeStones && activeStones.countActive(true) > 0;
        if (total >= 10 && !uiOverlay && !stoneFlying) {
            materialStock += roundMaterial;
            roundMaterial  = 0;
            refreshMaterialHUD();
            showDonationUI(sceneRef, 0, materialStock);
        }
    });

    uiMaterialText = this.add.text(1260, 58, '보유 특수물질 : 0g', {
        fontFamily: 'Arial Black', fontSize: '20px', color: '#e8a030'
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(10);

    uiPollutionText = this.add.text(1260, 84, '지구 오염도: 10%', {
        fontFamily: 'Arial', fontSize: '17px', color: '#ff6644'
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(10).setVisible(false);

    // ─── 남은 오염 생물 카운터 (미니맵 바로 아래) ─────────
    uiRemainingText = this.add.text(PANEL_CX, REMAINING_Y, '', {
        fontFamily: '"Arial Black", Arial',
        fontSize: '18px',
        color: '#ffdd55',
        stroke: '#000000',
        strokeThickness: 2,
        align: 'center'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(10);
    refreshRemainingHUD();

    // ─── Player Status 패널 (왼쪽) ────────────────────
    uiPanelBg = this.add.graphics().setScrollFactor(0).setDepth(8);
    uiPanelTitle = this.add.text(PANEL_CX, 22, '◆  플레이어 정보', {
        fontFamily: 'Arial Black', fontSize: '15px', color: '#e8a030'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(9);
    uiPanelContent = this.add.text(18, 52, '', {
        fontFamily: 'Arial', fontSize: '14px', color: '#d4c090', lineSpacing: 3
    }).setScrollFactor(0).setDepth(9);
    drawPanelBg(1.0);
    refreshPlayerPanel();

    // ─── 미니맵 토글 버튼 (패널 바로 아래, 영구 UI) ─────────
    uiMinimapBtnBg  = this.add.graphics().setScrollFactor(0).setDepth(9);
    uiMinimapBtnTxt = this.add.text(PANEL_CX, TOGGLE_Y, '● 미니맵  ON', {
        fontFamily: 'Arial Black', fontSize: '18px', color: '#e8a030'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(9);
    drawMinimapBtn(1.0);
    permanentHitAreas.push({
        x: PANEL_CX, y: TOGGLE_Y, hw: 108, hh: 14,
        cb: () => {
            minimapVisible = !minimapVisible;
            if (!minimapVisible) minimapGraphics.clear();
            drawMinimapBtn(sceneRef.cameras.main.zoom);
            uiMinimapBtnTxt.setText(minimapVisible ? '● 미니맵  ON' : '○ 미니맵  OFF');
            uiMinimapBtnTxt.setColor(minimapVisible ? '#e8a030' : '#6a5830');
        }
    });

    // ─── 설정 버튼 (우하단 구석 — 새총 드래그 영역과 간섭 없음) ──
    // '처음으로'는 설정 모달 안으로 이동 (2중 구조)
    uiSettingBtnBg  = this.add.graphics().setScrollFactor(0).setDepth(9);
    uiSettingBtnTxt = this.add.text(SETTING_BTN_X, SETTING_BTN_Y, '⚙  설정', {
        fontFamily: 'Arial Black', fontSize: '14px', color: '#cccccc'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(9);
    drawSideBtn(uiSettingBtnBg, 1.0);
    permanentHitAreas.push({
        x: SETTING_BTN_X, y: SETTING_BTN_Y, hw: 60, hh: 16,
        cb: () => openInGameSettings(sceneRef)
    });

    // 조준화면으로 버튼 (줌 아웃 시 화면 중앙에 표시)
    uiAimBtn = this.add.rectangle(640, 360, 270, 58, 0x000000)
        .setAlpha(0.5).setScrollFactor(0).setDepth(20)
        .setStrokeStyle(2, 0xe8a030).setVisible(false);
    uiAimBtnTxt = this.add.text(640, 360, '조준화면으로', {
        fontFamily: 'Arial Black', fontSize: '22px', color: '#ffffff'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(21).setVisible(false);

    spawnBirdsSpread(this);
    // 실제 소환된 수량을 총합으로 확정 (스테이지 1 기준)
    grandTotalBirds = birds.getChildren().length;
    remainingBirds  = grandTotalBirds;
    refreshRemainingHUD();

    this.input.on('pointerdown', startDrag, this);

    // 버튼 판정: 영구 영역 → 오버레이 영역 순서로 확인 (스크린 좌표 기반)
    this.input.on('pointerup', (pointer) => {
        for (const area of permanentHitAreas) {
            if (pointer.x >= area.x - area.hw && pointer.x <= area.x + area.hw &&
                pointer.y >= area.y - area.hh && pointer.y <= area.y + area.hh) {
                area.cb();
                return;
            }
        }
        for (const area of overlayHitAreas) {
            if (pointer.x >= area.x - area.hw && pointer.x <= area.x + area.hw &&
                pointer.y >= area.y - area.hh && pointer.y <= area.y + area.hh) {
                area.cb();
                return;
            }
        }
    });

    // ── 게임 BGM 시작 ───────────────────────────────────
    playBgm(this, 'gameMusic');

    sceneRef = this;
    const canvas = this.sys.game.canvas;
    // 브라우저 클라이언트 좌표 → 월드 좌표 변환 (카메라 스크롤 + 줌 반영)
    const toWorldPos = (clientX, clientY) => {
        const r   = canvas.getBoundingClientRect();
        const cx  = (clientX - r.left) * (config.width  / r.width);
        const cy  = (clientY - r.top)  * (config.height / r.height);
        const cam = sceneRef.cameras.main;
        return {
            x: cam.scrollX + cx / cam.zoom,
            y: cam.scrollY + cy / cam.zoom
        };
    };
    window.addEventListener('mousemove', (e) => {
        if (isDragging && currentStone) {
            const p = toWorldPos(e.clientX, e.clientY);
            doDragAt(p.x, p.y);
        } else if (isMapDragging) {
            const cam = sceneRef.cameras.main;
            const r   = canvas.getBoundingClientRect();
            const cx  = (e.clientX - r.left) * (config.width  / r.width);
            const cy  = (e.clientY - r.top)  * (config.height / r.height);
            const dx  = (cx - mapDragOriginX) / cam.zoom;
            const dy  = (cy - mapDragOriginY) / cam.zoom;
            cam.scrollX = Phaser.Math.Clamp(mapDragScrollX - dx, 0, WORLD_LIMIT_X - config.width / cam.zoom);
            cam.scrollY = Phaser.Math.Clamp(mapDragScrollY - dy, WORLD_TOP, WORLD_TOP + WORLD_H - config.height / cam.zoom);
        }
    });
    window.addEventListener('mouseup', (e) => {
        if (isDragging) {
            const p = toWorldPos(e.clientX, e.clientY);
            doFireStone(p.x, p.y);
        }
        isMapDragging = false;
    });

    // 마우스 휠 줌 (평상시 전용 — 발사/팔로우 중에는 비활성)
    canvas.addEventListener('wheel', (e) => {
        if (isDragging || cameraFollowing) return;
        const cam = sceneRef.cameras.main;
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        const newZoom = Phaser.Math.Clamp(cam.zoom + delta, 0.5, 1.0);
        // 화면 중심점 유지하며 scroll 재계산
        const cx = cam.scrollX + config.width  / (2 * cam.zoom);
        const cy = cam.scrollY + config.height / (2 * cam.zoom);
        cam.setZoom(newZoom);
        cam.scrollX = cx - config.width  / (2 * newZoom);
        cam.scrollY = cy - config.height / (2 * newZoom);
            setAimBtnVisible(newZoom < 1.0);
        e.preventDefault();
    }, { passive: false });

    this.physics.add.overlap(activeStones, birds, hitBird, null, this);
    // DEV MODE 로 시작 시 이미 패시브가 있으면 즉시 패널 라인 생성
    rebuildPassiveLines(this);
    showMissionOverlay(this);
}

// ─── update ───────────────────────────────────────────
function update(time, delta) {
    // 새 이동 범위 경계 — 타입별로 구간 분리
    birds.getChildren().forEach(b => {
        if (!b.active) return;
        const key    = b.texture && b.texture.key;
        const isFloater  = key === 'floater';
        const isTendril  = key === 'tendril';
        const maxX = isFloater ? 4000 : isTendril ? 950 : 3400;
        const minX = key === 'mothBird' ? 330 : isFloater ? 2000 : isTendril ? 300 : 800;
        if (b.x > maxX && b.body.velocity.x > 0) b.setVelocityX(-Math.abs(b.body.velocity.x));
        if (b.x < minX && b.body.velocity.x < 0) b.setVelocityX( Math.abs(b.body.velocity.x));

        // ── 나방 — 상하좌우 불규칙 이동 (실제 나방처럼 펄럭임) ──
        // 350~1050ms 주기로 무작위 방향·속도 갱신.
        // 슬로우모션(_slowOrigVX) 또는 시간정지(_frozenVX) 중이면 갱신 패스
        if (b.isMoth && b._slowOrigVX === undefined && b._frozenVX === undefined) {
            if (time >= b.mothNextDirAt) {
                const ang = Math.random() * Math.PI * 2;
                const sp  = b.mothBaseSpeed * (0.4 + Math.random() * 1.1);   // 호버 ~ 다트
                b.body.setVelocity(Math.cos(ang) * sp, Math.sin(ang) * sp * 0.55);
                b.mothNextDirAt = time + 350 + Math.random() * 700;
            }
            // y 경계 반사 (mothYMin ~ mothYMax 영역 유지)
            if (b.y < b.mothYMin && b.body.velocity.y < 0) b.body.setVelocityY( Math.abs(b.body.velocity.y));
            if (b.y > b.mothYMax && b.body.velocity.y > 0) b.body.setVelocityY(-Math.abs(b.body.velocity.y));
        }
    });

    // 돌멩이 — 농구공 바운스 + 월드 이탈 처리
    activeStones.getChildren().forEach(s => {
        if (!s.active) return;

        // ── 자석탄: 정점 감지 → 락온 → 끝까지 열추적 ──────────────────────────────
        // 돌멩이 회전 (손맛 B) — 비행 중 수평 속도에 비례해 굴러가듯 회전
        if (!s.settled && s.body) {
            s.angle += s.body.velocity.x * 0.0006 * delta;

            // 손맛 C: 잔상 — 빠른 돌 뒤에 옅은 페이드 (2프레임마다, 빠른 것만)
            if (minimapFrame % 2 === 0) {
                const spd = Math.hypot(s.body.velocity.x, s.body.velocity.y);
                if (spd > 320) {
                    const tr = sceneRef.add.image(s.x, s.y, 'stone')
                        .setScale(s.scaleX, s.scaleY).setAngle(s.angle)
                        .setAlpha(0.3).setDepth(0).setTint(0x88aaff);
                    sceneRef.tweens.add({ targets: tr, alpha: 0, duration: 200,
                        onComplete: () => tr.destroy() });
                }
            }
        }

        if (magnetStack > 0 && isOn('자석탄') && !s.settled) {

            // ① 정점 통과 시 가장 가까운 적 락온 (1회)
            if (!s.magnetFired && s.body.velocity.y > 60) {
                s.magnetFired = true;
                let nearest = null, nearDist = Infinity;
                birds.getChildren().forEach(b => {
                    if (!b.active) return;
                    const d = Phaser.Math.Distance.Between(s.x, s.y, b.x, b.y);
                    if (d < nearDist) { nearDist = d; nearest = b; }
                });
                if (nearest) {
                    s.magnetTarget = nearest;
                    // 락온 비주얼
                    if (sceneRef) {
                        const ring = sceneRef.add.graphics().setDepth(8).setPosition(s.x, s.y);
                        ring.lineStyle(4, 0x44ccff, 1).strokeCircle(0, 0, 14);
                        sceneRef.tweens.add({ targets: ring, scaleX: 5, scaleY: 5, alpha: 0,
                            duration: 320, ease: 'Cubic.Out', onComplete: () => ring.destroy() });
                        const beam = sceneRef.add.graphics().setDepth(7);
                        beam.lineStyle(2, 0x88eeff, 0.7)
                            .lineBetween(s.x, s.y, nearest.x, nearest.y);
                        sceneRef.tweens.add({ targets: beam, alpha: 0, duration: 250,
                            onComplete: () => beam.destroy() });
                    }
                }
            }

            // ② 락온 중 — 매 프레임 조향 (열추적 미사일)
            if (s.magnetTarget) {
                if (!s.magnetTarget.active) {
                    // 타깃 사망 → 추적 해제, 중력 복원
                    s.magnetTarget = null;
                    s.body.setGravityY(0);
                } else {
                    // 타임아웃: 4초 이상 추적해도 미명중 시 포기 (게임 멈춤 방지)
                    s.magnetTrackTime = (s.magnetTrackTime || 0) + delta;
                    if (s.magnetTrackTime > 4000) {
                        s.magnetTarget    = null;
                        s.magnetTrackTime = 0;
                        s.body.setGravityY(0);
                    } else {
                        s.body.setGravityY(-600);   // 중력 상쇄

                        // ── 재타격 쿨다운 (관통 + 자석탄 조합 시 hitBirds 맴돌기 방지) ──
                        // 관통 패시브로 돌이 살아남은 채 같은 적을 추적할 때,
                        // hitBirds가 재타격을 막아 영구 맴돌기→팅겨나가는 버그를 수정.
                        // 350ms마다 추적 타깃의 hitBirds 기록을 지워 재타격 허용.
                        s.magnetHitCooldown = (s.magnetHitCooldown ?? 0) - delta;
                        if (s.magnetHitCooldown <= 0) {
                            if (s.hitBirds) s.hitBirds.delete(s.magnetTarget);
                            s.magnetHitCooldown = 350;
                        }

                        const tDist = Phaser.Math.Distance.Between(
                            s.x, s.y, s.magnetTarget.x, s.magnetTarget.y);

                        // ── 근접 속도 제한 (충돌체 통과 후 역방향 진동 방지) ──
                        // 80px 이내에서는 거리에 비례해 속도를 줄여 충돌 감지를 보장.
                        const rawSpeed = Math.max(
                            Math.sqrt(s.body.velocity.x ** 2 + s.body.velocity.y ** 2), 580);
                        const speed = tDist < 80
                            ? Math.min(rawSpeed, Math.max(140, tDist * 4))
                            : rawSpeed;

                        const toAngle = Math.atan2(
                            s.magnetTarget.y - s.y, s.magnetTarget.x - s.x);

                        if (tDist < 120) {
                            // ── 근접: 회전 제한 없이 타깃 직접 조준 (궤도 탈출)
                            s.body.setVelocity(
                                Math.cos(toAngle) * speed,
                                Math.sin(toAngle) * speed);
                        } else {
                            // ── 원거리: 부드러운 조향
                            const nowAngle = Math.atan2(s.body.velocity.y, s.body.velocity.x);
                            let diff = toAngle - nowAngle;
                            while (diff >  Math.PI) diff -= 2 * Math.PI;
                            while (diff < -Math.PI) diff += 2 * Math.PI;
                            const newAngle = nowAngle + Math.max(-0.14, Math.min(0.14, diff));
                            s.body.setVelocity(
                                Math.cos(newAngle) * speed,
                                Math.sin(newAngle) * speed);
                        }
                    }
                }
            }
        }

        // ── 농구공 패시브: 지면 도달 시 튀어오름 ─────
        if (basketballStack > 0 && isOn('농구공')) {
            if (s.y >= GROUND_Y && s.body.velocity.y > 10
                    && s.bounceCount < basketballStack && !s.settled) {
                s.bounceCount++;
                s.setY(GROUND_Y - 4);
                s.body.setVelocityY(-Math.abs(s.body.velocity.y) * 0.85);
                if (sceneRef) {
                    sceneRef.cameras.main.shake(60, 0.006);
                    spawnGroundImpact(sceneRef, s.x);
                }
            }
        }

        // ── 일반 지면 착지: 스쿼시 → 굴러가다 페이드 아웃 ─
        if (!s.settled && s.y >= GROUND_Y && s.body.velocity.y > 10
                && !(basketballStack > 0 && isOn('농구공') && s.bounceCount < basketballStack)) {
            const slideVX = s.body.velocity.x;   // ← 착지 순간 수평 속도 포착
            s.settled = true;
            s.setY(GROUND_Y - s.displayHeight * 0.5);
            s.body.setVelocity(0, 0);
            s.body.allowGravity = false;
            if (sceneRef) {
                sceneRef.cameras.main.shake(75, 0.007);
                spawnGroundImpact(sceneRef, s.x);

                // ── 폭발 패시브: 착지 시에도 발동 ──
                if (explosionStack > 0 && isOn('폭발')) {
                    spawnGroundExplosion(sceneRef, s.x, s.y, s);
                }

                // ── 그라운드 제로 패시브: 착지 시 하늘에서 레이저 빔 강하 ──
                if (groundZeroStack > 0 && isOn('그라운드 제로')) {
                    spawnGroundZero(sceneRef, s.x);
                }

                // ── 재활용 패시브: 빈손 착지 시 확률적 회수 ──
                tryRecycleStone(s);

                const rollDist = Phaser.Math.Clamp(slideVX * 0.45, -340, 340);
                const rollDur  = 650 + Math.abs(rollDist) * 2.0;
                const spinDeg  = rollDist * 2.8;

                // 착지 순간 스쿼시 — 약하고 짧게 (돌은 고무공이 아님)
                sceneRef.tweens.add({
                    targets: s,
                    scaleX: s.scaleX * 1.28,
                    scaleY: s.scaleY * 0.80,
                    duration: 55, yoyo: true, ease: 'Sine.Out',
                });

                // 스쿼시와 동시에 굴러가며 페이드 아웃 (delay 없음)
                sceneRef.tweens.add({
                    targets: s,
                    x:     s.x + rollDist,
                    angle: s.angle + spinDeg,
                    alpha: 0,
                    duration: rollDur,
                    ease: 'Quad.Out',
                    onComplete: () => {
                        if (s.active) activeStones.killAndHide(s);
                        s.setAlpha(1); s.setAngle(0);
                        updateResearchBtn();
                    }
                });
            }
        }

        // ── 번개탄: 2초마다 주변 오염생물 번개 공격 ─────────────────────────────
        if (lightningStack > 0 && isOn('번개탄') && !s.settled) {
            s.lightningTimer = (s.lightningTimer || 0) + delta;
            if (s.lightningTimer >= 500) {
                s.lightningTimer = 0;
                const BOLT_R = 160;
                const sx = s.x, sy = s.y;
                // 피해
                birds.getChildren().slice().forEach(b => {
                    if (!b.active) return;
                    if (Phaser.Math.Distance.Between(sx, sy, b.x, b.y) > BOLT_R) return;
                    b.hp = (b.hp ?? 1) - STONE_DAMAGE;
                    if (b.hp <= 0) {
                        const bx2 = b.x, by2 = b.y, mat2 = b.materialValue ?? 10, bk2 = b.texture?.key;
                        b.destroy();
                        roundBirdsHit++; roundMaterial += mat2 + getScrapBonus(); totalBirdsHit++;
                        remainingBirds = Math.max(0, remainingBirds - 1);
                        refreshMaterialHUD(); refreshRemainingHUD(); refreshPlayerPanel();
                        showKillFx(sceneRef, bx2, by2, mat2, bk2);
                    } else {
                        sceneRef.tweens.add({ targets: b, alpha: 0.1, duration: 50,
                            yoyo: true, repeat: 2, onComplete: () => { if (b?.active) b.setAlpha(1); } });
                    }
                });
                // 번개 비주얼
                spawnLightningFx(sceneRef, sx, sy, BOLT_R);
                // 번개 처치 후 라운드 클리어 체크
                if (remainingBirds <= 0 && !isRoundEnding) {
                    isRoundEnding = true;
                    sceneRef.time.delayedCall(900, () => showRoundClear(sceneRef), [], sceneRef);
                }
            }
        }

        // 중력무시 모드: 직선 비행 자동 소멸 타이머 (무한 비행 방지)
        if (s.noGravity && !s.settled) {
            s.lifetime = (s.lifetime ?? 0) + delta;
            if (s.lifetime >= 4500) {
                // 페이드 아웃 + 재활용 시도 후 제거
                tryRecycleStone(s);
                sceneRef.tweens.add({
                    targets: s, alpha: 0, scaleX: s.scaleX * 0.4, scaleY: s.scaleY * 0.4,
                    duration: 280, ease: 'Quad.Out',
                    onComplete: () => {
                        if (s.active) activeStones.killAndHide(s);
                        s.setAlpha(1); s.setScale(getStoneScale());
                    }
                });
                s.settled = true;   // 추가 처리 차단
            }
        }

        // 월드 이탈 (지면 아래로 빠진 경우 / 오른쪽 벽 / 좌측·상단)
        if (s.y > 820 || s.x > WORLD_LIMIT_X || s.x < -80 || s.y < WORLD_TOP) {
            // 재활용 패시브: 화면 밖으로 떠난 경우에도 회수 시도
            tryRecycleStone(s);
            activeStones.killAndHide(s);
        }
    });

    // ── 수동 scroll lerp (줌 없음 — 프레임드랍 원인 제거)
    if (cameraFollowing) {
        const flying = activeStones.getChildren().filter(s => s.active);
        const cam = this.cameras.main;
        if (flying.length > 0) {
            const target = flying.reduce((a, b) =>
                Phaser.Math.Distance.Between(b.x, b.y, SLING_CENTER.x, SLING_CENTER.y) >
                Phaser.Math.Distance.Between(a.x, a.y, SLING_CENTER.x, SLING_CENTER.y) ? b : a
            );
            const tx = Phaser.Math.Clamp(target.x - config.width  / 2, 0, WORLD_LIMIT_X - config.width);
            const ty = Phaser.Math.Clamp(
                target.y - CAM_FOLLOW_OFFSET_Y - config.height / 2,
                WORLD_TOP, WORLD_TOP + WORLD_H - config.height
            );
            // 지연팔로업 매우 약하게 — 0.1 → 0.35 (3.5배 빠른 추적)
            cam.scrollX = Phaser.Math.Linear(cam.scrollX, tx, 0.35);
            cam.scrollY = Phaser.Math.Linear(cam.scrollY, ty, 0.35);
        }
        if (!isRoundEnding && activeStones.countActive(true) === 0) {
            cameraFollowing = false;
            sceneRef.time.delayedCall(2000, () => wipeReturn(sceneRef, () => loadStone(sceneRef)));
        }
    }

    // 드래그 중 슬링샷 틸트 — 드래그 방향대로 기울어짐
    // 탄성증가 스택이 쌓일수록 더 크게 기울어짐 (탄성이 강해짐을 시각화)
    if (isDragging && currentStone && !_tiltTween && !isDungBallOn()) {
        const dx = currentStone.x - SLING_CENTER.x;
        const armBonus = (armMuscleStack > 0 && isOn('탄성증가')) ? armMuscleStack : 0;
        const maxTilt  = 0.20 + armBonus * 0.10;       // ±11° → ±17° → ±23° → ±29°
        const sensitivity = Math.max(400, 700 - armBonus * 100);  // 더 작은 드래그로도 더 기울어짐
        const newTilt = Phaser.Math.Clamp(dx / sensitivity, -maxTilt, maxTilt);
        if (Math.abs(newTilt - _slingTilt) > 0.001) {
            _slingTilt = newTilt;
            redrawSlingStand();
            redrawTwinStand();
        }
    }

    // 똥볼 차징 중 — 다리가 뒤로 올라감 (B급 감성 — 오래 누를수록 더 뒤로)
    if (isDragging && isDungBallOn() && currentStone && !_kickerTween) {
        const heldMs = Math.max(0, Date.now() - _kickChargeStart);
        const charge = Math.min(1.0, heldMs / KICK_CHARGE_MAX);
        // 풀차징 시 약간의 떨림 효과 (sin wave) — 잔뜩 긴장한 듯
        const wobble = charge >= 0.95 ? Math.sin(Date.now() * 0.025) * 0.06 : 0;
        const backLift = -(0.15 + charge * 1.0) + wobble;   // -0.15 ~ -1.15 (살짝 미리 들기 + 점점 더)
        if (Math.abs(backLift - _kickerLegAngle) > 0.005) {
            _kickerLegAngle = backLift;
            redrawKicker();
        }
    }

    drawHpBars();
    drawRubberBand();
    drawKickChargeBar();
    compensateHUDZoom();
    updateHUDFade();

    // 미니맵은 4프레임마다 갱신 (성능 최적화)
    minimapFrame++;
    if (minimapFrame % 4 === 0) drawMinimap();

    // 동적 하늘 그라데이션 — 3프레임마다 (색 변화가 느려 충분)
    if (minimapFrame % 3 === 0) drawSkyGradient(time);

    // 솜사탕 구름 서서히 흐름 (월드 좌우 wrap)
    if (uiClouds.length > 0) {
        const cdt = delta / 1000;
        uiClouds.forEach(c => {
            c.x += c.cloudSpeed * cdt;
            if (c.x > WORLD_W + 250) c.x = -250;   // 우측 끝 → 좌측 재등장
        });
    }
}

// ─── 새 스폰 ──────────────────────────────────────────
function spawnBird(scene, withFade = false, fixedX = null, forcedType = null) {
    const type = forcedType ?? BIRD_TYPES[Phaser.Math.Between(0, BIRD_TYPES.length - 1)];
    const x = fixedX !== null ? fixedX : Phaser.Math.Between(500, 2500);
    const zoneY = type.zoneY ?? [80, 260];
    const y = Phaser.Math.Between(zoneY[0], zoneY[1]);
    const bird = birds.create(x, y, type.key);
    // 텍스처 해상도 2배 → 같은 표시 크기 유지하려면 스케일 1/2
    bird.setScale((type.key === 'eagle'    ? 0.72
                 : type.key === 'tendril'  ? 1.05
                 : type.key === 'overlord' ? 1.15
                 : 0.5) / 2);
    bird.body.allowGravity = false;
    bird.materialValue = type.material;
    bird.hp    = type.hp ?? 1;
    bird.maxHp = type.hp ?? 1;
    if (withFade) bird.setAlpha(0);

    const spd = Phaser.Math.Between(type.speedMin, type.speedMax);

    // 나방은 별도 처리 — 상하좌우 불규칙 이동 (update 루프에서 주기적으로 방향 전환)
    if (type.key === 'mothBird') {
        bird.isMoth          = true;
        bird.mothBaseSpeed   = spd;
        bird.mothNextDirAt   = 0;    // update 루프에서 즉시 첫 방향 설정
        bird.mothYMin        = (type.zoneY && type.zoneY[0]) ?? 495;
        bird.mothYMax        = (type.zoneY && type.zoneY[1]) ?? 635;
        // floatTween 없이 velocity 기반으로 자연스러운 나방 움직임
    } else {
        bird.setVelocityX(Phaser.Math.Between(0, 1) ? spd : -spd);
        const floatAmt = type.key === 'eagle'   ? Phaser.Math.Between(-30, 30)
                       : type.key === 'floater' ? Phaser.Math.Between(-55, 55)
                       : type.key === 'tendril'  ? Phaser.Math.Between(-18, 18)
                       : type.key === 'overlord' ? Phaser.Math.Between(-4, 4)
                       : Phaser.Math.Between(-20, 20);
        const floatDur = type.key === 'eagle'    ? Phaser.Math.Between(800, 1600)
                       : type.key === 'floater'  ? Phaser.Math.Between(1800, 3200)
                       : type.key === 'tendril'  ? Phaser.Math.Between(1600, 2800)
                       : type.key === 'overlord' ? Phaser.Math.Between(3000, 5000)
                       : Phaser.Math.Between(1000, 2000);
        // 시간정지 패시브가 일시정지하기 위해 트윈 참조 저장
        bird.floatTween = scene.tweens.add({ targets: bird, y: y + floatAmt, duration: floatDur, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    }
    if (withFade) scene.tweens.add({ targets: bird, alpha: 1, duration: 400 });

}

// 패시브가 현재 활성 상태인지 (보유 + 토글 ON)
function isOn(name) { return passiveActive[name] !== false; }

// ─── 손맛 A: 히트스톱 — 명중 순간 물리 짧게 정지 (묵직한 타격감) ──
function doHitStop(scene, ms) {
    if (!scene || !scene.physics || !scene.physics.world) return;
    if (scene.physics.world.isPaused) return;   // 중첩 방지
    scene.physics.world.pause();
    scene.time.delayedCall(ms, () => {
        if (scene.physics && scene.physics.world) scene.physics.world.resume();
    });
}

// ─── 손맛 G: 보스 처치 슬로우모션 (짧게 시간 느려짐) ──────
function doBossSlowmo(scene, dur) {
    if (!scene || scene._bossSlowActive) return;
    scene._bossSlowActive = true;
    scene.physics.world.timeScale = 2.4;   // 2.4배 느림 (값 클수록 느림)
    scene.tweens.timeScale = 0.45;
    scene.time.delayedCall(dur, () => {
        if (scene.physics && scene.physics.world) scene.physics.world.timeScale = 1;
        scene.tweens.timeScale = 1;
        scene._bossSlowActive = false;
    });
}

// ─── 색 보간 헬퍼 (hex int 두 색을 t=0~1 비율로 lerp) ────
function lerpHex(a, b, t) {
    const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
    const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return (r << 16) | (g << 8) | bl;
}

// ─── 동적 하늘 그라데이션 (아포칼립스, 은은하게 흐름) ────
// 발라트로 배경의 ~20% 수준 — 어지럽지 않게 천천히 색이 변함
function drawSkyGradient(time) {
    if (!uiSkyGradient) return;
    const g = uiSkyGradient;
    g.clear();

    // 두 개의 위상 (서로 다른 주기 → 단조롭지 않게). 옵션 B 수준 — 뚜렷하게 흐름
    const p1 = (Math.sin(time * 0.00028) + 1) / 2;          // ~22초 주기
    const p2 = (Math.sin(time * 0.00035 + 1.7) + 1) / 2;    // ~18초 주기

    // 아포칼립스 팔레트 — 따뜻한 노을 ↔ 차가운 보라 황혼 (다른 계열로 극적)
    // 상단(우주): 어두운 적보라 ↔ 어두운 청보라
    const topCol = lerpHex(0x160a1a, 0x0e1024, p1);
    // 중상단(오염 하늘): 탁한 자주 ↔ 탁한 청회
    const upMid  = lerpHex(0x2e1626, 0x1c2236, p2);
    // 중단(먼지 하늘): 적갈 ↔ 보랏빛 회색
    const loMid  = lerpHex(0x4e2a1e, 0x3a2840, p1);
    // 지평선(오염 노을): 주황 노을 ↔ 보라 황혼
    const horiz  = lerpHex(0x824624, 0x5a3452, p2);

    const W = WORLD_W;
    // 영역을 3분할하여 다중 색상 세로 그라데이션 (경계 색 연속 → 부드러움)
    // 1) 우주 → 중상단
    g.fillGradientStyle(topCol, topCol, upMid, upMid, 1);
    g.fillRect(0, WORLD_TOP, W, (-2200) - WORLD_TOP);
    // 2) 중상단 → 중단
    g.fillGradientStyle(upMid, upMid, loMid, loMid, 1);
    g.fillRect(0, -2200, W, 2200);
    // 3) 중단 → 지평선
    g.fillGradientStyle(loMid, loMid, horiz, horiz, 1);
    g.fillRect(0, 0, W, 480);
}

// ─── 저 멀리 폐허가 된 도시 실루엣 ─────────────────────
// 원거리 산 위에 부서진 빌딩들이 점점이. 어두운 실루엣 + 옅은 창문 불빛
function drawRuinedCity(scene, baseY) {
    const g = scene.add.graphics().setDepth(-1);
    // 도시 구역 — 맵 전체에 3개 군집
    const clusters = [1400, 5200, 9000];
    clusters.forEach((cx, ci) => {
        // 각 군집에 빌딩 6~9개
        const count = 6 + (ci % 3);
        for (let i = 0; i < count; i++) {
            const bx = cx + (i - count / 2) * 46 + ((i * 37) % 23);
            const bw = 24 + ((i * 13) % 20);
            const bh = 50 + ((i * 53) % 130);
            // 부서진 윗부분 (절반은 기울어진 폐허)
            const broken = (i % 3 === 0);
            // 빌딩 실루엣 (아주 어두운 잿빛 보라)
            g.fillStyle(0x161018, 0.82);
            if (broken) {
                // 무너진 빌딩 — 사다리꼴 (위가 비스듬)
                g.fillPoints([
                    { x: bx,        y: baseY },
                    { x: bx,        y: baseY - bh },
                    { x: bx + bw,   y: baseY - bh * 0.6 },
                    { x: bx + bw,   y: baseY },
                ], true);
            } else {
                g.fillRect(bx, baseY - bh, bw, bh);
            }
            // 창문 불빛 — 드문드문 살아남은 옅은 황색/적색 (몇 개만)
            if (i % 2 === 0) {
                const winCol = (i % 4 === 0) ? 0x886622 : 0x6a3322;
                g.fillStyle(winCol, 0.55);
                for (let wy = baseY - bh + 12; wy < baseY - 8; wy += 22) {
                    if (((wy + i) % 3) !== 0) continue;   // 드문드문
                    g.fillRect(bx + 6, wy, 4, 5);
                    if (bw > 28) g.fillRect(bx + bw - 10, wy, 4, 5);
                }
            }
        }
    });
}

// ─── 마른 가지 나무 (앞쪽 대지) ────────────────────────
// 잎 없는 죽은 나무 — 갈라진 가지. 재귀로 가지 분기
function drawDeadTrees(scene) {
    const g = scene.add.graphics().setDepth(-0.5);   // 적(depth 0)보다 뒤
    const groundY = 680;
    const trees = [620, 1150, 1900, 2600, 3300]; // 새총 우측에 점점이

    const branch = (x, y, ang, len, depth, width) => {
        if (depth <= 0 || len < 6) return;
        const ex = x + Math.cos(ang) * len;
        const ey = y + Math.sin(ang) * len;
        g.lineStyle(width, 0x1a120a, 0.9);
        g.lineBetween(x, y, ex, ey);
        // 분기 2~3개
        const branches = depth > 2 ? 2 : 3;
        for (let b = 0; b < branches; b++) {
            const spread = 0.5 + (b * 0.35);
            const dir = (b % 2 === 0) ? -1 : 1;
            branch(ex, ey, ang + dir * spread * (0.5 + (b * 0.2)),
                   len * 0.72, depth - 1, Math.max(1, width * 0.65));
        }
    };

    trees.forEach((tx, ti) => {
        const trunkLen = 46 + (ti * 17) % 30;
        const trunkW   = 6 + (ti % 3);
        // 살짝 기울어진 죽은 나무 (방사능에 비틀림)
        const lean = ((ti % 2 === 0) ? -1 : 1) * 0.12;
        branch(tx, groundY, -Math.PI / 2 + lean, trunkLen, 4, trunkW);
    });
}

// ─── 모든 패시브 스택 초기화 (새 게임 시작 시) ──────────
// DEV MODE 시작 경로에서는 호출되지 않음 (DEV MODE 가 설정한 스택을 보존하기 위해)

    armMuscleStack   = 0; bigStoneStack   = 0; ironBallStack    = 0;
    aimLineStack     = 0; piercingStack   = 0; basketballStack  = 0;
    shotgunStack     = 0; magnetStack     = 0; explosionStack   = 0;
    pickupStoneStack = 0; lightningStack  = 0; cellDivisionStack = 0;
    groundZeroStack  = 0; recycleStack    = 0; scrapCollectStack = 0;
    gravityIgnoreStack = 0; burstLoadStack = 0; nukeStack       = 0;
    slingModStack    = 0; timeStopStack   = 0; twinStack         = 0;
    dispatchStack    = 0; pendingDispatchX = null;

}

// ─── 높이개조 (NORMAL): 새총 높이 동적 조절 ──────────────
function getSlingRaise() {
    if (slingModStack <= 0 || !isOn('높이개조')) return 0;
    return slingModStack * SLING_RAISE_PER_STACK;
}

// 슬링샷이 베이스(폴 바닥)를 기준으로 _slingTilt 만큼 기울었을 때의 점 좌표 변환
function tiltedPoint(x, y, pivotX) {
    if (_slingTilt === 0) return { x, y };
    const pivotY = 720;
    const dx = x - pivotX, dy = y - pivotY;
    const c = Math.cos(_slingTilt), s = Math.sin(_slingTilt);
    return { x: pivotX + dx * c - dy * s, y: pivotY + dx * s + dy * c };
}

function isDungBallOn() {
    return dungBallStack > 0 && isOn('똥볼');
}

// 공의 시작 위치 — 새총 모드는 새총 머리, 똥볼 모드는 선수 발 옆 지면
function getBallPos() {
    if (isDungBallOn()) {
        return { x: SLING_CENTER.x + 28, y: 720 - 8 };
    }
    return { x: SLING_CENTER.x, y: SLING_CENTER.y };
}

function redrawSlingStand() {
    if (!uiSlingStand) return;
    uiSlingStand.clear();
    // 똥볼 패시브가 활성 시 새총 숨김 (축구선수로 대체)
    uiSlingStand.setVisible(!isDungBallOn());
    if (isDungBallOn()) return;
    const pivot = SLING_CENTER.x;
    // 폴 상단·하단 / 양 갈래 — 틸트 적용
    const top  = tiltedPoint(SLING_CENTER.x, SLING_CENTER.y, pivot);
    const base = tiltedPoint(SLING_CENTER.x, 720,            pivot);
    const pL   = tiltedPoint(PRONG_L.x, PRONG_L.y,           pivot);
    const pR   = tiltedPoint(PRONG_R.x, PRONG_R.y,           pivot);
    uiSlingStand.lineStyle(12, 0x8B4513, 1);
    uiSlingStand.lineBetween(top.x, top.y, base.x, base.y);
    uiSlingStand.lineStyle(10, 0x8B4513, 1);
    uiSlingStand.lineBetween(top.x, top.y, pL.x, pL.y);
    uiSlingStand.lineBetween(top.x, top.y, pR.x, pR.y);
}

// 분신 쌍둥이 새총 — 분신 패시브 ON 일 때만 표시 (단 똥볼 시 숨김)
function redrawTwinStand() {
    if (!uiTwinStand) return;
    uiTwinStand.clear();
    const visible = twinStack > 0 && isOn('분신') && !isDungBallOn();
    uiTwinStand.setVisible(visible);
    if (!visible) return;
    const cx = SLING_CENTER.x + TWIN_OFFSET_X;
    const cy = SLING_CENTER.y;
    const pivot = cx;
    // 메인보다 살짝 연한 색 + 동일 비례
    const top  = tiltedPoint(cx, cy, pivot);
    const base = tiltedPoint(cx, 720, pivot);
    const pL   = tiltedPoint(cx - 20, PRONG_L.y, pivot);
    const pR   = tiltedPoint(cx + 20, PRONG_R.y, pivot);
    uiTwinStand.lineStyle(11, 0x7a3d10, 0.92);
    uiTwinStand.lineBetween(top.x, top.y, base.x, base.y);
    uiTwinStand.lineStyle(9, 0x7a3d10, 0.92);
    uiTwinStand.lineBetween(top.x, top.y, pL.x, pL.y);
    uiTwinStand.lineBetween(top.x, top.y, pR.x, pR.y);
}

// ─── 똥볼 (NORMAL): 축구선수 (큰 체격) ──────────────────
// 뒷발(왼다리, cx-10 hip)이 kicker. 차징 시 뒤로 들리고 상체도 앞으로 수그러짐
function redrawKicker() {
    if (!uiKicker) return;
    uiKicker.clear();
    const active = isDungBallOn();
    uiKicker.setVisible(active);
    if (!active) return;

    const cx = SLING_CENTER.x;
    const baseY = 720;
    const headR = 14;
    const kickProg = _kickerLegAngle;          // -1.15 (charge back) ~ +2.0 (forward kick)
    const bend     = Math.max(0, -kickProg);   // 차징 시 0 ~ 1.15 (상체 수그러짐 정도)

    // 상체 forward lean — 앞쪽(오른쪽)으로 + 약간 아래로
    const leanX = bend * 18;
    const leanY = bend * 6;

    // 골반 라인 (고정)
    const hipY = baseY - 36;          // 다리 시작점
    const shortsH = 22;
    const shortsTop = hipY - shortsH;
    const torsoH = 52;
    const torsoTopY = shortsTop - torsoH;
    const torsoW = 42;
    const headY = torsoTopY - headR - 4;

    // ── 그림자 ──
    uiKicker.fillStyle(0x000000, 0.35).fillEllipse(cx, baseY - 1, 48, 9);

    // 상체 부분의 위쪽 좌표 (lean 적용)
    const headCX = cx + leanX;
    const headCY = headY + leanY;
    const tL = cx + leanX * 0.4 - torsoW/2;     // 토르소 위쪽은 leanX*0.4 만큼 이동
    const tR = cx + leanX * 0.4 + torsoW/2;
    const bL = cx - torsoW/2;                    // 토르소 아래쪽(허리)은 고정
    const bR = cx + torsoW/2;

    // ── 유니폼 상의 (평행사변형 — 위쪽 leanX, 아래쪽 0) ──
    uiKicker.fillStyle(0xdd2222, 1);
    uiKicker.fillTriangle(bL, shortsTop, bR, shortsTop, tR, torsoTopY);
    uiKicker.fillTriangle(bL, shortsTop, tR, torsoTopY, tL, torsoTopY);
    // 어깨 짙은 띠 (top 8px) — 위쪽 8px 슬랜티드
    uiKicker.fillStyle(0xaa1818, 1);
    const sRatio = 8 / torsoH;
    const sL = tL + (bL - tL) * sRatio;
    const sR = tR + (bR - tR) * sRatio;
    uiKicker.fillTriangle(tL, torsoTopY, tR, torsoTopY, sR, torsoTopY + 8);
    uiKicker.fillTriangle(tL, torsoTopY, sR, torsoTopY + 8, sL, torsoTopY + 8);
    // 흰띠 (가슴 중간)
    const wRatio = 0.45;
    const wL = tL + (bL - tL) * wRatio;
    const wR = tR + (bR - tR) * wRatio;
    const wY = torsoTopY + torsoH * wRatio;
    const w2L = tL + (bL - tL) * (wRatio + 5/torsoH);
    const w2R = tR + (bR - tR) * (wRatio + 5/torsoH);
    const w2Y = wY + 5;
    uiKicker.fillStyle(0xffffff, 1);
    uiKicker.fillTriangle(wL, wY, wR, wY, w2R, w2Y);
    uiKicker.fillTriangle(wL, wY, w2R, w2Y, w2L, w2Y);

    // ── 머리 (lean 적용) ──
    uiKicker.fillStyle(0xddbb88, 1).fillCircle(headCX, headCY, headR);
    uiKicker.lineStyle(2, 0x3a2010, 1).strokeCircle(headCX, headCY, headR);
    uiKicker.fillStyle(0x2a1808, 1)
        .fillRect(headCX - headR + 1, headCY - headR + 1, (headR - 1) * 2, 8);
    uiKicker.fillStyle(0x111111, 1)
        .fillCircle(headCX - 5, headCY, 1.8)
        .fillCircle(headCX + 5, headCY, 1.8);
    uiKicker.lineStyle(1.5, 0x552222, 1)
        .lineBetween(headCX - 4, headCY + 6, headCX + 4, headCY + 6);

    // ── 목 — 머리와 어깨 사이 사다리꼴 ──
    uiKicker.fillStyle(0xc4a070, 1);
    const nT_L = headCX - 5, nT_R = headCX + 5;
    const nB_L = (tL + sL) / 2 + 16 - 5, nB_R = (tL + sL) / 2 + 16 + 5;
    const nT_Y = headCY + headR - 1;
    const nB_Y = torsoTopY;
    uiKicker.fillTriangle(nT_L, nT_Y, nT_R, nT_Y, nB_R, nB_Y);
    uiKicker.fillTriangle(nT_L, nT_Y, nB_R, nB_Y, nB_L, nB_Y);

    // ── 팔 ──
    uiKicker.lineStyle(9, 0xddbb88, 1);
    const shoulderL = tL + 4, shoulderR = tR - 4;
    const shoulderY = torsoTopY + 6;
    // 왼팔 — 차징 시 뒤로 빠짐
    const armL_X = cx - 28 - bend * 4;
    const armL_Y = shoulderY + 24 + bend * 4;
    uiKicker.lineBetween(shoulderL, shoulderY, armL_X, armL_Y);
    // 오른팔 — 차징 시 앞쪽 위로 들림 (균형 잡기)
    const armR_X = cx + 28 + bend * 10;
    const armR_Y = shoulderY + 24 - bend * 12;
    uiKicker.lineBetween(shoulderR, shoulderY, armR_X, armR_Y);
    // 손
    uiKicker.fillStyle(0xddbb88, 1)
        .fillCircle(armL_X, armL_Y, 4)
        .fillCircle(armR_X, armR_Y, 4);

    // ── 반바지 ──
    uiKicker.fillStyle(0x101025, 1).fillRect(bL, shortsTop, torsoW, shortsH);
    uiKicker.fillStyle(0x05051a, 1).fillRect(bL, shortsTop + shortsH - 4, torsoW, 4);

    // ── 다리 ──
    const legW = 12;
    const legColor = 0xddbb88;

    // 오른다리 (앞발, planted, 고정)
    uiKicker.fillStyle(legColor, 1).fillRect(cx + 5, hipY, legW, baseY - hipY - 6);
    uiKicker.fillStyle(0xffffff, 1).fillRect(cx + 5, baseY - 22, legW, 4);
    uiKicker.fillStyle(0x080808, 1).fillRect(cx + 3, baseY - 7, legW + 4, 7);

    // 왼다리 (뒷발, kicker — 차징 시 뒤로 들림 / 발사 시 앞으로 swing)
    const hipX_L = cx - 11;
    const liftAmt = Math.abs(kickProg);
    // 음수(charge) → 뒤로 (left, 음수 x) / 양수(kick) → 앞으로 (right, 양수 x)
    const footX = hipX_L - 2 + kickProg * 38;
    const footY = baseY - 6 - liftAmt * 36;
    uiKicker.lineStyle(legW, legColor, 1);
    uiKicker.lineBetween(hipX_L, hipY, footX, footY);
    // 양말 (밑쪽)
    uiKicker.lineStyle(legW * 0.95, 0xffffff, 1);
    const sockMid = { x: footX - (footX - hipX_L) * 0.13, y: footY - (footY - hipY) * 0.13 };
    const sockEnd = { x: footX - (footX - hipX_L) * 0.02, y: footY - (footY - hipY) * 0.02 };
    uiKicker.lineBetween(sockMid.x, sockMid.y, sockEnd.x, sockEnd.y);
    // 신발
    uiKicker.fillStyle(0x080808, 1).fillRect(footX - 6, footY - 4, legW + 6, 8);

    // ── 차징 시 땀방울 (긴장감) ──
    if (kickProg < -0.3) {
        const drip = -kickProg;
        uiKicker.fillStyle(0x66ccff, 0.9 * drip)
            .fillCircle(headCX + headR + 4, headCY - 4 - drip * 4, 2 + drip);
    }

    // ── 차는 동작 swoosh (forward swing) — 뒷발(왼다리)이 앞으로 휘둘릴 때 ──
    if (kickProg > 0.4) {
        uiKicker.lineStyle(3.5, 0xffffff, kickProg * 0.55);
        uiKicker.beginPath();
        // 왼쪽 뒤(135°)에서 오른쪽 앞(45°)으로 호 그리기
        uiKicker.arc(hipX_L, hipY, 36 + kickProg * 14, Math.PI * 0.75, Math.PI * 0.25, true);
        uiKicker.strokePath();
    }
}

// 똥볼 차징 바 — 클릭 길게 누르고 있는 동안 채워짐
let uiKickChargeLabel = null;
function drawKickChargeBar() {
    if (!sceneRef) return;
    const shouldShow = isDragging && isDungBallOn() && currentStone;
    if (!shouldShow) {
        if (uiKickChargeBar)   { uiKickChargeBar.destroy();   uiKickChargeBar   = null; }
        if (uiKickChargeLabel) { uiKickChargeLabel.destroy(); uiKickChargeLabel = null; }
        return;
    }
    if (!uiKickChargeBar) {
        uiKickChargeBar = sceneRef.add.graphics().setDepth(16);
    }
    const heldMs = Math.max(0, Date.now() - _kickChargeStart);
    const charge = Math.min(1.0, heldMs / KICK_CHARGE_MAX);

    uiKickChargeBar.clear();
    // 선수 머리 위쪽에 표시 (월드 좌표 — 카메라 따라 자연스럽게 이동)
    const cx = SLING_CENTER.x;
    const cy = 720 - 156;
    const barW = 80, barH = 11;
    // 배경
    uiKickChargeBar.fillStyle(0x000000, 0.75).fillRoundedRect(cx - barW/2 - 3, cy - 3, barW + 6, barH + 6, 5);
    uiKickChargeBar.fillStyle(0x2a2a2a, 1).fillRect(cx - barW/2, cy, barW, barH);
    // 채워지는 색: 노→주→빨
    const col = charge < 0.5 ? 0xffee44 : charge < 0.85 ? 0xff8822 : 0xff2222;
    uiKickChargeBar.fillStyle(col, 1).fillRect(cx - barW/2, cy, barW * charge, barH);
    // 풀차징 시 강조 (white border pulse)
    if (charge >= 0.99) {
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.02);
        uiKickChargeBar.lineStyle(2, 0xffffff, pulse).strokeRect(cx - barW/2, cy, barW, barH);
    } else {
        uiKickChargeBar.lineStyle(1.5, 0xffffff, 0.85).strokeRect(cx - barW/2, cy, barW, barH);
    }
    // POWER 라벨
    if (!uiKickChargeLabel) {
        uiKickChargeLabel = sceneRef.add.text(0, 0, 'POWER', {
            fontFamily: '"Arial Black", Arial', fontSize: '11px', color: '#ffffff',
            stroke: '#000000', strokeThickness: 2,
        }).setOrigin(0.5, 1).setDepth(16);
    }
    uiKickChargeLabel.setPosition(cx, cy - 2);
}

// 똥볼 발 차기 애니메이션 — 차징 후 강력한 forward swing
// 현재 각도(차징으로 -1.15까지 뒤로 들린 상태)에서 시작 → peak forward → 0 복귀
function triggerKickAnim() {
    if (!sceneRef) return;
    if (_kickerTween) _kickerTween.stop();
    const startAngle = _kickerLegAngle;   // 보통 음수(뒤로 들림)
    // 차징이 많을수록 강력하게 swing — 1.4~2.0 까지 forward peak
    const peakForward = 1.4 + Math.min(0.6, Math.abs(startAngle) * 0.55);
    const obj = { v: startAngle };
    // 1단계: forward swing (빠르게 휘두름)
    _kickerTween = sceneRef.tweens.add({
        targets: obj,
        v: peakForward,
        duration: 100,
        ease: 'Quad.Out',
        onUpdate: () => { _kickerLegAngle = obj.v; redrawKicker(); },
        onComplete: () => {
            // 2단계: 서있는 자세로 복귀 (천천히)
            sceneRef.tweens.add({
                targets: obj,
                v: 0,
                duration: 380,
                ease: 'Quad.Out',
                onUpdate: () => { _kickerLegAngle = obj.v; redrawKicker(); },
                onComplete: () => { _kickerLegAngle = 0; redrawKicker(); _kickerTween = null; }
            });
        }
    });
}

function applySlingHeight() {
    const raise = getSlingRaise();
    SLING_CENTER.y = BASE_SLING_Y - raise;
    PRONG_L.y      = BASE_PRONG_Y - raise;
    PRONG_R.y      = BASE_PRONG_Y - raise;
    redrawSlingStand();
    redrawTwinStand();
    redrawKicker();
    // 현재 장전된 돌 위치 갱신 (새총 머리 또는 선수 발 옆)
    if (currentStone && !isDragging) {
        const pos = getBallPos();
        currentStone.setPosition(pos.x, pos.y);
    }
}

// ─── 파견 자국 — 떠난 자리에 흙 파인 흔적 남김 ─────────
function spawnDirtTrace(scene, x) {
    if (!scene) return;
    const baseY = 720;
    const g = scene.add.graphics().setDepth(-1);   // 슬링샷 아래 (지면 위)

    // 가장 어두운 구덩이 (검정 흙)
    g.fillStyle(0x0a0502, 0.95).fillEllipse(x, baseY - 4, 64, 16);
    g.fillStyle(0x2a1810, 0.85).fillEllipse(x, baseY - 5, 52, 12);
    g.fillStyle(0x070300, 1   ).fillEllipse(x, baseY - 7, 32, 7);

    // 가장자리 살짝 밝은 흙 (튀어나온 흙더미)
    g.lineStyle(2, 0x553a20, 0.75).strokeEllipse(x, baseY - 4, 64, 16);

    // 작은 흙덩이 점들 (주변에 흩어진 파편)
    for (let i = 0; i < 10; i++) {
        const px = x + Phaser.Math.Between(-38, 38);
        const py = baseY - Phaser.Math.Between(1, 7);
        const size = Phaser.Math.Between(2, 4);
        const col = Phaser.Math.RND.pick([0x3a2010, 0x2a1808, 0x553a20, 0x1a0d05]);
        g.fillStyle(col, 0.92).fillRect(px - size/2, py - size/2, size, size);
    }

    // 폴 박혔던 자리 (좁고 깊은 가운데 검정 줄)
    g.fillStyle(0x000000, 0.95).fillRect(x - 6, baseY - 4, 12, 6);

    _dispatchTraces.push(g);
}

function clearDispatchTraces() {
    _dispatchTraces.forEach(g => { if (g && g.destroy) g.destroy(); });
    _dispatchTraces = [];
}

// ─── 파견 (NORMAL): 명중 위치로 슬링샷 이동 ─────────────
// hitBird 에서 pendingDispatchX 가 설정되면 wipeReturn 시 적용
function applyPendingDispatch() {
    if (pendingDispatchX === null) return;
    const minX = 220, maxX = WORLD_LIMIT_X - 220;
    const newX = Phaser.Math.Clamp(pendingDispatchX, minX, maxX);
    pendingDispatchX = null;

    const dx = newX - SLING_CENTER.x;
    if (Math.abs(dx) < 0.5) return;   // 사실상 이동 없음

    // 떠나기 전 위치에 흙 파인 흔적 남김 (영구 — 다음 라운드/새 게임 때까지)
    spawnDirtTrace(sceneRef, SLING_CENTER.x);

    SLING_CENTER.x += dx;
    PRONG_L.x      += dx;
    PRONG_R.x      += dx;
    redrawSlingStand();
    redrawTwinStand();
    redrawKicker();

    // 도착 신호 — 새 위치에 작은 dust puff
    if (sceneRef) {
        const puff = sceneRef.add.graphics().setDepth(7).setPosition(SLING_CENTER.x, 720);
        puff.fillStyle(0xe8a030, 0.85).fillCircle(0, 0, 14);
        sceneRef.tweens.add({ targets: puff,
            scaleX: 2.6, scaleY: 1.4, alpha: 0,
            duration: 420, ease: 'Quad.Out',
            onComplete: () => puff.destroy() });

        // 흙먼지 좌우 분기 (8개)
        for (let i = 0; i < 8; i++) {
            const dir = i < 4 ? -1 : 1;
            const chip = sceneRef.add.rectangle(SLING_CENTER.x, 720,
                Phaser.Math.Between(3, 5), Phaser.Math.Between(3, 5),
                Phaser.Utils.Array.GetRandom([0xc8a060, 0xa07840, 0xe0c080])
            ).setDepth(7).setOrigin(0.5, 1);
            sceneRef.physics.add.existing(chip);
            chip.body.setVelocity(dir * Phaser.Math.Between(100, 180),
                                   Phaser.Math.Between(-220, -80));
            chip.body.setGravityY(500);
            sceneRef.tweens.add({ targets: chip, alpha: 0,
                duration: Phaser.Math.Between(450, 650),
                onComplete: () => chip.destroy() });
        }
    }
}

// 고철수집 보너스: 적 처치 시 추가로 얻는 특수물질
// 1스택 = +1, 2스택 = +3
function getScrapBonus() {
    if (scrapCollectStack <= 0 || !isOn('고철수집')) return 0;
    return scrapCollectStack === 1 ? 1 : 3;
}

// 패시브 토글 라인 재구성 — 패시브 획득·토글 클릭·재시작 시 호출
// • 스탯(공격력·탄성)을 "── 강화 ──" 바로 아래에 표시
// • 뱃지([N]/[R]/[E])와 이름을 별도 텍스트 오브젝트로 분리하여 색상 구분
function rebuildPassiveLines(scene) {
    uiPassiveLines.forEach(o => o.destroy());
    uiPassiveLines = [];

    const STACK_OF = { '탄성증가': armMuscleStack,  '큰돌':           bigStoneStack,
                       '파워업':   ironBallStack,   '조준선':         aimLineStack,
                       '농구공':   basketballStack, '관통':           piercingStack,
                       '자석탄':   magnetStack,     '돌을 줍다':      pickupStoneStack,
                       '산탄':     shotgunStack,    '폭발':           explosionStack,
                       '번개탄':   lightningStack,  '체세포분열':     cellDivisionStack,
                       '그라운드 제로': groundZeroStack,
                       '재활용':   recycleStack,
